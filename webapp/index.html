<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ponki</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap');
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#222;--text:#fff;--text2:#888;--text3:#444;--star:#f0c040;--dev:#4aff8a;--success:#4aff8a;--danger:#ff4a4a;--tab-h:64px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;height:100vh;overflow:hidden;position:fixed;width:100%}
.page{position:absolute;inset:0;bottom:calc(var(--tab-h) + var(--safe-b));overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page::-webkit-scrollbar{display:none}
.page-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.badge{display:flex;align-items:center;gap:5px;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Space Mono',monospace;cursor:pointer;transition:transform 0.12s,opacity 0.15s}
.badge:active{transform:scale(0.93);opacity:0.8}
.badge-star{background:#1a1500;border:1px solid #332800;color:var(--star)}
.badge-dev{background:#0d1a0d;border:1px solid #1a3a1a;color:var(--dev)}
.tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Syne',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.5px;transition:color 0.2s}
.tab-btn.active{color:#ff2d78}
.tab-btn svg{width:24px;height:24px;transition:transform 0.2s,opacity 0.2s;opacity:0.4}
.tab-btn.active svg{opacity:1;transform:scale(1.1)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-weight:700;cursor:pointer;letter-spacing:0.3px;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--text);color:var(--bg);padding:14px 20px;font-size:15px;width:100%}
.btn-primary:active{box-shadow:0 0 20px rgba(255,255,255,0.3)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:12px 18px;font-size:14px}
.btn-secondary:active{border-color:var(--text3);box-shadow:0 0 12px rgba(255,255,255,0.08)}
.btn-danger{background:rgba(255,74,74,0.1);color:var(--danger);border:1px solid rgba(255,74,74,0.2);padding:10px 16px;font-size:13px}
.btn-wide{width:100%}
@keyframes ponkiPulse{0%,100%{box-shadow:0 0 20px rgba(255,45,120,0.3),0 0 40px rgba(255,45,120,0.1)}50%{box-shadow:0 0 35px rgba(255,45,120,0.6),0 0 70px rgba(255,45,120,0.25)}}
@keyframes ponkiFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
.ponki-hero{animation:ponkiFloat 3s ease-in-out infinite}
.ponki-hero-wrap{animation:ponkiPulse 2.5s ease-in-out infinite;border-radius:16px}
/* Card flip */
.flip-container{perspective:600px;width:100%;max-width:200px;margin:0 auto;aspect-ratio:1/1}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 4.0s cubic-bezier(0.4,0.2,0.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;background:var(--bg3)}
.flip-back{transform:rotateY(180deg)}
.flip-front img,.flip-back img{width:100%;height:100%;object-fit:cover}
@keyframes shakeReveal{0%{transform:rotateY(180deg) scale(1)}15%{transform:rotateY(180deg) scale(1.08) rotate(-2deg)}30%{transform:rotateY(180deg) scale(1.05) rotate(2deg)}45%{transform:rotateY(180deg) scale(1.07) rotate(-1.5deg)}60%{transform:rotateY(180deg) scale(1.03) rotate(1deg)}75%{transform:rotateY(180deg) scale(1.02) rotate(-0.5deg)}100%{transform:rotateY(180deg) scale(1) rotate(0)}}
.flip-card.shake .flip-back{animation:shakeReveal 0.6s ease-out 3.8s both}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-right{animation:slideInRight 0.25s cubic-bezier(0.32,0.72,0,1)}
.slide-in-left{animation:slideInLeft 0.25s cubic-bezier(0.32,0.72,0,1)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@keyframes cardTap{0%{transform:scale(1) rotate(0)}25%{transform:scale(0.92) rotate(-2deg)}65%{transform:scale(0.96) rotate(1.5deg)}100%{transform:scale(1) rotate(0)}}
.card-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.12s}
.card-item:active{border-color:#ff2d78;animation:cardTap 0.4s ease-out forwards}
.card-img{aspect-ratio:1/1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:6px 8px}
.card-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:10px;color:var(--text2);font-family:'Space Mono',monospace;margin-top:1px}
.pct-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;font-family:'Space Mono',monospace;color:var(--star)}
.price-badge{position:absolute;bottom:5px;right:5px;background:rgba(0,0,0,0.85);border:1px solid rgba(240,192,64,0.4);border-radius:6px;padding:4px 8px;font-size:13px;font-weight:800;font-family:'Space Mono',monospace;color:var(--star)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:18px;font-weight:800;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-card-preview{aspect-ratio:1/1;max-width:200px;margin:0 auto;width:100%;border-radius:14px;overflow:hidden;background:var(--bg3)}
.modal-card-preview img{width:100%;height:100%;object-fit:cover}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 6px;text-align:center}
.stat-box .val{font-size:18px;font-weight:800;font-family:'Space Mono',monospace}
.stat-box .lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state p{font-size:14px}
.menu-item{background:var(--bg2);border:1px solid transparent;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
.menu-item:active{background:var(--bg3);border-color:var(--border)}
.menu-icon{font-size:18px;width:26px;text-align:center;display:flex;align-items:center;justify-content:center}
.menu-text{flex:1}
.menu-label{font-size:14px;font-weight:600}
.price-input-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px 4px 4px 14px}
.price-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Space Mono',monospace;font-size:16px;font-weight:700}
.price-input-row .cur{color:var(--star);font-size:13px;font-weight:700;padding:8px 12px;background:rgba(240,192,64,0.1);border-radius:7px}
.transfer-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Space Mono',monospace;font-size:13px;width:100%;outline:none}
.transfer-input::placeholder{color:var(--text3)}
.friend-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.friend-name{font-size:13px;font-weight:700}
.friend-meta{font-size:11px;color:var(--text2);margin-top:1px}
.friend-cards{margin-left:auto;font-size:12px;color:var(--text2);font-family:'Space Mono',monospace}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.err{border-color:var(--danger);color:var(--danger)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.6s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{display:flex;align-items:center;justify-content:center;height:100%}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-btn:active{transform:scale(0.94)}
.filter-btn.active{background:#ff2d78;border-color:#ff2d78;color:#fff}
.trade-filter-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Syne',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.trade-filter-btn:active{transform:scale(0.95)}
.trade-filter-btn.has-filter{border-color:#ff2d78;color:#ff2d78}
.trade-filter-count{background:#ff2d78;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:800}
</style>
</head>
<body>

<div id="page-buy" class="page active">
  <div class="page-header">
    <span class="page-title" id="t-shop">Shop</span>
    <div style="display:flex;gap:6px">
      <div class="badge badge-dev"><span>🧪</span><span id="dev-val">—</span></div>
      <div class="badge badge-star" onclick="openSplitLink()"><span>⭐</span><span id="star-val">—</span></div>
    </div>
  </div>
  <div class="content" id="buy-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-sell" class="page">
  <div class="page-header">
    <span class="page-title" id="t-trade">Trade</span>
    <div class="badge badge-star" onclick="openSplitLink()"><span>⭐</span><span id="star-val-trade">—</span></div>
  </div>
  <div class="content" id="trade-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-profile" class="page">
  <div class="content" id="profile-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-page="buy" onclick="switchTab('buy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="tab-shop">Shop</span>
  </button>
  <button class="tab-btn" data-page="sell" onclick="switchTab('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    <span id="tab-trade">Trade</span>
  </button>
  <button class="tab-btn" data-page="profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span id="tab-profile">Profile</span>
  </button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }
const tgUser = tg?.initDataUnsafe?.user || {id:12345678,username:'test',first_name:'Test'};
let userData = null, selectedCard = null;

const userLang = ((tg?.initDataUnsafe?.user?.language_code || navigator.language || 'en')+'').toLowerCase().startsWith('ru') ? 'ru' : 'en';
const T = {
  en:{shop:'Shop',trade:'Trade',profile:'Profile',left:'LEFT',price:'PRICE',supply:'SUPPLY',buy:'Buy',cardCount:(n)=>n===1?'card':`cards`,upgrade:'UPGRADE',sell:'Sell',transfer:'Transfer',serial:'Serial',drop:'Drop %',status:'Status',supplyLbl:'Supply',listSale:'List for Sale',cancel:'Cancel',close:'Close',send:'Send',remove:'Remove listing',noListings:'No listings yet',collection:'Collection',model:'Model',refEarn:'Refer & Earn',refText:'Invite friends — you earn',refOf:'of all their spending!',buyCheapStars:'Buy Cheap Stars',connectTon:'Connect TON Wallet',myCards:'My Cards',friends:'Friends',noCards:'No cards yet',noFriends:'No friends yet',showAll:'Show all',showLess:'Show less',clear:'Clear',apply:'Apply',notInPonki:'User not in Ponki',notJoined:"This person hasn't joined yet.",invite:'Invite',purchased:'Purchased!',listed:'Listed!',removed:'Removed',cardSent:'Card sent!',linkCopied:'Link copied!',notEnoughDev:'Not enough DEV',notEnoughStars:'Not enough stars',enterPrice:'Enter price',enterTgId:'Enter Telegram ID',commission:'Commission: 5%',rarity:'Rarity',descShop:'50 unique models · upgrade free',historyTitle:'History'},
  ru:{shop:'Магазин',trade:'Торговля',profile:'Профиль',left:'ОСТАЛОСЬ',price:'ЦЕНА',supply:'ТИРАЖ',buy:'Купить',cardCount:(n)=>{if(n%10===1&&n%100!==11)return'карта';if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'карты';return'карт';},upgrade:'УЛУЧШИТЬ',sell:'Продать',transfer:'Передать',serial:'Номер',drop:'Редкость',status:'Статус',supplyLbl:'Тираж',listSale:'Выставить',cancel:'Отмена',close:'Закрыть',send:'Отправить',remove:'Снять',noListings:'Нет объявлений',collection:'Коллекция',model:'Модель',refEarn:'Приглашай и зарабатывай',refText:'Приглашай друзей — получай',refOf:'от их трат автоматически!',buyCheapStars:'Купить звёзды дешевле',connectTon:'Подключить TON кошелёк',myCards:'Мои карточки',friends:'Друзья',noCards:'Карточек пока нет',noFriends:'Нет друзей — поделись ссылкой!',showAll:'Показать все',showLess:'Скрыть',clear:'Сбросить',apply:'Применить',notInPonki:'Пользователь не в Ponki',notJoined:'Этот человек ещё не вступил.',invite:'Пригласить',purchased:'Куплено!',listed:'Выставлено!',removed:'Снято',cardSent:'Карточка отправлена!',linkCopied:'Ссылка скопирована!',notEnoughDev:'Недостаточно DEV',notEnoughStars:'Недостаточно звёзд',enterPrice:'Введите цену',enterTgId:'Введите Telegram ID',commission:'Комиссия: 5%',rarity:'Редкость',descShop:'50 уникальных моделей · улучшение бесплатно',historyTitle:'История'}
};
const t = T[userLang];

function fmtNum(n) {
  if (n >= 10000) return '10K';
  if (n >= 1000) {
    const val = Math.floor(n / 100) / 10; // truncate, not round
    return val.toFixed(1).replace(/\.0$/,'') + 'K';
  }
  return n.toLocaleString();
}

function applyLang() {
  document.getElementById('t-shop').textContent = t.shop;
  document.getElementById('t-trade').textContent = t.trade;
  document.getElementById('tab-shop').textContent = t.shop;
  document.getElementById('tab-trade').textContent = t.trade;
  document.getElementById('tab-profile').textContent = t.profile;
}

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'Error'); }
  return res.json();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+type;
  setTimeout(()=>el.className='toast', 2500);
}

function haptic(type='light') {
  tg?.HapticFeedback?.impactOccurred(type);
  try { navigator.vibrate && navigator.vibrate(type==='heavy'?[30,20,30]:type==='medium'?20:10); } catch(e){}
}

function dropPct(w) {
  return {5:'0.5%',10:'1%',15:'1.5%',20:'2%',25:'2.5%',30:'3%'}[w]||w+'w';
}

function updateBalances() {
  if (!userData) return;
  document.getElementById('dev-val').textContent = userData.dev_tokens??0;
  document.getElementById('star-val').textContent = userData.stars_balance??0;
  const sv = document.getElementById('star-val-trade');
  if (sv) sv.textContent = userData.stars_balance??0;
}

function switchTab(tab) {
  haptic();
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+(tab==='sell'?'sell':tab)).classList.add('active');
  document.querySelector(`[data-page="${tab}"]`).classList.add('active');
  if (tab==='buy') loadBuy();
  if (tab==='sell') loadTrade();
  if (tab==='profile') loadProfile();
}

function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('modal')) closeModal();
});

async function init() {
  applyLang();
  try {
    await api('/api/register','POST',{telegram_id:tgUser.id,username:tgUser.username||'',first_name:tgUser.first_name||'',last_name:tgUser.last_name||'',ref_code:new URLSearchParams(location.search).get('ref')});
    userData = await api(`/api/user/${tgUser.id}`);
    updateBalances(); loadBuy();
  } catch(e) { toast('Connection error','err'); }
}

// ── SHOP ──
async function loadBuy() {
  if (!userData) return;
  const el = document.getElementById('buy-content');
  try {
    const cols = await api('/api/collections');
    const col = cols[0];
    if (!col) { el.innerHTML='<p style="padding:20px;color:var(--text2)">No collections</p>'; return; }
    const useDev = (userData.dev_tokens??0) >= col.base_price;
    _buyPrice=col.base_price; _buyUseDev=useDev; _buyQty=1;
    const desc = userLang==='ru' ? t.descShop : t.descShop;
    el.innerHTML = `
      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px;text-align:center">
        <div style="font-size:26px;font-weight:800;margin-bottom:4px">${col.name}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:16px">${desc}</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px">
          <div style="background:var(--bg3);border-radius:10px;padding:10px 4px"><div style="font-size:16px;font-weight:800">${fmtNum(col.remaining)}</div><div style="font-size:9px;color:var(--text2);margin-top:2px">${t.left}</div></div>
          <div style="background:var(--bg3);border-radius:10px;padding:10px 4px"><div style="font-size:16px;font-weight:800;color:var(--star)">${col.base_price}⭐</div><div style="font-size:9px;color:var(--text2);margin-top:2px">${t.price}</div></div>
          <div style="background:var(--bg3);border-radius:10px;padding:10px 4px"><div style="font-size:16px;font-weight:800">${fmtNum(col.total_supply)}</div><div style="font-size:9px;color:var(--text2);margin-top:2px">${t.supply}</div></div>
        </div>
        <div class="ponki-hero-wrap" style="max-width:220px;margin:0 auto 20px;aspect-ratio:1/1;overflow:hidden;border:1px solid rgba(255,45,120,0.3);background:var(--bg3)">
          <img class="ponki-hero" src="/static/ponki/ponki.png" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
          <button class="btn btn-secondary" style="width:44px;height:44px;font-size:20px;flex-shrink:0;padding:0" onclick="changeQty(-1)">−</button>
          <div style="flex:1;text-align:center"><span id="qty-val" style="font-size:22px;font-weight:800">1</span> <span id="qty-word" style="font-size:13px;color:var(--text2)">${t.cardCount(1)}</span></div>
          <button class="btn btn-secondary" style="width:44px;height:44px;font-size:20px;flex-shrink:0;padding:0" onclick="changeQty(1)">+</button>
        </div>
        <button class="btn btn-primary" id="buy-btn" onclick="buyCard(${col.id},${col.base_price},${useDev})">${useDev?`${t.buy} — ${col.base_price} DEV`:`${t.buy} — ${col.base_price} ⭐`}</button>
      </div>`;

let _buyQty=1,_buyColId=null,_buyPrice=null,_buyUseDev=false;
function changeQty(d) {
  haptic(); _buyQty=Math.max(1,Math.min(500,_buyQty+d));
  const qv=document.getElementById('qty-val'), qw=document.getElementById('qty-word'), bb=document.getElementById('buy-btn');
  if(qv) qv.textContent=_buyQty;
  if(qw) qw.textContent=t.cardCount(_buyQty);
  if(bb&&_buyPrice){const tot=_buyQty*_buyPrice;bb.textContent=_buyUseDev?`${t.buy} ${_buyQty} — ${tot} DEV`:`${t.buy} ${_buyQty} — ${tot} ⭐`;}
}

async function buyCard(colId, price, useDev) {
  haptic('medium'); _buyColId=colId; _buyPrice=price; _buyUseDev=useDev??((userData.dev_tokens??0)>=price);
  const qty=_buyQty||1, total=qty*price;
  if(_buyUseDev&&(userData.dev_tokens??0)<total){toast(t.notEnoughDev,'err');return;}
  if(!_buyUseDev&&userData.stars_balance<total){toast(t.notEnoughStars,'err');return;}
  try {
    for(let i=0;i<qty;i++) await api('/api/buy_card_internal','POST',{telegram_id:tgUser.id,collection_id:colId,dev:_buyUseDev});
    userData=await api(`/api/user/${tgUser.id}`); updateBalances(); _buyQty=1;
    toast(`${qty} ${t.cardCount(qty)} ${userLang==='ru'?'куплено!':'bought!'}`,'ok'); loadBuy();
  } catch(e){toast(e.message,'err');}
}

// ── TRADE ──
let allListings=[],tradeSortBy='serial_asc',selectedModels=new Set(),allModelDefs=[];

async function loadTrade() {
  if (!userData) return;
  const el=document.getElementById('trade-content');
  try {
    userData=await api(`/api/user/${tgUser.id}`); updateBalances();

}

let tradeView = 'market'; // 'market' or 'history'

function renderTradeUI() {
  const el=document.getElementById('trade-content'); if(!el) return;
  const modCount=selectedModels.size;
  el.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="trade-filter-btn ${tradeView==='market'?'has-filter':''}" onclick="setTradeView('market')">${userLang==='ru'?'Рынок':'Market'}</button>

    </div>
    <div id="trade-market-section" style="display:${tradeView==='market'?'flex':'none'};flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">

        <button class="trade-filter-btn ${modCount>0?'has-filter':''}" style="font-size:12px" onclick="openModelFilter()">${t.model}${modCount>0?`<span class="trade-filter-count">${modCount}</span>`:''}</button>
      </div>

function setTradeView(view) {
  haptic();
  tradeView=view;
  renderTradeUI();
}

function openCollectionFilter() {
  haptic();
  openModal(t.collection,`
    <div style="background:#ff2d78;color:#fff;border-radius:10px;padding:14px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between">
      <span>Ponki</span><span>✓</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">${t.clear}</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeModal()">${t.apply}</button>
    </div>
  `);
}

function openModelFilter() {
  haptic();
  let html=`<div style="display:flex;flex-direction:column;gap:6px;max-height:52vh;overflow-y:auto;padding-bottom:4px">`;
  for(const m of allModelDefs){
    const sel=selectedModels.has(m.name);
    html+=`<div onclick="toggleModelSelect('${m.name}',this)" style="background:${sel?'#ff2d78':'var(--bg3)'};border:1px solid ${sel?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
      <img src="${m.image_url}" style="width:34px;height:34px;border-radius:6px;object-fit:cover" onerror="this.style.background='var(--bg3)'">
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:${sel?'rgba(255,255,255,0.7)':'var(--text2)'}">${dropPct(m.drop_weight)}</div></div>
      <span style="font-size:16px;min-width:16px;text-align:right">${sel?'✓':''}</span>
    </div>`;
  }
  const bs=selectedModels.has('Base');
  html+=`<div onclick="toggleModelSelect('Base',this)" style="background:${bs?'#ff2d78':'var(--bg3)'};border:1px solid ${bs?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
    <img src="/static/ponki/ponki.png" style="width:34px;height:34px;border-radius:6px;object-fit:cover">
    <div style="flex:1"><div style="font-size:13px;font-weight:700">Base</div><div style="font-size:11px;color:var(--text2)">Unupgraded</div></div>
    <span style="font-size:16px;min-width:16px;text-align:right">${bs?'✓':''}</span>
  </div></div>
  <div style="position:sticky;bottom:0;background:var(--bg2);padding:12px 0 0;margin-top:8px;display:flex;gap:8px;border-top:1px solid var(--border)">
    <button class="btn btn-secondary" style="flex:1" onclick="selectedModels.clear();closeModal();renderTradeUI()">${t.clear}</button>
    <button class="btn btn-primary" style="flex:1" onclick="closeModal();renderTradeUI()">${t.apply}</button>
  </div>`;
  openModal(t.model,html);
}

function toggleModelSelect(name,el) {
  haptic();
  if(selectedModels.has(name)){selectedModels.delete(name);el.style.background='var(--bg3)';el.style.borderColor='var(--border)';el.querySelector('span:last-child').textContent='';}
  else{selectedModels.add(name);el.style.background='#ff2d78';el.style.borderColor='#ff2d78';el.querySelector('span:last-child').textContent='✓';}
}

function toggleSerialSort(){tradeSortBy=tradeSortBy==='serial_asc'?'serial_desc':'serial_asc';renderTradeUI();}
function togglePriceSort(){tradeSortBy=tradeSortBy==='price_asc'?'price_desc':'price_asc';renderTradeUI();}
function toggleTradeRarity(){tradeSortBy=tradeSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';renderTradeUI();}

async function loadHistory() {
  const el=document.getElementById('history-list'); if(!el) return;
  // P2P history - only show market_buy transactions between different users
  try {
    const data=await api(`/api/history/${tgUser.id}`);

    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'Сделок пока нет':'No trades yet'}</p></div>`;
      return;
    }
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id;
      const label=isIncome?(userLang==='ru'?'Продано':'Sold'):(userLang==='ru'?'Куплено':'Bought');
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0">
          <img src="${item.image_url||'/static/ponki/ponki.png'}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.background='var(--bg3)'">
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${item.card_name||'Ponki'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${label}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap">${isIncome?'+':'−'}${item.stars_amount}⭐</div>
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}

function renderListings() {
  let list=[...allListings];
  if(selectedModels.size>0) list=list.filter(l=>selectedModels.has(l.name));
  if(tradeSortBy==='price_asc') list.sort((a,b)=>a.price_stars-b.price_stars);
  else if(tradeSortBy==='price_desc') list.sort((a,b)=>b.price_stars-a.price_stars);
  else if(tradeSortBy==='serial_asc') list.sort((a,b)=>a.serial_number-b.serial_number);
  else if(tradeSortBy==='serial_desc') list.sort((a,b)=>b.serial_number-a.serial_number);
  else if(tradeSortBy==='rarity_asc') list.sort((a,b)=>a.drop_weight-b.drop_weight);
  else if(tradeSortBy==='rarity_desc') list.sort((a,b)=>b.drop_weight-a.drop_weight);

  const el=document.getElementById('listings-list'); if(!el) return;
  if(list.length===0){el.innerHTML=`<div class="empty-state"><p>${t.noListings}</p></div>`;return;}
  let html=`<div class="cards-grid">`;
  for(const l of list){
    const isOwn=l.seller_id===userData.id;
    html+=`<div class="card-item" onclick='openMarketModal(${JSON.stringify(l)},${isOwn})'>
      <div class="card-img">
        <img src="${l.image_url}" onerror="this.style.background='var(--bg3)'">
        <span class="pct-badge">${dropPct(l.drop_weight)}</span>
        <span class="price-badge">⭐${l.price_stars}</span>
      </div>
      <div class="card-info"><div class="card-name">${l.name}</div><div class="card-meta">#${l.serial_number}</div></div>
    </div>`;
  }
  html+=`</div>`; el.innerHTML=html;
}

function openMarketModal(listing,isOwn) {
  openModal(listing.name,`
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div class="modal-card-preview"><img src="${listing.image_url}" onerror="this.style.background='var(--bg3)'"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="stat-box"><div class="val" style="font-size:14px">#${listing.serial_number}</div><div class="lbl">${t.serial}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${listing.price_stars}⭐</div><div class="lbl">${t.price}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${dropPct(listing.drop_weight)}</div><div class="lbl">${t.drop}</div></div>

    ${isOwn
      ?`<button class="btn btn-danger btn-wide" onclick="unlistCard(${listing.id})">${t.remove}</button>`
      :`<button class="btn btn-primary" onclick="buyListing(${listing.id},${listing.price_stars})">${t.buy} ${listing.price_stars} ⭐</button>`
    }
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.close}</button>
  `);

async function buyListing(id,price){
  haptic('medium');
  if(userData.stars_balance<price){toast(t.notEnoughStars,'err');return;}
  try{await api('/api/market/buy','POST',{telegram_id:tgUser.id,listing_id:id});closeModal();userData=await api(`/api/user/${tgUser.id}`);updateBalances();toast(`🃏 ${t.purchased}`,'ok');loadTrade();}catch(e){toast(e.message,'err');}
}
async function unlistCard(id){
  haptic();
  try{await api('/api/market/unlist','POST',{telegram_id:tgUser.id,listing_id:id});closeModal();toast(t.removed,'ok');loadTrade();}catch(e){toast(e.message,'err');}
}

let profileSortBy='serial_asc';
let profileView='cards'; // 'cards' or 'history'

async function loadProfile() {
  const el=document.getElementById('profile-content');
  try {
    userData=await api(`/api/user/${tgUser.id}`); updateBalances();
    let cards=userData.cards||[];
    const devBal=userData.dev_tokens??0;
    if(profileSortBy==='serial_asc') cards.sort((a,b)=>a.serial_number-b.serial_number);
    else if(profileSortBy==='serial_desc') cards.sort((a,b)=>b.serial_number-a.serial_number);
    else if(profileSortBy==='rarity_asc') cards.sort((a,b)=>{
      if(!a.is_upgraded&&b.is_upgraded) return 1;
      if(a.is_upgraded&&!b.is_upgraded) return -1;
      return a.drop_weight-b.drop_weight;
    });
    else if(profileSortBy==='rarity_desc') cards.sort((a,b)=>{
      if(!a.is_upgraded&&b.is_upgraded) return 1;
      if(a.is_upgraded&&!b.is_upgraded) return -1;
      return b.drop_weight-a.drop_weight;
    });

    let cardsHtml='';
    if(cards.length===0){
      cardsHtml=`<div class="empty-state" style="padding:24px 0"><p>${t.noCards}</p></div>`;
    } else {
      const showAll=window._showAllCards||false;
      const vis=showAll?cards:cards.slice(0,6);
      cardsHtml=`
        <div class="filters" style="margin-bottom:4px">

          <button class="filter-btn ${profileSortBy==='rarity_asc'||profileSortBy==='rarity_desc'?'active':''}" onclick="toggleProfileRarity()">${t.rarity} ${profileSortBy==='rarity_desc'?'↓':'↑'}</button>

        <div class="cards-grid">`;

          <div class="card-info"><div class="card-name">${card.is_upgraded?card.name:'Base'}</div><div class="card-meta">#${card.serial_number}</div></div>

      <div style="background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;align-items:center;gap:14px">

      <div id="profile-cards-section" style="display:${profileView==='cards'?'flex':'none'};flex-direction:column;gap:14px">
        ${cardsHtml}

        <div style="background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px">

          <div style="display:flex;gap:8px;align-items:center">
            <div style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--star);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">t.me/memstroybot?start=${userData.telegram_id}</div>
            <button class="btn btn-secondary" style="white-space:nowrap;flex-shrink:0" onclick="copyRef(${userData.telegram_id})">${userLang==='ru'?'Копировать':'Copy'}</button>

            <div class="menu-text"><div class="menu-label" id="ton-label">${t.connectTon}</div><div id="ton-sub" style="font-size:11px;color:var(--text2);margin-top:1px"></div></div>
            <span style="color:var(--text3);font-size:16px" id="ton-arrow">›</span>
          </div>
        </div>
      </div>

      <div id="profile-history-section" style="display:${profileView==='history'?'flex':'none'};flex-direction:column;gap:8px">
        <div id="profile-history-list"><div class="spinner" style="margin:32px auto"></div></div>
      </div>

      <div style="height:16px"></div>`;
    loadFriends();
    if(profileView==='history') loadProfileHistory();
  } catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

function toggleProfileRarity(){haptic();profileSortBy=profileSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';loadProfile();}

    const data=await api(`/api/history/${tgUser.id}`);
    const items=data.history||[];
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'История пуста':'No history yet'}</p></div>`;
      return;
    }
    const typeLabel=(type,isIncome)=>{
      if(userLang==='ru'){
        const map={buy:'Куплено',market_buy:isIncome?'Продано на рынке':'Куплено на рынке',upgrade:'Улучшено',transfer:isIncome?'Получено':'Передано',sell:'Продано',buy_stars:'Пополнение ⭐'};
        return map[type]||type;
      } else {
        const map={buy:'Bought',market_buy:isIncome?'Sold on market':'Bought on market',upgrade:'Upgraded',transfer:isIncome?'Received':'Transferred',sell:'Sold',buy_stars:'Stars added'};
        return map[type]||type;
      }
    };
    const typeIcon=(type)=>({buy:'🛒',market_buy:'🏪',upgrade:'✨',transfer:'✈️',sell:'💰',buy_stars:'⭐'}[type]||'📋');
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id&&item.stars_amount>0&&item.type!=='buy';
      const timeStr=item.created_at?item.created_at.replace('T',' ').slice(0,16):'';
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">
          ${item.image_url?`<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='${typeIcon(item.type)}'">`:typeIcon(item.type)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${item.card_name||'Ponki'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${typeLabel(item.type,isIncome)}</div>
          ${timeStr?`<div style="font-size:10px;color:var(--text3);margin-top:1px;font-family:'Space Mono',monospace">${timeStr}</div>`:''}
        </div>
        ${item.stars_amount>0?`<div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap">${isIncome?'+':'−'}${item.stars_amount}⭐</div>`:''}
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

async function loadFriends(){
  try{
    const data=await api(`/api/friends/${tgUser.id}`);
    const friends=data.friends||[];
    const fc=document.getElementById('friends-count'); if(fc) fc.textContent=friends.length;
    const el=document.getElementById('friends-block'); if(!el) return;
    if(friends.length===0){el.innerHTML=`<div style="font-size:13px;color:var(--text3);padding:4px 0">${t.noFriends}</div>`;return;}
    let html=`<div style="display:flex;flex-direction:column;gap:6px">`;
    for(const f of friends){
      const name=f.first_name||f.username||'User';
      html+=`<div class="friend-item"><div class="friend-av">${name[0].toUpperCase()}</div><div><div class="friend-name">${name}</div><div class="friend-meta">${f.username?'@'+f.username:'ID '+f.telegram_id}</div></div><div class="friend-cards">🃏 ${f.cards_count}</div></div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){}
}

function openCardModal(card, allCards, direction){
  selectedCard=card;
  if(allCards) window._profileCards=allCards;
  const cards=window._profileCards||[];
  const idx=cards.findIndex(c=>c.id===card.id);
  const upgraded=card.is_upgraded===1;
  const title=upgraded?card.name:'Ponki #'+card.serial_number;
  const slideClass=direction===1?'slide-in-right':direction===-1?'slide-in-left':'';
  openModal(title,`
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="swipeCard(${idx},-1)" style="background:${idx>0?'var(--bg3)':'transparent'};border:1px solid ${idx>0?'var(--border)':'transparent'};color:${idx>0?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">‹</button>
      <div class="flip-container ${slideClass}" id="flip-wrap" style="flex:1">
        <div class="flip-card ${upgraded?'flipped':''}" id="flip-card">
          <div class="flip-front"><img src="/static/ponki/ponki.png" onerror="this.style.background='var(--bg3)'"></div>
          <div class="flip-back"><img src="${card.image_url}" onerror="this.style.background='var(--bg3)'"></div>
        </div>
      </div>
      <button onclick="swipeCard(${idx},1)" style="background:${idx<cards.length-1?'var(--bg3)':'transparent'};border:1px solid ${idx<cards.length-1?'var(--border)':'transparent'};color:${idx<cards.length-1?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">›</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text3);font-family:'Space Mono',monospace">${idx+1} / ${cards.length}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="stat-box"><div class="val" style="font-size:14px">#${card.serial_number}</div><div class="lbl">${t.serial}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${upgraded?dropPct(card.drop_weight):'Base'}</div><div class="lbl">${upgraded?t.drop:t.status}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px">10K</div><div class="lbl">${t.supplyLbl}</div></div>
    </div>
    ${!upgraded?`<button class="btn btn-primary" onclick="upgradeCard(${card.id})">${t.upgrade}</button>`:`
      <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>
      <button class="btn btn-secondary btn-wide" onclick="openTransferModal(${card.id})">${t.transfer}</button>
    `}
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.close}</button>
  `);
}

function swipeCard(currentIdx, direction) {
  haptic();
  const cards=window._profileCards||[];
  const newIdx=currentIdx+direction;
  if(newIdx<0||newIdx>=cards.length) return;
  openCardModal(cards[newIdx], null, direction);
}

async function upgradeCard(cardId){
  haptic('medium');
  try{
    const res=await api('/api/upgrade_card_internal','POST',{telegram_id:tgUser.id,user_card_id:cardId});
    const fc=document.getElementById('flip-card');
    const fb=fc?.querySelector('.flip-back img');
    if(fc&&fb&&res.card?.image_url){
      fb.src=res.card.image_url;
      setTimeout(()=>{
        fc.classList.add('flipped');
        fc.classList.add('shake');
        // Powerful vibration pattern
        try { navigator.vibrate && navigator.vibrate([50,30,80,30,120,50,200]); } catch(e){}
        tg?.HapticFeedback?.impactOccurred('heavy');
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('medium'); try{navigator.vibrate&&navigator.vibrate(40);}catch(e){} },800);
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('light'); try{navigator.vibrate&&navigator.vibrate(20);}catch(e){} },1400);
        setTimeout(()=>{ tg?.HapticFeedback?.notificationOccurred('success'); try{navigator.vibrate&&navigator.vibrate([30,20,30]);}catch(e){} },2200);
      },100);
    }
    if(selectedCard){ selectedCard.is_upgraded=1; if(res.card?.image_url) selectedCard.image_url=res.card.image_url; if(res.card?.name) selectedCard.name=res.card.name; if(res.card?.drop_weight) selectedCard.drop_weight=res.card.drop_weight; }
    setTimeout(async()=>{
      userData=await api(`/api/user/${tgUser.id}`); updateBalances();
      toast(`✨ ${res.card?.name||'Upgraded'}!`,'ok');
      // Update modal title to show real name
      const modalTitle=document.getElementById('modal-title');
      if(modalTitle&&res.card?.name) modalTitle.textContent=res.card.name;
      // Update stat box to show rarity
      const statBoxes=document.querySelectorAll('#modal-body .stat-box');
      if(statBoxes[1]&&res.card?.drop_weight){
        statBoxes[1].innerHTML=`<div class="val" style="font-size:14px;color:var(--star)">${dropPct(res.card.drop_weight)}</div><div class="lbl">${t.drop}</div>`;
      }
      const upgradeBtn=document.querySelector('#modal-body .btn-primary');
      if(upgradeBtn){
        upgradeBtn.outerHTML=`
          <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>
          <button class="btn btn-secondary btn-wide" onclick="openTransferModal(${cardId})">${t.transfer}</button>`;
      }
      loadProfile();
    },800);
  }catch(e){toast(e.message,'err');}
}

function openListModal(){
  const card=selectedCard;
  openModal(t.listSale,`
    <div class="modal-card-preview"><img src="${card.image_url}" onerror="this.style.background='var(--bg3)'"></div>
    <div style="font-size:12px;color:var(--text2)">${t.commission}</div>
    <div class="price-input-row"><input type="number" id="sell-price" placeholder="${t.enterPrice}" min="1"><span class="cur">⭐</span></div>
    <button class="btn btn-primary" onclick="listCard(${card.id})">${t.listSale}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.cancel}</button>
  `);
}

async function listCard(cardId){
  haptic('medium');
  const price=parseInt(document.getElementById('sell-price')?.value);
  if(!price||price<1){toast(t.enterPrice,'err');return;}
  try{await api('/api/market/list','POST',{telegram_id:tgUser.id,user_card_id:cardId,price_stars:price});closeModal();toast(`${t.listed} 🏪`,'ok');loadProfile();}catch(e){toast(e.message,'err');}
}

function openTransferModal(cardId){
  openModal(t.transfer,`
    <div style="font-size:13px;color:var(--text2);line-height:1.5">${t.enterTgId}<br><span style="font-size:11px;color:var(--text3)">${userLang==='ru'?'Стоимость: 1 ⭐':'Cost: 1 ⭐'}</span></div>
    <input class="transfer-input" id="transfer-to" placeholder="Telegram ID" type="text" inputmode="numeric" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
    <button class="btn btn-primary" onclick="doTransfer(${cardId})">${t.send}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.cancel}</button>
  `);
}

async function doTransfer(cardId){
  haptic('medium');
  const toId=parseInt(document.getElementById('transfer-to')?.value);
  if(!toId){toast(t.enterTgId,'err');return;}
  try{
    await api('/api/transfer','POST',{from_telegram_id:tgUser.id,to_telegram_id:toId,user_card_id:cardId});
    closeModal(); toast(`${t.cardSent} ✈️`,'ok');
    userData=await api(`/api/user/${tgUser.id}`); updateBalances(); loadProfile();
  }catch(e){
    if(e.message.includes('not found')||e.message.includes('404')){
      document.getElementById('modal-body').innerHTML=`<div style="text-align:center;padding:8px 0">
        <div style="font-size:36px;margin-bottom:12px">🤔</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px">${t.notInPonki}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5">${t.notJoined}<br>${userLang==='ru'?'Пригласи — получи <strong style="color:var(--star)">10%</strong>!':'Invite them — earn <strong style="color:var(--star)">10%</strong>!'}</div>
        <button class="btn btn-primary" onclick="inviteForTransfer(${toId})">${t.invite}</button>
        <button class="btn btn-secondary btn-wide" style="margin-top:8px" onclick="closeModal()">${t.cancel}</button>
      </div>`;
    } else toast(e.message,'err');
  }
}

function inviteForTransfer(toId){
  haptic();
  const link=`https://t.me/memstroybot?start=${tgUser.id}`;
  const text=userLang==='ru'?'Привет! Заходи в Ponki 🃏':'Hey! Join Ponki 🃏';
  if(tg) tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(link)}&text=${encodeURIComponent(text)}`);
  else navigator.clipboard.writeText(link).then(()=>toast(t.linkCopied,'ok'));
  closeModal();
}

function openSplitLink(){
  haptic();
  const url='https://split.tg/?ref=UQDngkmwbJxausCBgrbXcS_LmQYtGLG0-qfsaCYijyczQVap';
  if(tg) tg.openLink(url); else window.open(url,'_blank');
}

function copyRef(tgId){
  haptic();
  const link=`https://t.me/memstroybot?start=${tgId}`;
  navigator.clipboard.writeText(link).then(()=>toast(t.linkCopied,'ok')).catch(()=>toast(link));
}

let tonUI=null;
async function initTon(){
  try{
    tonUI=new TON_CONNECT_UI.TonConnectUI({manifestUrl:location.origin+'/webapp/tonconnect-manifest.json',buttonRootId:null});
    tonUI.onStatusChange(w=>{
      const label=document.getElementById('ton-label'),sub=document.getElementById('ton-sub'),arrow=document.getElementById('ton-arrow');
      if(!label) return;
      if(w){const short=w.account.address.slice(0,6)+'...'+w.account.address.slice(-4);label.textContent=userLang==='ru'?'TON подключён':'TON Connected';if(sub)sub.textContent=short;if(arrow)arrow.textContent='✓';fetch('/api/save_ton_wallet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tgUser.id,ton_address:w.account.address})}).catch(()=>{});}
      else{if(label)label.textContent=t.connectTon;if(sub)sub.textContent='';if(arrow)arrow.textContent='›';}
    });
  }catch(e){}
}
async function connectTon(){
  haptic();
  if(!tonUI) await initTon();
  if(tonUI?.wallet){if(confirm(userLang==='ru'?'Отключить кошелёк?':'Disconnect wallet?')){await tonUI.disconnect();toast('Disconnected');}}
  else tonUI?.openModal();
}

initTon();
init();
</script>
