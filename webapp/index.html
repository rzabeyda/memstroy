<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memstroy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#222;--text:#fff;--text2:#888;--text3:#444;--star:#f0c040;--dev:#4aff8a;--success:#4aff8a;--danger:#ff4a4a;--tab-h:64px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#splash{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.4s ease}
#splash.hide{opacity:0;pointer-events:none}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:0.9}50%{transform:scale(1.08);opacity:1}}
@keyframes splashDots{0%,80%,100%{transform:scale(0);opacity:0.3}40%{transform:scale(1);opacity:1}}
.splash-logo{animation:splashPulse 1.8s ease-in-out infinite}
.splash-dot{width:8px;height:8px;border-radius:50%;background:#ff2d78;display:inline-block;margin:0 3px}
.splash-dot:nth-child(1){animation:splashDots 1.2s 0s infinite}
.splash-dot:nth-child(2){animation:splashDots 1.2s 0.2s infinite}
.splash-dot:nth-child(3){animation:splashDots 1.2s 0.4s infinite}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;position:fixed;width:100%}
.page{position:absolute;inset:0;bottom:calc(54px + 22px);overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page::-webkit-scrollbar{display:none}
.page-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.badge{display:flex;align-items:center;gap:5px;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:transform 0.12s,opacity 0.15s}
.badge:active{transform:scale(0.93);opacity:0.8}
.badge-star{background:#1a1500;border:1px solid #332800;color:var(--star)}
.badge-dev{background:#0d1a0d;border:1px solid #1a3a1a;color:var(--dev)}
.tabs{position:fixed;bottom:10px;left:14px;right:14px;height:54px;padding-bottom:0;background:var(--bg2);border:1px solid var(--border);border-radius:27px;display:flex;align-items:center;z-index:100;box-shadow:0 4px 28px rgba(0,0,0,0.5)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.3px;transition:color 0.2s}
.tab-btn.active{color:#ff2d78}
.tab-btn svg{width:20px;height:20px;transition:transform 0.2s,opacity 0.2s;opacity:0.4}
.tab-btn.active svg{opacity:1;transform:scale(1.1)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;letter-spacing:0.3px;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--text);color:var(--bg);padding:14px 20px;font-size:15px;width:100%}
.btn-primary:active{box-shadow:0 0 20px rgba(255,255,255,0.3)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:12px 18px;font-size:14px}
.btn-secondary:active{border-color:var(--text3);box-shadow:0 0 12px rgba(255,255,255,0.08)}
.btn-danger{background:rgba(255,74,74,0.1);color:var(--danger);border:1px solid rgba(255,74,74,0.2);padding:10px 16px;font-size:13px}
.btn-wide{width:100%}
@keyframes ponkiPulse{0%,100%{box-shadow:0 0 20px rgba(255,45,120,0.3),0 0 40px rgba(255,45,120,0.1)}50%{box-shadow:0 0 35px rgba(255,45,120,0.6),0 0 70px rgba(255,45,120,0.25)}}
@keyframes ponkiFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
.ponki-hero{animation:ponkiFloat 3s ease-in-out infinite}
.ponki-hero-wrap{animation:ponkiPulse 2.5s ease-in-out infinite;border-radius:16px}
/* Card flip */
.flip-container{perspective:600px;width:100%;max-width:200px;margin:0 auto;aspect-ratio:1/1}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 4.0s cubic-bezier(0.4,0.2,0.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;background:var(--bg3)}
.flip-back{transform:rotateY(180deg)}
.flip-front img,.flip-back img{width:100%;height:100%;object-fit:cover}
@keyframes shakeReveal{0%{transform:rotateY(180deg) scale(1)}15%{transform:rotateY(180deg) scale(1.08) rotate(-2deg)}30%{transform:rotateY(180deg) scale(1.05) rotate(2deg)}45%{transform:rotateY(180deg) scale(1.07) rotate(-1.5deg)}60%{transform:rotateY(180deg) scale(1.03) rotate(1deg)}75%{transform:rotateY(180deg) scale(1.02) rotate(-0.5deg)}100%{transform:rotateY(180deg) scale(1) rotate(0)}}
.flip-card.shake .flip-back{animation:shakeReveal 0.6s ease-out 3.8s both}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-right{animation:slideInRight 0.25s cubic-bezier(0.32,0.72,0,1)}
.slide-in-left{animation:slideInLeft 0.25s cubic-bezier(0.32,0.72,0,1)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@keyframes cardTap{0%{transform:scale(1) rotate(0)}25%{transform:scale(0.92) rotate(-2deg)}65%{transform:scale(0.96) rotate(1.5deg)}100%{transform:scale(1) rotate(0)}}
.card-item{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.card-item:active{border-color:#ff2d78;box-shadow:0 0 14px rgba(255,45,120,0.2);animation:cardTap 0.4s ease-out forwards}
.card-img{aspect-ratio:1/1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:6px 8px}
.card-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:10px;color:var(--text2);font-family:'Inter',sans-serif;margin-top:1px}
.pct-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;font-family:'Inter',sans-serif;color:var(--star)}
.upgrade-badge{position:absolute;top:2px;right:4px;background:rgba(0,0,0,0.8);border:1px solid rgba(74,255,138,0.8);border-radius:2px;padding:1px 2px;font-size:7px;font-weight:900;color:#4aff8a;letter-spacing:0px;line-height:1;transform:scale(0.65);transform-origin:top right}
.price-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.7);border:1px solid rgba(74,255,138,0.25);border-radius:5px;padding:2px 5px;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;color:var(--dev);opacity:0.85}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cardSpin{0%{transform:perspective(400px) rotateY(0deg)}100%{transform:perspective(400px) rotateY(360deg)}}
@keyframes cardSpinFast{0%{transform:perspective(400px) rotateY(0deg)}100%{transform:perspective(400px) rotateY(360deg)}}
.ponki-hero-spin{animation:cardSpin 4s linear infinite;transform-style:preserve-3d}
.ponki-hero-spin:active{animation:cardSpinFast 0.5s linear 3,cardSpin 4s linear infinite;animation-delay:0s,1.5s}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:18px;font-weight:800;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-card-preview{aspect-ratio:1/1;max-width:200px;margin:0 auto;width:100%;border-radius:14px;overflow:hidden;background:var(--bg3)}
.modal-card-preview img{width:100%;height:100%;object-fit:cover}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.stat-box .val{font-size:18px;font-weight:800;font-family:'Inter',sans-serif}
.stat-box .lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;min-height:14px;display:flex;align-items:center;justify-content:center}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state p{font-size:14px}
.menu-item{background:var(--bg2);border:1px solid transparent;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
.menu-item:active{background:var(--bg3);border-color:var(--border)}
.menu-icon{font-size:18px;width:26px;text-align:center;display:flex;align-items:center;justify-content:center}
.menu-text{flex:1}
.menu-label{font-size:14px;font-weight:600}
.price-input-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px 4px 4px 14px}
.price-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;font-weight:700}
.price-input-row .cur{color:var(--star);font-size:13px;font-weight:700;padding:8px 12px;background:rgba(240,192,64,0.1);border-radius:7px}
.transfer-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none}
.transfer-input::placeholder{color:var(--text3)}
.friend-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.friend-name{font-size:13px;font-weight:700}
.friend-meta{font-size:11px;color:var(--text2);margin-top:1px}
.friend-cards{margin-left:auto;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.err{border-color:var(--danger);color:var(--danger)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.6s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{display:flex;align-items:center;justify-content:center;height:100%}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-btn:active{transform:scale(0.94)}
.filter-btn.active{background:#ff2d78;border-color:#ff2d78;color:#fff}
.trade-filter-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.trade-filter-btn:active{transform:scale(0.95)}
.trade-filter-btn.has-filter{border-color:#ff2d78;color:#ff2d78}
.trade-filter-count{background:#fff;color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
.bsym-7{font-family:Impact,Arial,sans-serif!important;font-size:46px!important;font-weight:900!important;color:#ff0000!important;line-height:1!important;display:block!important;-webkit-text-stroke:1px #800000!important}
.bsym-bar{display:inline-block!important;font-family:Impact,Arial,sans-serif!important;font-size:11px!important;font-weight:900!important;color:#111!important;background:#e0e0e0!important;border:2px solid #888!important;border-radius:3px!important;padding:3px 5px!important;letter-spacing:2px!important;line-height:1.2!important}
.bsym-fruit{font-size:36px!important;line-height:1!important;display:block!important}
.bsym-blank{font-size:20px!important;color:#333!important;line-height:1!important;display:block!important}
@keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1)}60%{opacity:1;transform:translateY(-40px) scale(1.2)}100%{opacity:0;transform:translateY(-80px) scale(0.9)}}
</style><style>
@keyframes pkShimmer{0%{opacity:1}50%{opacity:0.5;box-shadow:0 0 12px #f0b432}100%{opacity:1}}
.pk-step-active{animation:pkShimmer 1s ease-in-out infinite}
</style>
</head>
<body>

<div id="page-buy" class="page active">
  <div class="page-header">
    <span class="page-title" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:7px 20px;font-size:17px;font-weight:800">Магазин</span>
    <div class="badge badge-star" onclick="openSplitLink()" style="cursor:pointer;background:linear-gradient(135deg,rgba(240,192,64,0.2),rgba(240,192,64,0.05));border:1px solid rgba(240,192,64,0.5);box-shadow:0 0 12px rgba(240,192,64,0.3)"><svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle"><defs><linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe566"/><stop offset="100%" stop-color="#f0a000"/></linearGradient></defs><polygon points="12,2 14.8,8.6 22,9.5 17,14.2 18.5,21.4 12,17.8 5.5,21.4 7,14.2 2,9.5 9.2,8.6" fill="url(#sbg)"/></svg><span id="buy-stars-btn" style="color:#f0c040">Купить звёзды</span></div>
  </div>
  <div class="content" id="buy-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-sell" class="page">
  <div class="page-header">
    <span class="page-title" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:7px 20px;font-size:17px;font-weight:800">Рынок</span>
    <span onclick="openWhalesModal()" style="background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.35);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;color:#f0c040;white-space:nowrap">🐳 Киты</span>
    <div style="position:relative;display:inline-flex" onclick="openTonModal()">
      <div style="background:#0a1a2a;border:1px solid rgba(74,176,255,0.3);color:#4ab0ff;gap:5px;display:flex;align-items:center;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;cursor:pointer"><img src="/static/icons/ton.png" style="width:16px;height:16px;object-fit:contain" onerror="this.outerHTML='💎'"><span id="ton-val-trade">0</span></div>
      <div style="position:absolute;top:-6px;right:-4px;width:16px;height:16px;background:#4ab0ff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;line-height:1;pointer-events:none">+</div>
    </div>
  </div>
  <div class="content" id="trade-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-games" class="page">
  <div class="page-header">
    <span class="page-title" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:7px 20px;font-size:17px;font-weight:800">🎮 Игры</span>
    <div class="stat-box" style="border:1px solid rgba(167,139,250,0.35);cursor:pointer;padding:6px 14px;position:relative" onclick="openGemsModal()">
      <div style="position:absolute;top:-6px;right:-6px;width:16px;height:16px;background:#a78bfa;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:900;color:#fff;line-height:1">+</div>
      <div style="display:flex;align-items:center;gap:4px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M6 3L3 9L12 21L21 9L18 3Z" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.2"/><path d="M3 9L12 12L21 9" stroke="#c4b5fd" stroke-width="1"/><path d="M12 3L9 9L12 12L15 9Z" fill="#c4b5fd" opacity="0.5"/></svg><span style="font-size:14px;font-weight:800;color:#a78bfa" id="games-gems-val">0</span></div>
    </div>
  </div>
  <div class="content" id="games-content">
    <div id="games-buttons-section"></div>
  </div>
</div>

<div id="page-profile" class="page">
  <div class="content" id="profile-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-page="buy" onclick="switchTab('buy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span>Магазин</span>
  </button>
  <button class="tab-btn" data-page="sell" onclick="switchTab('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    <span>Рынок</span>
  </button>
  <button class="tab-btn" data-page="games" onclick="switchTab('games')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2c-2 0-5 3-5 8v1.5L5 15h2v2h10v-2h2l-2-3.5V10c0-5-3-8-5-8z"/><circle cx="12" cy="9" r="1.8" fill="currentColor" stroke="none"/><path d="M9 17c0 1.66 1.34 3 3 3s3-1.34 3-3"/></svg>
    <span>Игры</span>
  </button>
  <button class="tab-btn" data-page="profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span>Профиль</span>
  </button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); try { tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); } catch(e){} }
const tgUser = tg?.initDataUnsafe?.user || {id:12345678,username:'dev',first_name:'Dev'};
let userData = null, selectedCard = null;
let tonUI = null;
let isAdmin = false; // set after init

function fmtNum(n) {
  if (n >= 10000) return '10K';
  if (n >= 1000) {
    const val = Math.floor(n / 100) / 10;
    return val.toFixed(1).replace(/\.0$/,'') + 'K';
  }
  return n.toString();
}

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (method === 'POST' && body) {
    // Always include initData for server-side Telegram signature verification
    body._init_data = tg?.initData || '';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'Error'); }
  return res.json();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+type;
  setTimeout(()=>el.className='toast', 2500);
}

function haptic(type='light') {
  tg?.HapticFeedback?.impactOccurred(type);
  try { navigator.vibrate && navigator.vibrate(type==='heavy'?[30,20,30]:type==='medium'?20:10); } catch(e){}
}

function dropPct(w) {
  return {5:'0.5%',10:'1%',15:'1.5%',20:'2%',25:'2.5%',30:'3%'}[w]||w+'w';
}

function fmtTon(val) {
  // val stored as integer cents (0.1 TON = 10, 1 TON = 100)
  const n = val / 100;
  if (Number.isInteger(n)) return n.toString();
  // Show full precision, no trailing zeros
  return parseFloat(n.toPrecision(10)).toString();
}

function fmtNano(nano) {
  // nano = nanotons, show full precision no trailing zeros
  const n = nano / 1_000_000_000;
  if (n === 0) return '0';
  return parseFloat(n.toPrecision(10)).toString();
}

function updateBalances() {
  if (!userData) return;
  const tonNano = 1_000_000_000;
  const tonBal = userData.ton_balance || 0;
  const tonFmt = tonBal > 0 ? (tonBal / tonNano).toFixed(2) : '0';
  const tv = document.getElementById('ton-val-trade');
  if (tv) tv.textContent = tonFmt;
  const cb = userData.cashback_balance || 0;
  const cbEl = document.getElementById('cashback-val');
  if (cbEl) cbEl.textContent = cb===0?'0':((cb/1e9).toFixed(2).replace(/\.?0+$/,''));
  const gemsEl = document.getElementById('gems-val');
  if (gemsEl) gemsEl.textContent = userData.gems || 0;
  const gamesGemsEl = document.getElementById('games-gems-val');
  if (gamesGemsEl) gamesGemsEl.textContent = userData.gems || 0;
}

// Swipe cards in modal
let _swipeStartX=0;
let _currentMarketListing=null;
document.getElementById('modal').addEventListener('touchstart', e=>{
  _swipeStartX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('modal').addEventListener('touchend', e=>{
  // Don't swipe if user is interacting with an input/action
  const activeEl = document.activeElement;
  if(activeEl && (activeEl.tagName==='INPUT'||activeEl.tagName==='TEXTAREA')) return;
  // Don't swipe if any input exists in modal body (sell/transfer/auction mode)
  const hasInput = document.querySelector('#modal-body input, #modal-body textarea');
  if(hasInput) return;
  const dx = e.changedTouches[0].clientX - _swipeStartX;
  if(Math.abs(dx) < 50) return;
  // Profile cards swipe
  const cards = window._profileCards||[];
  const cur = selectedCard;
  if(cur && cards.length) {
    const idx = cards.findIndex(c=>c.id===cur.id);
    if(dx < 0 && idx < cards.length-1) swipeCard(idx, 1);
    else if(dx > 0 && idx > 0) swipeCard(idx, -1);
    return;
  }
  // Market listings swipe
  const mlist = window._marketListings||[];
  const ml = _currentMarketListing;
  if(ml && mlist.length) {
    const midx = mlist.findIndex(l=>l.id===ml.id);
    if(dx < 0 && midx < mlist.length-1) swipeMarketCard(midx, 1);
    else if(dx > 0 && midx > 0) swipeMarketCard(midx, -1);
  }
}, {passive:true});

async function createGiveaway(){
  haptic('medium');
  const channel = (document.getElementById('gw-channel')?.value||'').trim().replace('@','');
  const cardIds = Array.from(window._giveawaySelected||[]);
  const duration = parseInt(document.getElementById('gw-duration')?.value||'24');
  if(!channel){toast(userLang==='ru'?'Укажите хотя бы 1 канал':'Enter at least 1 channel','err');return;}
  if(!cardIds.length){toast(userLang==='ru'?'Выберите карточки':'Select cards','err');return;}
  const cleanCh = v => v.trim().replace('https://t.me/','').replace('http://t.me/','').replace('@','').replace('/','');

  const reqs = [1,2,3].map(i=>cleanCh(document.getElementById('gw-req'+i)?.value||''));
  try{
    const filter = document.getElementById('gw-filter')?.value||'all';
    await api('/api/giveaway/create','POST',{
      telegram_id:tgUser.id, channel, card_ids:cardIds,
      channel_req1:channel, channel_req2:reqs[0], channel_req3:reqs[1], channel_req4:reqs[2],
      duration_hours:duration, filter_type:filter
    });
    toast(userLang==='ru'?'🎁 Розыгрыш создан!':'🎁 Giveaway created!','ok');
    localStorage.setItem('gw_created', String(parseInt(localStorage.getItem('gw_created')||'0')+1));
    userData=await api(`/api/user/${tgUser.id}`); updateBalances();
    openGiveawaysModal();
  }catch(e){toast(e.message,'err');}
}

function onHeroTap(el){
  haptic('medium');
  const img = document.getElementById('ponki-hero-img');
  if(!img) return;
  img.style.animation = 'none';
  img.offsetHeight; // reflow
  img.style.animation = 'cardSpinFast 0.4s linear 2, cardSpin 4s linear infinite';
  img.style.animationDelay = '0s, 0.8s';
  // Sparkle effect
  for(let i=0;i<6;i++){
    const s=document.createElement('div');
    const angle=Math.random()*360;
    const dist=50+Math.random()*40;
    s.style.cssText='position:fixed;width:8px;height:8px;border-radius:50%;background:#f0c040;pointer-events:none;z-index:9999;transition:all 0.6s ease-out;opacity:1';
    const rect=el.getBoundingClientRect();
    const cx=rect.left+rect.width/2;
    const cy=rect.top+rect.height/2;
    s.style.left=cx+'px';
    s.style.top=cy+'px';
    document.body.appendChild(s);
    setTimeout(()=>{
      s.style.transform='translate('+(Math.cos(angle*Math.PI/180)*dist)+'px,'+(Math.sin(angle*Math.PI/180)*dist)+'px)';
      s.style.opacity='0';
    },10);
    setTimeout(()=>s.remove(),700);
  }
}

    userData=await api(`/api/user/${tgUser.id}`); updateBalances();
    allListings=await api('/api/market');
    const cols=await api('/api/collections');
    if(cols[0]){const d=await api(`/api/collection/${cols[0].id}`); allModelDefs=d.cards||[];}
    renderTradeUI();
  } catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

let tradeView = 'market';
let historySortBy = 'date';
let tradeSortBy = 'price_asc';

function renderTradeUI() {
  const el=document.getElementById('trade-content'); if(!el) return;
  const modCount=selectedModels.size;
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="display:flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:3px;flex-shrink:0">
        <div onclick="setTradeView('market')" style="padding:5px 10px;border-radius:16px;font-size:11px;font-weight:700;transition:all 0.2s;cursor:pointer;background:${tradeView==='market'?'#ff2d78':'transparent'};color:${tradeView==='market'?'#fff':'var(--text3)'}">
          ${userLang==='ru'?'Рынок':'Market'}
        </div>
        <div onclick="setTradeView('auction')" style="padding:5px 10px;border-radius:16px;font-size:11px;font-weight:700;transition:all 0.2s;cursor:pointer;background:${tradeView==='auction'?'#ff2d78':'transparent'};color:${tradeView==='auction'?'#fff':'var(--text3)'}">
          ${userLang==='ru'?'Аукцион':'Auction'}
        </div>

      </div>

    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px;align-items:center">
      <button class="trade-filter-btn" style="font-size:12px" onclick="openCollectionFilter()">${t.collection} <span class="trade-filter-count">1</span></button>
      <button class="trade-filter-btn ${modCount>0?'has-filter':''}" style="font-size:12px" onclick="openModelFilter()">${t.model}${modCount>0?`<span class="trade-filter-count">${modCount}</span>`:''}</button>
      <button class="trade-filter-btn ${tradeSortBy!=='price_asc'?'has-filter':''}" style="font-size:12px" onclick="openSortFilter()">
        ${tradeSortBy==='price_asc'?'Цена ↑':tradeSortBy==='price_desc'?'Цена ↓':tradeSortBy==='rarity_asc'?'% ↑':tradeSortBy==='rarity_desc'?'% ↓':tradeSortBy==='serial_desc'?'# ↓':'# ↑'}
      </button>
    </div>
    <div id="trade-market-section" style="display:${tradeView==='market'?'flex':'none'};flex-direction:column;gap:8px">

    </div>
    <div id="trade-auction-section" style="display:${tradeView==='auction'?'flex':'none'};flex-direction:column;gap:8px">
      <div id="auction-list"><div class="spinner" style="margin:32px auto"></div></div>
    </div>
    <div id="trade-history-section" style="display:${tradeView==='history'?'flex':'none'};flex-direction:column;gap:8px">
      <div class="filters" style="margin-bottom:4px">
        <button class="filter-btn ${historySortBy==='date'?'active':''}" onclick="setHistorySort('date')">${userLang==='ru'?'Новые':'New'}</button>
        <button class="filter-btn ${historySortBy==='price_asc'||historySortBy==='price_desc'?'active':''}" onclick="setHistorySort(historySortBy==='price_asc'?'price_desc':'price_asc')" style="display:flex;align-items:center;gap:3px"><img src="/static/icons/ton.png" style="width:11px;height:11px;object-fit:contain"> ${historySortBy==='price_desc'?'↓':'↑'}</button>
        <button class="filter-btn ${historySortBy==='rarity_asc'||historySortBy==='rarity_desc'?'active':''}" onclick="setHistorySort(historySortBy==='rarity_asc'?'rarity_desc':'rarity_asc')">% ${historySortBy==='rarity_desc'?'↓':'↑'}</button>
        <button class="filter-btn ${historySortBy==='serial'?'active':''}" onclick="setHistorySort('serial')">#</button>
      </div>
      <div id="history-list"><div class="spinner" style="margin:32px auto"></div></div>
    </div>`;
  if(tradeView==='market') renderListings();
  else if(tradeView==='history') loadHistory();
  else if(tradeView==='auction') loadAuctions();

function setTradeView(view) {
  haptic();
  tradeView=view;
  renderTradeUI();
}

function setHistorySort(sort) {
  haptic();
  historySortBy = sort;
  renderTradeUI();
  loadHistory();
}

function openCollectionFilter() {
  haptic();
  openModal(t.collection,`
    <div style="background:#ff2d78;color:#fff;border-radius:10px;padding:14px 16px;font-weight:700;font-size:15px;display:flex;align-items:center;justify-content:space-between">
      <span>Ponki</span><span>✓</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-secondary" style="flex:1" onclick="closeModal()">${t.clear}</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeModal()">${t.apply}</button>
    </div>
  `);
}

function openModelFilter() {
  haptic();
  const renderModels = (query='') => {
    const q = query.toLowerCase();
    const filtered = allModelDefs.filter(m=>m.name.toLowerCase().includes(q));
    let html=`<div id="model-filter-list" style="display:flex;flex-direction:column;gap:6px">`;
    for(const m of filtered){
      const sel=selectedModels.has(m.name);
      html+=`<div onclick="toggleModelSelect('${m.name}',this)" style="background:${sel?'#ff2d78':'var(--bg3)'};border:1px solid ${sel?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
        <img src="${m.image_url}" style="width:34px;height:34px;border-radius:6px;object-fit:cover" onerror="this.style.opacity=0">
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:${sel?'rgba(255,255,255,0.7)':'var(--text2)'}">${dropPct(m.drop_weight)}</div></div>
        <span style="font-size:16px;min-width:16px;text-align:right">${sel?'✓':''}</span>
      </div>`;
    }
    if(!q){
      const bs=selectedModels.has('Base');
      html+=`<div onclick="toggleModelSelect('Base',this)" style="background:${bs?'#ff2d78':'var(--bg3)'};border:1px solid ${bs?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
        <img src="/static/ponki/ponki.png" style="width:34px;height:34px;border-radius:6px;object-fit:cover">
        <div style="flex:1"><div style="font-size:13px;font-weight:700">Base</div><div style="font-size:11px;color:var(--text2)">Unupgraded</div></div>
        <span style="font-size:16px;min-width:16px;text-align:right">${bs?'✓':''}</span>
      </div>`;
    }
    html+=`</div>`;
    return html;
  };

  const html=`
    <div style="position:sticky;top:0;background:var(--bg2);padding-bottom:8px;z-index:1">
      <input id="model-search" type="text" placeholder="${userLang==='ru'?'Поиск модели...':'Search model...'}" 
        style="width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;outline:none"
        oninput="document.getElementById('model-filter-list').parentElement.innerHTML=renderModelList(this.value)">
    </div>
    <div style="max-height:48vh;overflow-y:auto;padding-bottom:4px" id="model-filter-scroll">${renderModels()}</div>
    <div style="position:sticky;bottom:0;background:var(--bg2);padding:12px 0 0;margin-top:8px;display:flex;gap:8px;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" style="flex:1" onclick="selectedModels.clear();closeModal();renderTradeUI()">${t.clear}</button>
      <button class="btn btn-primary" style="flex:1" onclick="closeModal();renderTradeUI()">${t.apply}</button>
    </div>`;
  openModal(t.model, html);
  window.renderModelList = renderModels;
  setTimeout(()=>document.getElementById('model-search')?.focus(),200);
}

function toggleModelSelect(name,el) {
  haptic();
  if(selectedModels.has(name)){selectedModels.delete(name);el.style.background='var(--bg3)';el.style.borderColor='var(--border)';el.querySelector('span:last-child').textContent='';}
  else{selectedModels.add(name);el.style.background='#ff2d78';el.style.borderColor='#ff2d78';el.querySelector('span:last-child').textContent='✓';}
}

function toggleSerialSort(){tradeSortBy=tradeSortBy==='serial_asc'?'serial_desc':'serial_asc';renderTradeUI();}
function togglePriceSort(){tradeSortBy=tradeSortBy==='price_asc'?'price_desc':'price_asc';renderTradeUI();}
function toggleTradeRarity(){tradeSortBy=tradeSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';renderTradeUI();}

function openSortFilter(){
  haptic();
  const sorts=[
    {key:'price_asc',label:userLang==='ru'?'Цена ↑':'Price ↑'},
    {key:'price_desc',label:userLang==='ru'?'Цена ↓':'Price ↓'},
    {key:'rarity_asc',label:'% ↑'},
    {key:'rarity_desc',label:'% ↓'},
    {key:'serial_asc',label:'# ↑'},
    {key:'serial_desc',label:'# ↓'},
  ];
  let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
  for(const s of sorts){
    const active = tradeSortBy===s.key;
    html+=`<div onclick="tradeSortBy='${s.key}';renderTradeUI();closeModal();" style="background:${active?'#ff2d78':'var(--bg3)'};color:${active?'#fff':'var(--text)'};border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between">${s.label}${active?'<span>✓</span>':''}</div>`;
  }
  html+=`</div>`;
  openModal(userLang==='ru'?'Сортировка':'Sort', html);
}

async function loadHistory() {
  const el=document.getElementById('history-list'); if(!el) return;
  try {
    const data=await api(`/api/market/history`);
    let items=(data.history||[]);
    // Sort
    if(historySortBy==='price_asc') items.sort((a,b)=>a.stars_amount-b.stars_amount);
    else if(historySortBy==='price_desc') items.sort((a,b)=>b.stars_amount-a.stars_amount);
    else if(historySortBy==='rarity_asc') items.sort((a,b)=>(a.drop_weight||99)-(b.drop_weight||99));
    else if(historySortBy==='rarity_desc') items.sort((a,b)=>(b.drop_weight||99)-(a.drop_weight||99));
    else if(historySortBy==='serial') items.sort((a,b)=>(a.serial_number||0)-(b.serial_number||0));
    // default: date (already sorted by created_at DESC from API)
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'Сделок пока нет':'No trades yet'}</p></div>`;
      return;
    }
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isAuction=item.type==='auction_won';
      const label=isAuction?(userLang==='ru'?'🏆 Аукцион':'🏆 Auction'):(userLang==='ru'?'Продажа':'Sale');
      const participants='';
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0">
          <img src="${item.image_url||'/static/ponki/ponki.png'}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.opacity=0">
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">Ponki · ${item.card_name||'?'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${label} · ${participants}</div>
          <div style="font-size:10px;color:var(--text3);font-family:'Inter',sans-serif">${item.created_at?(new Date(item.created_at.replace(' ','T')+'Z')).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',',''):''}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:var(--text2);white-space:nowrap;display:flex;align-items:center;gap:3px">${item.type==='market_buy_ton'?`<img src="/static/icons/ton.png" style="width:13px;height:13px;object-fit:contain"> ${fmtNano(item.stars_amount)}`:`${item.stars_amount}⭐`}</div>
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

function renderListings() {
  let list=[...allListings];
  if(selectedModels.size>0) list=list.filter(l=>selectedModels.has(l.name));
  if(tradeSortBy==='price_asc') list.sort((a,b)=>a.price_stars-b.price_stars);
  else if(tradeSortBy==='price_desc') list.sort((a,b)=>b.price_stars-a.price_stars);
  else if(tradeSortBy==='serial_asc') list.sort((a,b)=>a.serial_number-b.serial_number);
  else if(tradeSortBy==='serial_desc') list.sort((a,b)=>b.serial_number-a.serial_number);
  else if(tradeSortBy==='rarity_asc') list.sort((a,b)=>a.drop_weight-b.drop_weight);
  else if(tradeSortBy==='rarity_desc') list.sort((a,b)=>b.drop_weight-a.drop_weight);

  const el=document.getElementById('listings-list'); if(!el) return;
  if(list.length===0){el.innerHTML=`<div class="empty-state"><p>${t.noListings}</p></div>`;return;}
  window._marketListings = list;
  let html=`<div class="cards-grid">`;
  for(const l of list){
    const isOwn=l.seller_id===userData.id;
    html+=`<div class="card-item" onclick='openMarketModal(${JSON.stringify(l)},${isOwn})' style="${isOwn?'border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 10px rgba(255,255,255,0.15)':''}">
      <div class="card-img">
        <img src="${l.image_url}" onerror="this.style.opacity=0">
        <span class="pct-badge">${dropPct(l.drop_weight)}</span>
        <span class="price-badge" style="color:#4ab0ff">${fmtTon(l.price_stars)} TON</span>
      </div>
      <div class="card-info"><div class="card-name">${l.name}</div><div class="card-meta">#${l.serial_number}</div></div>
    </div>`;
  }
  html+=`</div>`; el.innerHTML=html;
}

function openMarketModal(listing, isOwn, direction) {
  _currentMarketListing = listing;
  const list = window._marketListings || [];
  const idx = list.findIndex(l => l.id === listing.id);
  const slideClass = direction === 1 ? 'slide-in-right' : direction === -1 ? 'slide-in-left' : '';
  openModal(listing.name, `
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="swipeMarketCard(${idx},-1)" style="background:${idx>0?'var(--bg3)':'transparent'};border:1px solid ${idx>0?'var(--border)':'transparent'};color:${idx>0?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">‹</button>
      <div class="flip-container ${slideClass}" style="flex:1">
        <div class="modal-card-preview" style="margin:0"><img src="${listing.image_url}" onerror="this.style.opacity=0"></div>
      </div>
      <button onclick="swipeMarketCard(${idx},1)" style="background:${idx<list.length-1?'var(--bg3)':'transparent'};border:1px solid ${idx<list.length-1?'var(--border)':'transparent'};color:${idx<list.length-1?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">›</button>
    </div>
    ${list.length>1?`<div style="text-align:center;font-size:11px;color:var(--text3);font-family:'Inter',sans-serif">${idx+1} / ${list.length}</div>`:''}
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="stat-box"><div class="val" style="font-size:14px">#${listing.serial_number}</div><div class="lbl">${t.serial}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:#4ab0ff">${fmtTon(listing.price_stars)} TON</div><div class="lbl">${t.price}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${dropPct(listing.drop_weight)}</div><div class="lbl">${t.drop}</div></div>
    </div>
    ${isOwn
      ?`<div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-secondary btn-wide" onclick="openChangePriceModal(${listing.id},${listing.price_stars})">${userLang==='ru'?'Изменить цену':'Change price'}</button>
        <button class="btn btn-danger btn-wide" onclick="unlistCard(${listing.id})">${t.remove}</button>
       </div>`
      :`<div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" onclick="buyListing(${listing.id},${listing.price_stars})">${t.buy} ${fmtTon(listing.price_stars)} TON</button>
        <button class="btn btn-secondary btn-wide" onclick="openOfferModal(${listing.user_card_id},'${listing.name}','${listing.image_url}')">${userLang==='ru'?'Предложить цену':'Make offer'}</button>
       </div>`
    }
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.close}</button>
  `);
}

function swipeMarketCard(currentIdx, direction) {
  haptic();
  const list = window._marketListings || [];
  const newIdx = currentIdx + direction;
  if (newIdx < 0 || newIdx >= list.length) return;
  const listing = list[newIdx];
  const isOwn = listing.seller_id === userData.id;
  openMarketModal(listing, isOwn, direction);
}

async function buyListing(id,price){
  haptic('medium');
  const tonNano = 1_000_000_000;
  const priceNano = price * 10_000_000; // price stored as cents (0.1 TON = 10), convert to nano
  const bal = userData?.ton_balance || 0;
  if(bal < priceNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${(bal/tonNano).toFixed(2)}`:`Not enough TON. Balance: ${(bal/tonNano).toFixed(2)}`,'err');
    return;
  }
  try{
    await api('/api/market/buy_ton','POST',{telegram_id:tgUser.id,listing_id:id});
    closeModal();
    toast(userLang==='ru'?'Куплено!':'Purchased!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    loadTrade();
  }catch(e){toast(e.message,'err');}
}
function openChangePriceModal(listingId, currentPrice){
  haptic();
  const currentTon = (currentPrice/100).toFixed(2);
  openModal(userLang==='ru'?'Изменить цену':'Change price',`
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${userLang==='ru'?'Текущая цена:':'Current price:'} <b style="color:#4ab0ff">${currentTon} TON</b></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:6px">${userLang==='ru'?'Новая цена:':'New price:'}</div>
    <div class="price-input-row"><input type="number" id="new-price-input" placeholder="${currentTon}" min="0.01" step="0.01" value="${currentTon}"><span class="cur" style="color:#4ab0ff">TON</span></div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${t.commission}</div>
    <button class="btn btn-primary btn-wide" onclick="changeListingPrice(${listingId})">${userLang==='ru'?'Сохранить':'Save'}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.cancel}</button>
  `);
}

async function changeListingPrice(listingId){
  haptic('medium');
  const priceInput = parseFloat(document.getElementById('new-price-input')?.value);
  if(!priceInput||priceInput<0.1){toast(userLang==='ru'?'Минимум 0.10 TON':'Min 0.10 TON','err');return;}
  const price = Math.round(priceInput*100);
  try{
    await api('/api/market/change_price','POST',{telegram_id:tgUser.id,listing_id:listingId,price_dev:price});
    closeModal();
    toast(userLang==='ru'?'Цена обновлена!':'Price updated!','ok');
    loadTrade();
  }catch(e){toast(e.message,'err');}
}

async function unlistCard(id){
  haptic();
  try{await api('/api/market/unlist','POST',{telegram_id:tgUser.id,listing_id:id});closeModal();toast(t.removed,'ok');loadTrade();}catch(e){toast(e.message,'err');}
}

// ── PROFILE ──
let profileSortBy='serial_asc';
let profileView='cards'; // 'cards' or 'history'

async function loadProfile() {
  const el=document.getElementById('profile-content');
  try {
    userData=await api(`/api/user/${tgUser.id}`); updateBalances();
    let cards=userData.cards||[];
    const devBal=userData.dev_tokens??0;
    if(profileSortBy==='serial_asc') cards.sort((a,b)=>a.serial_number-b.serial_number);
    else if(profileSortBy==='serial_desc') cards.sort((a,b)=>b.serial_number-a.serial_number);
    else if(profileSortBy==='rarity_asc') cards.sort((a,b)=>{
      if(!a.is_upgraded&&b.is_upgraded) return 1;
      if(a.is_upgraded&&!b.is_upgraded) return -1;
      return a.drop_weight-b.drop_weight;
    });
    else if(profileSortBy==='rarity_desc') cards.sort((a,b)=>{
      if(!a.is_upgraded&&b.is_upgraded) return 1;
      if(a.is_upgraded&&!b.is_upgraded) return -1;
      return b.drop_weight-a.drop_weight;
    });

    let cardsHtml='';
    if(cards.length===0){
      cardsHtml=`<div class="empty-state" style="padding:24px 0"><p>${t.noCards}</p></div>`;
    } else {
      const showAll=window._showAllCards||false;
      const vis=showAll?cards:cards.slice(0,3);
      cardsHtml=`
        <div class="filters" style="margin-bottom:4px;display:flex;align-items:center;justify-content:space-between">
          <div style="display:flex;gap:6px">
            <button class="filter-btn ${profileSortBy==='serial_asc'||profileSortBy==='serial_desc'?'active':''}" onclick="toggleProfileSerial()"># ${profileSortBy==='serial_desc'?'↓':'↑'}</button>

function toggleProfileSerial(){haptic();profileSortBy=profileSortBy==='serial_asc'?'serial_desc':'serial_asc';loadProfile();}
function toggleProfileRarity(){haptic();profileSortBy=profileSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';loadProfile();}

function setProfileView(view) {
  haptic();

  loadProfile().then(()=>{
    if(view==='selling') loadProfileSelling();

    if(view==='history') loadProfileHistory();

async function loadProfileHistory() {
  const el=document.getElementById('profile-history-list'); if(!el) return;
  try {
    const data=await api(`/api/history/${tgUser.id}`);
    const items=data.history||[];
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'История пуста':'No history yet'}</p></div>`;
      return;
    }
    const typeLabel=(type,isIncome)=>{
      if(userLang==='ru'){
        if(type==='buy'||type==='payment') return '🃏 Куплено';
        if(type==='market_buy'||type==='market_buy_ton'||type==='market_buy_offer') return isIncome?'💰 Продано':'🃏 Куплено';
        if(type==='upgrade') return '✨ Улучшено';
        if(type==='transfer') return isIncome?'📥 Получено':'📤 Передано';
        if(type==='auction_won') return isIncome?'🏆 Продано на аукционе':'🏆 Выиграно на аукционе';
        if(type==='buy_stars') return '⭐ Пополнение';
        return type;
      } else {
        if(type==='buy'||type==='payment') return '🃏 Bought';
        if(type==='market_buy'||type==='market_buy_ton'||type==='market_buy_offer') return isIncome?'💰 Sold':'🃏 Bought';
        if(type==='upgrade') return '✨ Upgraded';
        if(type==='transfer') return isIncome?'📥 Received':'📤 Transferred';
        if(type==='auction_won') return isIncome?'🏆 Auction sold':'🏆 Auction won';
        if(type==='buy_stars') return '⭐ Stars added';
        return type;
      }
    };
    const typeIcon=(type)=>`<img src="/static/ponki/ponki.png" style="width:100%;height:100%;object-fit:cover">`;
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id&&item.stars_amount>0&&item.type!=='buy';
      const timeStr=item.created_at?((d=>{
        const dt=new Date(d+'Z'); // treat as UTC
        return dt.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',','');
      })(item.created_at.replace(' ','T'))):'';
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">
          <img src="${item.image_url||'/static/ponki/ponki.png'}" style="width:100%;height:100%;object-fit:cover" onerror="this.src='/static/ponki/ponki.png'">
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${item.card_name||'Ponki'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${typeLabel(item.type,isIncome)}</div>
          ${timeStr?`<div style="font-size:10px;color:var(--text3);margin-top:1px;font-family:'Inter',sans-serif">${timeStr}</div>`:''}
        </div>
        ${item.stars_amount>0?`<div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap">${isIncome?'+':'−'}${item.type==='market_buy_ton'?`<span style="display:inline-flex;align-items:center;gap:2px"><img src="/static/icons/ton.png" style="width:12px;height:12px;object-fit:contain"> ${fmtNano(item.stars_amount)}</span>`:`${item.stars_amount}⭐`}</div>`:''}
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

let _friendsCache = null;
async function loadFriends(){
  try{
    const data=await api(`/api/friends/${tgUser.id}`);
    _friendsCache=data.friends||[];
    const cnt = _friendsCache.length;
    const fc=document.getElementById('friends-count'); if(fc) fc.textContent=cnt;
    const fm=document.getElementById('friends-menu-count'); if(fm) fm.textContent=cnt;
  }catch(e){}
}

function openFriendsModal(){
  haptic();
  const friends=_friendsCache||[];
  let html='';
  if(friends.length===0){
    html=`<div class="empty-state"><p>${t.noFriends}</p></div>`;
  } else {
    html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const f of friends){
      const name=f.first_name||f.username||'User';
      const colors=['#ff2d78','#4ab0ff','#4aff8a','#f0c040','#ff8c00'];
      const color=colors[(name.charCodeAt(0)||0)%colors.length];
      html+=`<div class="friend-item">
        <div class="friend-av" style="background:${color+'22'};border-color:${color+'44'};color:${color};font-size:17px">${name[0].toUpperCase()}</div>

          <div class="friend-meta">${f.username?'@'+f.username:'ID '+f.telegram_id}</div>

    html+=`</div>`;
  }
  openModal(userLang==='ru'?'Мои друзья':'My Friends', html);

async function doTransfer(cardId){
  haptic('medium');
  const rawInput=(document.getElementById('transfer-to')?.value||'').trim();
  if(!rawInput){toast(t.enterTgId,'err');return;}
  const isUsername=rawInput.startsWith('@')||isNaN(rawInput);
  const toId=isUsername?rawInput.replace('@',''):parseInt(rawInput);
  if(!toId){toast(t.enterTgId,'err');return;}

  // First check if user exists in bot
  try {
    const checkRes = await api('/api/check_user','POST',{query: String(rawInput.replace('@',''))});
    if(!checkRes.found){
      // User not in bot - show invite screen
      openModal(t.transfer,
        '<div style="text-align:center;padding:8px 0">'
        + '<div style="font-size:36px;margin-bottom:12px">🤔</div>'
        + '<div style="font-size:15px;font-weight:700;margin-bottom:8px">'+(userLang==="ru"?"Этот пользователь ещё не в боте":"This user is not in the bot yet")+'</div>'
        + '<div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5">'+(userLang==="ru"?"Сначала пригласите друга в бота, затем передайте карточку":"Invite your friend to the bot first, then transfer the card")+'</div>'
        + '<button class="btn btn-primary btn-wide" style="background:linear-gradient(135deg,#ff2d78,#ff6eb0);border:none" onclick="shareRefLink(tgUser.id)">'
          + (userLang==="ru"?"📤 Пригласить друга":"📤 Invite friend")
        + '</button>'
        + '<button class="btn btn-secondary btn-wide" style="margin-top:8px" onclick="closeModal()">'+(userLang==="ru"?"Отмена":"Cancel")+'</button>'
        + '</div>'
      );
      return;
    }
  } catch(e){ /* if check_user fails, proceed anyway */ }

  // User exists - proceed with transfer invoice
  // Admin transfers for free — server validates
  if(isAdmin){
    try{
      await api('/api/transfer','POST',{from_telegram_id:tgUser.id,to_telegram_id:toId,user_card_id:cardId});
      toast(t.cardSent,'ok');
      userData=await api(`/api/user/${tgUser.id}`); updateBalances(); loadProfile();
      closeModal();
    }catch(e){toast(e.message,'err');}
    return;
  }
  try {
    const res = await api('/api/create_invoice','POST',{
      telegram_id: tgUser.id, collection_id: 0, qty: 1,
      purpose: 'transfer', card_id: cardId, to_id: String(toId)
    });
    if(res.invoice_link) {
      closeModal();
      tg.openInvoice(res.invoice_link, async (status) => {
        if(status === 'paid') {
          try {
            await api('/api/transfer','POST',{from_telegram_id:tgUser.id,to_telegram_id:toId,user_card_id:cardId});
          } catch(e2){}
          toast(t.cardSent,'ok');
          userData=await api(`/api/user/${tgUser.id}`); updateBalances(); loadProfile();
        } else if(status === 'cancelled' || status === 'failed') {
          toast(userLang==='ru'?'Отменено':'Cancelled','');
        }
      });
    }
  } catch(e){ toast(e.message,'err'); }
}

      {key:'cashback', label:userLang==='ru'?'Кешбэк':'Cashback'},
    ];
    const getVal = (u) => {
      if(_whaleCategory==='friends') return (u.friends_count||u.score||0)+' 👥';
      if(_whaleCategory==='cashback'){const v=(u.score||0)/1e9;return `${v===0?'0':v.toFixed(2).replace(/\.?0+$/,'')} TON`;}
      if(_whaleCategory==='cards') return `${u.cards_count||u.score||0} 🃏`;
      if(_whaleCategory==='gems') return `${u.score||0} 💎`;
      return `⭐${(u.stars_spent||0).toLocaleString()}`;
    };
    let html = `<div style="display:flex;gap:4px;margin-bottom:10px;background:var(--bg3);border-radius:12px;padding:3px">
      ${cats.map(c=>`<div onclick="setWhaleCategory('${c.key}')" style="flex:1;text-align:center;padding:6px 2px;border-radius:9px;font-size:11px;font-weight:700;cursor:pointer;background:${_whaleCategory===c.key?'#ff2d78':'transparent'};color:${_whaleCategory===c.key?'#fff':'var(--text3)'};transition:all 0.2s">${c.label}</div>`).join('')}
    </div><div style="display:flex;flex-direction:column;gap:6px">`;
    if(!list.length) {
      html += `<div class="empty-state"><p>${userLang==='ru'?'Ещё никого':'No one yet'}</p></div>`;
    } else {
      list.forEach((u,i)=>{
        const rank=i+1;
        const isMe=userData&&u.telegram_id===userData.telegram_id;
        const name=u.first_name||u.username||'User';
        html+=`<div style="background:${isMe?'rgba(255,45,120,0.08)':'var(--bg2)'};border:1px solid ${isMe?'rgba(255,45,120,0.4)':'rgba(255,255,255,0.07)'};border-radius:12px;padding:10px 12px;display:flex;align-items:center;gap:10px">
          <div style="min-width:26px;text-align:center;font-size:${rank<=3?'17':'12'}px;font-weight:800;color:${rankColors[rank-1]||'var(--text2)'}">${medals[rank-1]||'#'+rank}</div>
          <div style="width:32px;height:32px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0">${(name[0]||'?').toUpperCase()}</div>
          <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:700">${name}${isMe?` <span style="color:#ff2d78;font-size:10px">(${userLang==='ru'?'ты':'you'})</span>`:''}</div></div>
          <div style="font-size:12px;font-weight:800;color:var(--star);flex-shrink:0">${getVal(u)}</div>
        </div>`;
      });
    }
    if(myRow&&myRank>20) html+=`<div style="border-top:1px solid var(--border);padding-top:8px;margin-top:4px"><div style="background:rgba(255,45,120,0.08);border:1px solid rgba(255,45,120,0.4);border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700">#${myRank} ${myRow.first_name||myRow.username||'Ты'} — ${getVal(myRow)}</div></div>`;
    html += '</div>';
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`; }
}

async function initTon(){
  if(tonUI) return;
  try{
    tonUI=new TON_CONNECT_UI.TonConnectUI({manifestUrl:location.origin+'/webapp/tonconnect-manifest.json',buttonRootId:null});
    let _tonFirstLoad=true;
    tonUI.onStatusChange(w=>{
      if(w){
        userData.ton_address = w.account.address;
        fetch('/api/save_ton_wallet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tgUser.id,ton_address:w.account.address})}).catch(()=>{});
        if(!_tonFirstLoad) toast(userLang==='ru'?'Кошелёк подключён ✓':'Wallet connected ✓','ok');
        closeModal();
      } else {
        userData.ton_address = '';
      }
      _tonFirstLoad=false;
    });
  }catch(e){}
}
async function connectTon(){
  haptic();
  if(!tonUI) await initTon();
  if(!tonUI){ toast('TON недоступен','err'); return; }
  if(tonUI.wallet){
    if(confirm(userLang==='ru'?'Отключить кошелёк?':'Disconnect wallet?')){
      await tonUI.disconnect();
      userData.ton_address='';
      closeModal();
      toast(userLang==='ru'?'Кошелёк отключён':'Disconnected');
    }
  } else {
    try {
      await tonUI.openModal();
    } catch(e) {
      toast('Ошибка подключения: '+e.message,'err');
    }
  }
}

async function disconnectTon(){
  haptic();
  if(!confirm(userLang==='ru'?'Отключить кошелёк?':'Disconnect wallet?')) return;
  try { if(tonUI?.wallet) await tonUI.disconnect(); } catch(e){}
  userData.ton_address='';
  try { await fetch('/api/save_ton_wallet',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({telegram_id:tgUser.id,ton_address:''})}); } catch(e){}
  userData = await api(`/api/user/${tgUser.id}`).catch(()=>userData);
  updateBalances();
  closeModal();
  toast(userLang==='ru'?'Кошелёк отключён':'Disconnected');
}

async function doTonDeposit(botAddr, memo){
  haptic('medium');
  const amountTon = parseFloat(document.getElementById('ton-dep-amount')?.value);
  if(!amountTon || amountTon < 0.1){ toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err'); return; }
  if(!tonUI?.wallet){ toast(userLang==='ru'?'Подключи кошелёк':'Connect wallet first','err'); return; }

  const amountNano = Math.floor(amountTon * 1_000_000_000).toString();

  try {
    await tonUI.sendTransaction({
      validUntil: Math.floor(Date.now() / 1000) + 360,
      messages: [{
        address: botAddr,
        amount: amountNano
      }]
    });
    // Optimistic credit - trust TonConnect confirmation
    const res = await api('/api/ton/deposit_confirm','POST',{
      telegram_id: tgUser.id,
      amount_nano: parseInt(amountNano),
      init_data: tg?.initData || ''
    });
    userData.ton_balance = res.ton_balance;
    updateBalances();
    toast(`+${amountTon} TON ${userLang==='ru'?'зачислено':'credited'}!`,'ok');
    const el = document.getElementById('ton-action-area');
    if(el) el.innerHTML='';
    // Reload and close modal, go back to where user was
    setTimeout(async()=>{
      userData = await api(`/api/user/${tgUser.id}`);
      updateBalances();
      closeModal();
      // Go to trade if on trade tab, else profile
      const activeTab = document.querySelector('.tab-btn.active')?.dataset?.page;
      if(activeTab === 'sell') loadTrade();
      else { profileView='cards'; loadProfile(); switchTab('profile'); }
    }, 800);
  } catch(e){
    const msg = (e?.message||'').toLowerCase();
    if(msg.includes('cancel')||msg.includes('reject')||msg.includes('denied')||msg.includes('user')){
      toast(userLang==='ru'?'Отменено':'Cancelled','');
    } else {
      toast(e?.message||'Error','err');
    }
  }
}

  }

async function doTonWithdraw(){
  haptic('medium');
  const amount = parseFloat(document.getElementById('ton-withdraw-amount')?.value);
  if(!amount||amount<0.1){toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err');return;}
  const addr = tonUI?.wallet?.account?.address || userData?.ton_address || '';
  if(!addr){toast(userLang==='ru'?'Подключи кошелёк сначала':'Connect wallet first','err');return;}
  const bal = userData?.ton_balance||0;
  const amountNano = Math.floor(amount*1_000_000_000);
  if(bal < amountNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${fmtNano(bal)}`:`Not enough TON. Balance: ${fmtNano(bal)}`,'err');
    return;
  }
  // Защита от двойного нажатия
  const btn = document.querySelector('#modal-body .btn-primary');
  if(btn){ btn.disabled=true; btn.textContent=userLang==='ru'?'Отправка...':'Sending...'; }
  try {
    const res = await api('/api/ton/withdraw','POST',{telegram_id:tgUser.id,amount,to_address:addr});
    userData.ton_balance = (userData.ton_balance||0) - amountNano;
    updateBalances();
    toast(userLang==='ru'?`✅ Вывод ${amount} TON обрабатывается`:`✅ Withdrawal ${amount} TON processing`,'ok');
    setTimeout(()=>closeModal(), 2000);
  } catch(e){
    toast(e.message,'err');
    if(btn){ btn.disabled=false; btn.textContent=userLang==='ru'?'Вывести':'Withdraw'; }
  }
}

async function loadAuctions(){
  const el = document.getElementById('auction-list');
  if(!el) return;
  el.innerHTML = '<div class="spinner" style="margin:32px auto"></div>';
  try {
    const auctions = await api('/api/auctions');
    if(auctions.length === 0){
      el.innerHTML = `<div class="empty-state"><p>${userLang==='ru'?'Нет активных аукционов':'No active auctions'}</p></div>`;
      return;
    }
    let html = `<div style="display:flex;flex-direction:column;gap:10px">`;
    for(const a of auctions){
      const isOwn = a.seller_id === userData?.id;
      const isBidder = a.current_bidder_id === userData?.id;
      const price = (a.current_price_nano/1e9).toFixed(2).replace(/\.?0+$/,'');
      const minBid = ((a.current_price_nano + a.min_step_nano)/1e9).toFixed(2).replace(/\.?0+$/,'');
      const endsAt = new Date(a.ends_at.replace(' ','T')+'Z');
      const now = new Date();
      const diff = Math.max(0, endsAt - now);
      const hrs = Math.floor(diff/3600000);
      const mins = Math.floor((diff%3600000)/60000);
      const secs = Math.floor((diff%60000)/1000);
      const timeStr = hrs>0 ? `${hrs}ч ${mins}м` : `${mins}м ${secs}с`;
      html += `<div style="background:var(--bg2);border:1px solid ${isOwn?'rgba(74,176,255,0.4)':isBidder?'rgba(74,255,138,0.3)':'rgba(255,255,255,0.07)'};border-radius:14px;overflow:hidden">
        <div style="display:flex;gap:10px;padding:12px">
          <div style="width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg3)">
            <img src="${a.image_url}" style="width:100%;height:100%;object-fit:cover">
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">Ponki · ${a.card_name} <span style="color:var(--text2);font-weight:400">#${a.serial_number}</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${dropPct(a.drop_weight)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
              <img src="/static/icons/ton.png" style="width:14px;height:14px;object-fit:contain">
              <span style="font-size:16px;font-weight:800;color:#4ab0ff">${price}</span>
              <span style="font-size:11px;color:var(--text3)">${a.current_bidder_id?userLang==='ru'?'тек. ставка':'current bid':userLang==='ru'?'старт':'start'}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:var(--danger);font-weight:700">⏱ ${timeStr}</div>
            ${a.current_bidder_id?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${a.bidder_name||'@'+a.bidder_username||'?'}</div>`:''}
          </div>
        </div>
        ${!isOwn?`<div style="padding:0 12px 12px">
          <button class="btn btn-primary btn-wide" onclick="openBidModal(${a.id},'${a.card_name}',${a.current_price_nano},${a.min_step_nano},'${price}','${minBid}')" style="font-size:13px;padding:10px">
            ${userLang==='ru'?'Сделать ставку':'Place bid'} — от ${minBid} TON
          </button>
        </div>`:`<div style="padding:0 12px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="font-size:12px;color:var(--text2)">${userLang==='ru'?'Ваш аукцион':'Your auction'}</div>
          ${!a.current_bidder_id?`<button class="btn btn-danger" style="padding:8px 14px;font-size:12px" onclick="cancelAuction(${a.id})">${userLang==='ru'?'Отменить':'Cancel'}</button>`:''}
        </div>`}
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`; }
}

    const need = tonNeeded.toFixed(2);
    toast(userLang==='ru'?`Нужно ${need} TON, у вас ${have}`:`Need ${need} TON, have ${have}`,'err');
    return;
  }
  try{
    const res = await api('/api/gems/buy_ton','POST',{telegram_id:tgUser.id, gems:amount});
    userData = await api(`/api/user/${tgUser.id}`);
    updateBalances();
    closeModal();
    toast(`+${amount} ${_gemSvg16}`,'ok');
    loadProfile();
  }catch(e){toast(e.message,'err');}
}

async function playRedBlack(){
  haptic('heavy');

  if(!choice){toast(userLang==='ru'?'Выберите цвет':'Choose a color','err');return;}

  // Card flip animation
  if(resultEl) resultEl.innerHTML=`
    <div id="rb-card" style="width:70px;height:100px;margin:0 auto;perspective:600px;cursor:default">
      <div id="rb-card-inner" style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1)">

      </div>
    </div>`;

  try{
    await new Promise(r=>setTimeout(r,400));
    const res = await api('/api/games/redblack','POST',{telegram_id:tgUser.id,bet,choice});

    // Flip card
    const inner = document.getElementById('rb-card-inner');
    const front = document.getElementById('rb-card-front');
    if(inner && front){
      const isRed = res.result==='red';
      const isZero = res.result==='zero';
      front.style.background = isZero?'linear-gradient(135deg,#1a3a1a,#0d1f0d)':isRed?'linear-gradient(135deg,#4a0000,#800000)':'linear-gradient(135deg,#0a0a0a,#1a1a1a)';
      front.style.borderColor = isZero?'#4aff8a':isRed?'#ff4a4a':'#666';
      front.textContent = isZero?'0':isRed?'♥':'♠';
      inner.style.transform='rotateY(180deg)';
    }

    await new Promise(r=>setTimeout(r,800));

    const won = res.won;
    if(resultEl){
      const existing = resultEl.querySelector('#rb-card');
      const cardHtml = existing ? existing.outerHTML : '';
      resultEl.innerHTML=`${cardHtml}
        <div style="margin-top:10px;font-size:20px;font-weight:900;color:${won?'var(--success)':'var(--danger)'}">${won?'+'+res.delta:''+res.delta} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:middle"><path d="M6 3L3 9L12 21L21 9L18 3Z" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.2"/><path d="M3 9L12 12L21 9" stroke="#c4b5fd" stroke-width="1"/><path d="M12 3L9 9L12 12L15 9Z" fill="#c4b5fd" opacity="0.5"/></svg></div>

    }
    userData.gems = res.gems;
    updateBalances();
    const gemsEl = document.getElementById('gems-val');
    if(gemsEl) gemsEl.textContent = res.gems;
    const gamesGemsEl = document.getElementById('games-gems-val');
    if(gamesGemsEl) gamesGemsEl.textContent = res.gems;
    const rbGemsEl = document.getElementById('rb-gems-display');
    if(rbGemsEl) rbGemsEl.firstChild.textContent = res.gems + ' ';
    if(btn){btn.disabled=false;btn.textContent=userLang==='ru'?'🎲 Крутить ещё!':'🎲 Again!';}
    window._rbChoice=null;
    const red=document.getElementById('rb-red'),black=document.getElementById('rb-black');
    if(red){red.style.opacity='0.7';red.style.background='linear-gradient(135deg,#7c0000,#c0392b)';red.style.boxShadow='';}
    if(black){black.style.opacity='0.7';black.style.background='linear-gradient(135deg,#111,#222)';black.style.boxShadow='';}
  }catch(e){
    toast(e.message,'err');
    if(btn){btn.disabled=false;btn.textContent=userLang==='ru'?'🎲 Играть!':'🎲 Play!';}

async function doSpin(){
  haptic('medium');
  const btn = document.getElementById('spin-btn');
  if(btn) btn.disabled = true;
  const spinSymbols = ['7️⃣','BAR','🍒','🍇','🍋','💎'];
  const reels = [0,1,2].map(i=>document.getElementById(`slot-reel-${i}`));

  let ticks = 0;
  const interval = setInterval(()=>{
    reels.forEach(r=>{ if(r) r.textContent = spinSymbols[Math.floor(Math.random()*spinSymbols.length)]; });
    ticks++;
    if(ticks > 20) clearInterval(interval);
  }, 80);

  try{
    await new Promise(r=>setTimeout(r,300));
    const res = await api('/api/tasks/spin','POST',{telegram_id:tgUser.id});
    await new Promise(r=>setTimeout(r,1400));
    clearInterval(interval);

    const comboMap = window._BANDIT_COMBO_MAP;
    const combo = comboMap[res.combo] || comboMap['miss'];
    reels.forEach((r,i)=>{ if(r){ r.textContent=combo.syms[i]; r.style.borderColor=combo.color; r.style.boxShadow=res.prize>0?'0 0 12px '+combo.color+'44':'none'; }});

    const resultEl = document.getElementById('slot-result');
    if(resultEl){
      const prize = res.prize;
      if(prize > 0){
        resultEl.innerHTML = `
          <div style="display:inline-flex;flex-direction:column;align-items:center;background:${combo.color+'18'};border:1px solid ${combo.color+'44'};border-radius:12px;padding:8px 20px;gap:2px">
            <div style="font-size:13px;color:${combo.color};font-weight:700">${combo.label} ${combo.mult}</div>
            <div style="font-size:22px;font-weight:900;color:${prize>=50?'#f0c040':prize>=15?'var(--success)':'#a78bfa'}">+${prize} 💎</div>
          </div>`;
      } else {
        resultEl.innerHTML = `<div style="font-size:13px;color:var(--text3);padding:8px">😔 ${userLang==='ru'?'Не повезло':'No luck'}</div>`;
      }
    }
    if(btn){ btn.textContent='✓'; btn.style.background='var(--bg3)'; }
    haptic('heavy');
    userData = await api(`/api/user/${tgUser.id}`);
    updateBalances();
    setTimeout(()=>{ closeModal(); loadProfile(); }, 2000);
  }catch(e){
    clearInterval(interval);
    toast(e.message,'err');
    if(btn){ btn.disabled=false; }
  }
}

  const el = document.getElementById('rlt-total');

  for(let i=0;i<=36;i++){const b=document.getElementById(`rlt-n-${i}`);if(b)b.style.outline=nums.includes(i)?'2px solid #fff9':'none';}

async function doRoulette(){
  haptic('medium');
  const btn=document.getElementById('rlt-spin-btn');
  if(btn) btn.disabled=true;

  const chip = window._rltChipSize||10;
  const nums = [...(window._rltNums||[])];
  const quicks = [...(window._rltQuicks||[])];

  if(nums.length===0 && quicks.length===0){
    toast(userLang==='ru'?'Сделай ставку':'Make a bet','err');
    if(btn) btn.disabled=false; return;
  }

  const totalBet = (nums.length + quicks.length) * chip;
  if((userData?.gems||0) < totalBet){
    toast(userLang==='ru'?'Недостаточно гемов':'Not enough gems','err');
    if(btn) btn.disabled=false; return;
  }

  // Build bets array: [{bet_type, bet_value, bet}]
  const bets = [];
  for(const q of quicks){
    const map={red:'color',black:'color',even:'parity',odd:'parity',low:'half',high:'half'};
    bets.push({bet_type:map[q], bet_value:q, bet:chip});
  }
  for(const n of nums){
    bets.push({bet_type:'number', bet_value:[n], bet:chip});
  }

  const ballEl=document.getElementById('rlt-ball');
  const nums37=Array.from({length:37},(_,i)=>i);
  let tick=0;
  const iv=setInterval(()=>{
    const rn=nums37[Math.floor(Math.random()*37)];
    if(ballEl){
      const isR=ROULETTE_REDS.has(rn);
      ballEl.style.background=rn===0?'radial-gradient(circle,#1a5c1a,#0a2e0a)':isR?'radial-gradient(circle,#5c1a1a,#2e0a0a)':'radial-gradient(circle,#111,#0a0a0a)';
      ballEl.textContent=rn; ballEl.style.color=rn===0?'#4aff8a':isR?'#ff6b6b':'#ccc';
    }
    tick++; if(tick>25) clearInterval(iv);
  },70);

  try{
    const res=await api('/api/games/roulette_multi','POST',{telegram_id:tgUser.id, bets});
    await new Promise(r=>setTimeout(r,1800));
    clearInterval(iv);

    const num=res.number;
    const isRed=ROULETTE_REDS.has(num);
    if(ballEl){
      ballEl.textContent=num; ballEl.style.fontWeight='900';
      ballEl.style.color=num===0?'#4aff8a':isRed?'#ff6b6b':'#ccc';
      ballEl.style.background=num===0?'radial-gradient(circle,#1a5c1a,#0a2e0a)':isRed?'radial-gradient(circle,#5c1a1a,#2e0a0a)':'radial-gradient(circle,#111,#0a0a0a)';
      ballEl.style.boxShadow=res.net_win>0?`0 0 20px ${num===0?'#4aff8a66':isRed?'#ff6b6b66':'#aaa66'}`:'none';
    }

    const resultEl=document.getElementById('rlt-result-num');
    if(resultEl){
      if(res.net_win>0){
        resultEl.innerHTML=`<span style="color:#4aff8a;font-weight:700;font-size:15px">+${res.net_win} 💎 ${userLang==='ru'?'Выигрыш!':'Win!'}</span>`;
        haptic('heavy');
      } else if(res.net_win===0){
        resultEl.innerHTML=`<span style="color:#f0c040;font-size:13px">${userLang==='ru'?'Возврат':'Push'}</span>`;
      } else {
        resultEl.innerHTML=`<span style="color:#ff6b6b;font-size:13px">${res.net_win} ${_gemSvg12} ${userLang==='ru'?'Не повезло':'No luck'}</span>`;
      }
    }

    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    const balEl=document.getElementById('rlt-balance');
    if(balEl) balEl.textContent=userData.gems||0;
    // Save last bet for rebet
    window._lastRltBet = {chip, quicks:[...quicks], nums:[...nums]};
    // Reset selections
    window._rltNums=new Set(); window._rltQuicks=new Set();
    document.querySelectorAll('[id^="rlt-n-"],[id^="rlt-b-"]').forEach(b=>{b.style.outline='none';b.style.opacity='1';});
    updateRltTotal();
    if(btn){btn.disabled=false; btn.textContent='🎡 '+(userLang==='ru'?'Крутить ещё!':'Spin again!');}
  }catch(e){
    clearInterval(iv);
    toast(e.message,'err');
    if(btn) btn.disabled=false;
  }
}
