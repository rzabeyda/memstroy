<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memstroy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#222;--text:#fff;--text2:#888;--text3:#444;--star:#f0c040;--dev:#4aff8a;--success:#4aff8a;--danger:#ff4a4a;--tab-h:64px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
#splash{position:fixed;inset:0;background:#0a0a0a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity 0.4s ease}
#splash.hide{opacity:0;pointer-events:none}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:0.9}50%{transform:scale(1.08);opacity:1}}
@keyframes splashDots{0%,80%,100%{transform:scale(0);opacity:0.3}40%{transform:scale(1);opacity:1}}
.splash-logo{animation:splashPulse 1.8s ease-in-out infinite}
.splash-dot{width:8px;height:8px;border-radius:50%;background:#ff2d78;display:inline-block;margin:0 3px}
.splash-dot:nth-child(1){animation:splashDots 1.2s 0s infinite}
.splash-dot:nth-child(2){animation:splashDots 1.2s 0.2s infinite}
.splash-dot:nth-child(3){animation:splashDots 1.2s 0.4s infinite}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;position:fixed;width:100%}
.page{position:absolute;inset:0;bottom:calc(54px + 22px);overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page::-webkit-scrollbar{display:none}
.page-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.badge{display:flex;align-items:center;gap:5px;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:transform 0.12s,opacity 0.15s}
.badge:active{transform:scale(0.93);opacity:0.8}
.badge-star{background:#1a1500;border:1px solid #332800;color:var(--star)}
.badge-dev{background:#0d1a0d;border:1px solid #1a3a1a;color:var(--dev)}
.tabs{position:fixed;bottom:10px;left:14px;right:14px;height:54px;padding-bottom:0;background:var(--bg2);border:1px solid var(--border);border-radius:27px;display:flex;align-items:center;z-index:100;box-shadow:0 4px 28px rgba(0,0,0,0.5)}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;height:100%;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:0.3px;transition:color 0.2s}
.tab-btn.active{color:#ff2d78}
.tab-btn svg{width:20px;height:20px;transition:transform 0.2s,opacity 0.2s;opacity:0.4}
.tab-btn.active svg{opacity:1;transform:scale(1.1)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;letter-spacing:0.3px;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--text);color:var(--bg);padding:14px 20px;font-size:15px;width:100%}
.btn-primary:active{box-shadow:0 0 20px rgba(255,255,255,0.3)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:12px 18px;font-size:14px}
.btn-secondary:active{border-color:var(--text3);box-shadow:0 0 12px rgba(255,255,255,0.08)}
.btn-danger{background:rgba(255,74,74,0.1);color:var(--danger);border:1px solid rgba(255,74,74,0.2);padding:10px 16px;font-size:13px}
.btn-wide{width:100%}
@keyframes ponkiPulse{0%,100%{box-shadow:0 0 20px rgba(255,45,120,0.3),0 0 40px rgba(255,45,120,0.1)}50%{box-shadow:0 0 35px rgba(255,45,120,0.6),0 0 70px rgba(255,45,120,0.25)}}
@keyframes ponkiFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
.ponki-hero{animation:ponkiFloat 3s ease-in-out infinite}
.ponki-hero-wrap{animation:ponkiPulse 2.5s ease-in-out infinite;border-radius:16px}
/* Card flip */
.flip-container{perspective:600px;width:100%;max-width:200px;margin:0 auto;aspect-ratio:1/1}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 4.0s cubic-bezier(0.4,0.2,0.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;background:var(--bg3)}
.flip-back{transform:rotateY(180deg)}
.flip-front img,.flip-back img{width:100%;height:100%;object-fit:cover}
@keyframes shakeReveal{0%{transform:rotateY(180deg) scale(1)}15%{transform:rotateY(180deg) scale(1.08) rotate(-2deg)}30%{transform:rotateY(180deg) scale(1.05) rotate(2deg)}45%{transform:rotateY(180deg) scale(1.07) rotate(-1.5deg)}60%{transform:rotateY(180deg) scale(1.03) rotate(1deg)}75%{transform:rotateY(180deg) scale(1.02) rotate(-0.5deg)}100%{transform:rotateY(180deg) scale(1) rotate(0)}}
.flip-card.shake .flip-back{animation:shakeReveal 0.6s ease-out 3.8s both}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-right{animation:slideInRight 0.25s cubic-bezier(0.32,0.72,0,1)}
.slide-in-left{animation:slideInLeft 0.25s cubic-bezier(0.32,0.72,0,1)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@keyframes cardTap{0%{transform:scale(1) rotate(0)}25%{transform:scale(0.92) rotate(-2deg)}65%{transform:scale(0.96) rotate(1.5deg)}100%{transform:scale(1) rotate(0)}}
.card-item{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.card-item:active{border-color:#ff2d78;box-shadow:0 0 14px rgba(255,45,120,0.2);animation:cardTap 0.4s ease-out forwards}
.card-img{aspect-ratio:1/1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:6px 8px}
.card-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:10px;color:var(--text2);font-family:'Inter',sans-serif;margin-top:1px}
.pct-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;font-family:'Inter',sans-serif;color:var(--star)}
.upgrade-badge{position:absolute;top:2px;right:4px;background:rgba(0,0,0,0.8);border:1px solid rgba(74,255,138,0.8);border-radius:2px;padding:1px 2px;font-size:7px;font-weight:900;color:#4aff8a;letter-spacing:0px;line-height:1;transform:scale(0.65);transform-origin:top right}
.price-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.7);border:1px solid rgba(74,255,138,0.25);border-radius:5px;padding:2px 5px;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;color:var(--dev);opacity:0.85}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes cardSpin{0%{transform:perspective(400px) rotateY(0deg)}100%{transform:perspective(400px) rotateY(360deg)}}
@keyframes cardSpinFast{0%{transform:perspective(400px) rotateY(0deg)}100%{transform:perspective(400px) rotateY(360deg)}}
.ponki-hero-spin{animation:cardSpin 4s linear infinite;transform-style:preserve-3d}
.ponki-hero-spin:active{animation:cardSpinFast 0.5s linear 3,cardSpin 4s linear infinite;animation-delay:0s,1.5s}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:18px;font-weight:800;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-card-preview{aspect-ratio:1/1;max-width:200px;margin:0 auto;width:100%;border-radius:14px;overflow:hidden;background:var(--bg3)}
.modal-card-preview img{width:100%;height:100%;object-fit:cover}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.stat-box .val{font-size:18px;font-weight:800;font-family:'Inter',sans-serif}
.stat-box .lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;min-height:14px;display:flex;align-items:center;justify-content:center}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state p{font-size:14px}
.menu-item{background:var(--bg2);border:1px solid transparent;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
.menu-item:active{background:var(--bg3);border-color:var(--border)}
.menu-icon{font-size:18px;width:26px;text-align:center;display:flex;align-items:center;justify-content:center}
.menu-text{flex:1}
.menu-label{font-size:14px;font-weight:600}
.price-input-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px 4px 4px 14px}
.price-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;font-weight:700}
.price-input-row .cur{color:var(--star);font-size:13px;font-weight:700;padding:8px 12px;background:rgba(240,192,64,0.1);border-radius:7px}
.transfer-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none}
.transfer-input::placeholder{color:var(--text3)}
.friend-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.friend-name{font-size:13px;font-weight:700}
.friend-meta{font-size:11px;color:var(--text2);margin-top:1px}
.friend-cards{margin-left:auto;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.err{border-color:var(--danger);color:var(--danger)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.6s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{display:flex;align-items:center;justify-content:center;height:100%}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-btn:active{transform:scale(0.94)}
.filter-btn.active{background:#ff2d78;border-color:#ff2d78;color:#fff}
.trade-filter-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.trade-filter-btn:active{transform:scale(0.95)}
.trade-filter-btn.has-filter{border-color:#ff2d78;color:#ff2d78}
.trade-filter-count{background:#fff;color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="page-buy" class="page active">
  <div class="page-header">
    <span class="page-title" id="t-shop" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:4px 14px;font-size:14px">Магазин</span>
    <div class="badge badge-star" onclick="openSplitLink()" style="cursor:pointer;background:linear-gradient(135deg,rgba(240,192,64,0.2),rgba(240,192,64,0.05));border:1px solid rgba(240,192,64,0.5);box-shadow:0 0 12px rgba(240,192,64,0.3),0 0 4px rgba(240,192,64,0.2)"><svg width="14" height="14" viewBox="0 0 24 24" style="vertical-align:middle"><defs><linearGradient id="sbg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ffe566"/><stop offset="100%" stop-color="#f0a000"/></linearGradient></defs><polygon points="12,2 14.8,8.6 22,9.5 17,14.2 18.5,21.4 12,17.8 5.5,21.4 7,14.2 2,9.5 9.2,8.6" fill="url(#sbg)"/></svg><span id="buy-stars-btn" style="color:#f0c040">Купить звёзды</span></div>
  </div>
  <div class="content" id="buy-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-sell" class="page">
  <div class="page-header">
    <span class="page-title" id="t-trade" style="background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.18);border-radius:20px;padding:4px 14px;font-size:14px">Рынок</span>
    <div class="badge" style="background:#0a1a2a;border:1px solid rgba(74,176,255,0.3);color:#4ab0ff;gap:5px;display:flex;align-items:center;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer" onclick="openTonModal()"><img src="/static/icons/ton.png" style="width:16px;height:16px;object-fit:contain" onerror="this.outerHTML='💎'"><span id="ton-val-trade">0</span></div>
  </div>
  <div class="content" id="trade-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-profile" class="page">
  <div class="content" id="profile-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-page="buy" onclick="switchTab('buy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="tab-shop">Shop</span>
  </button>
  <button class="tab-btn" style="font-size:11px" data-page="sell" onclick="goToMarket()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    <span id="tab-trade">Trade</span>
  </button>
  <button class="tab-btn" style="font-size:11px" data-page="profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span id="tab-profile">Profile</span>
  </button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }
const tgUser = tg?.initDataUnsafe?.user || {id:12345678,username:'dev',first_name:'Dev'};
let userData = null, selectedCard = null;

const userLang = ((tg?.initDataUnsafe?.user?.language_code || navigator.language || 'en')+'').toLowerCase().startsWith('ru') ? 'ru' : 'en';
const T = {
  en:{shop:'Shop',trade:'Market',profile:'Profile',whales:'Whales',left:'LEFT',price:'PRICE',supply:'SUPPLY',buy:'Buy',cardCount:(n)=>n===1?'card':`cards`,upgrade:'UPGRADE',sell:'Sell',transfer:'Transfer',serial:'Serial',drop:'Drop %',status:'Status',supplyLbl:'Supply',listSale:'List for Sale',cancel:'Cancel',close:'Close',send:'Send',remove:'Remove listing',noListings:'No listings yet',collection:'Collection',model:'Model',refEarn:'Refer & Earn',refText:'Invite friends — earn',refOf:'of their spending in 💎 gems',buyCheapStars:'Buy Stars',connectTon:'Connect TON Wallet',myCards:'My Cards',friends:'Friends',noCards:'No cards yet',noFriends:'No friends yet',showAll:'Show all',showLess:'Show less',clear:'Clear',apply:'Apply',notInPonki:'User not in Ponki',notJoined:"This person hasn't joined yet.",invite:'Invite',purchased:'Purchased!',listed:'Listed!',removed:'Removed',cardSent:'Card sent!',linkCopied:'Link copied!',notEnoughDev:'Not enough DEV',notEnoughStars:'Not enough stars',enterPrice:'Enter price',enterTgId:'Enter Telegram ID',commission:'Commission: 5%',rarity:'Rarity',descShop:'50 unique models · upgrade free',historyTitle:'History'},
  ru:{shop:'Магазин',trade:'Рынок',profile:'Профиль',whales:'Киты',left:'ОСТАЛОСЬ',price:'ЦЕНА',supply:'ТИРАЖ',buy:'Купить',cardCount:(n)=>{if(n%10===1&&n%100!==11)return'карта';if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'карты';return'карт';},upgrade:'УЛУЧШИТЬ',sell:'Продать',transfer:'Передать',serial:'Номер',drop:'Редкость',status:'Статус',supplyLbl:'Тираж',listSale:'Выставить',cancel:'Отмена',close:'Закрыть',send:'Отправить',remove:'Снять',noListings:'Нет объявлений',collection:'Коллекция',model:'Модель',refEarn:'Приглашай и зарабатывай',refText:'Приглашай друзей — получай',refOf:'от их трат в виде 💎 гемов',buyCheapStars:'Купить звёзды',connectTon:'Подключить TON кошелёк',myCards:'Мои карточки',friends:'Друзья',noCards:'Карточек пока нет',noFriends:'Нет друзей — поделись ссылкой!',showAll:'Показать все',showLess:'Скрыть',clear:'Сбросить',apply:'Применить',notInPonki:'Пользователь не в Ponki',notJoined:'Этот человек ещё не вступил.',invite:'Пригласить',purchased:'Куплено!',listed:'Выставлено!',removed:'Снято',cardSent:'Карточка отправлена!',linkCopied:'Ссылка скопирована!',notEnoughDev:'Недостаточно DEV',notEnoughStars:'Недостаточно звёзд',enterPrice:'Введите цену',enterTgId:'Введите Telegram ID',commission:'Комиссия: 5%',rarity:'Редкость',descShop:'50 уникальных моделей · улучшение бесплатно',historyTitle:'История'}
};
const t = T[userLang];

function fmtNum(n) {
  if (n >= 10000) return '10K';
  if (n >= 1000) {
    const val = Math.floor(n / 100) / 10;
    return val.toFixed(1).replace(/\.0$/,'') + 'K';
  }
  return n.toString();
}

function applyLang() {
  document.getElementById('t-shop').textContent = t.shop;
  document.getElementById('t-trade').textContent = t.trade;
  document.getElementById('tab-shop').textContent = t.shop;
  document.getElementById('tab-trade').textContent = t.trade;
  document.getElementById('tab-whales') && (document.getElementById('tab-whales').textContent = t.whales);
  document.getElementById('tab-profile').textContent = t.profile;
  const bsb = document.getElementById('buy-stars-btn');
  if(bsb) bsb.textContent = t.buyCheapStars;

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (method === 'POST' && body) {
    // Always include initData for server-side Telegram signature verification
    body._init_data = tg?.initData || '';
    opts.body = JSON.stringify(body);
  }
  const res = await fetch(path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'Error'); }
  return res.json();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+type;
  setTimeout(()=>el.className='toast', 2500);
}

function haptic(type='light') {
  tg?.HapticFeedback?.impactOccurred(type);
  try { navigator.vibrate && navigator.vibrate(type==='heavy'?[30,20,30]:type==='medium'?20:10); } catch(e){}
}

function dropPct(w) {
  return {5:'0.5%',10:'1%',15:'1.5%',20:'2%',25:'2.5%',30:'3%'}[w]||w+'w';
}

function fmtTon(val) {
  // val stored as integer cents (0.1 TON = 10, 1 TON = 100)
  const n = val / 100;
  if (Number.isInteger(n)) return n.toString();
  // Show full precision, no trailing zeros
  return parseFloat(n.toPrecision(10)).toString();
}

function fmtNano(nano) {
  // nano = nanotons, show full precision no trailing zeros
  const n = nano / 1_000_000_000;
  if (n === 0) return '0';
  return parseFloat(n.toPrecision(10)).toString();
}

function changeQty(d) {

    toast(userLang==='ru'?'Недостаточно гемов — зарабатывай в заданиях!':'Not enough gems — earn in tasks!','err');

async function buyCard(colId) {
  haptic('medium');
  const qty=_buyQty||1;
  if(!tg){toast('Open in Telegram','err');return;}
  try {
    const res = await api('/api/create_invoice','POST',{
      telegram_id: tgUser.id,
      collection_id: colId,
      qty: qty
    });
    if(res.invoice_link) {
      tg.openInvoice(res.invoice_link, async (status) => {
        if(status === 'paid') {
          toast(userLang==='ru'?'Оплачено!':'Paid!','ok');
          setTimeout(async()=>{
            userData = await api(`/api/user/${tgUser.id}`);
            updateBalances();
            loadBuy();
          }, 1500);
        } else if(status === 'failed') {
          // Show stars hint only on failed (not enough balance), not on cancel
          openModal(userLang==='ru'?'Не хватает звёзд?':'Not enough stars?',
            '<div style="text-align:center;padding:8px 0 16px">'
            +'<div style="font-size:48px;margin-bottom:8px">⭐</div>'
            +'<div style="font-size:15px;font-weight:700;margin-bottom:6px">'+(userLang==='ru'?'Не хватает звёзд :(':'Not enough stars :(')+'</div>'
            +'<div style="font-size:13px;color:var(--text2);margin-bottom:20px">'+(userLang==='ru'?'Купите Telegram Stars чтобы открыть карточки':'Buy Telegram Stars to open cards')+'</div>'
            +'<button class="btn btn-primary btn-wide" style="background:linear-gradient(135deg,#f0c040,#c07800);border:none" onclick="closeModal();openSplitLink()">⭐ '+(userLang==='ru'?'Купить звёзды':'Buy Stars')+'</button>'
            +'<button class="btn btn-secondary btn-wide" style="margin-top:8px" onclick="closeModal()">'+(userLang==='ru'?'Отмена':'Cancel')+'</button>'
            +'</div>'
          );
        }
      });
    }
  } catch(e){
    if(e.message&&(e.message.includes('star')||e.message.includes('Star')||e.message.includes('payment'))){
      openModal(userLang==='ru'?'Не хватает звёзд':'Not enough stars',
        '<div style="text-align:center;padding:8px 0 16px">'
        +'<div style="font-size:48px;margin-bottom:12px">⭐</div>'
        +'<div style="font-size:15px;font-weight:700;margin-bottom:6px">'+(userLang==='ru'?'Не хватает звёзд :(':'Not enough stars :(')+'</div>'
        +'<div style="font-size:13px;color:var(--text2);margin-bottom:20px">'+(userLang==='ru'?'Нажмите кнопку «Купить звёзды»':'Tap the «Buy Stars» button')+'</div>'
        +'<button class="btn btn-primary btn-wide" style="background:linear-gradient(135deg,#f0c040,#c07800);border:none" onclick="closeModal();openSplitLink()">⭐ '+(userLang==='ru'?'Купить звёзды':'Buy Stars')+'</button>'
        +'<button class="btn btn-secondary btn-wide" style="margin-top:8px" onclick="closeModal()">'+(userLang==='ru'?'Закрыть':'Close')+'</button>'
        +'</div>'
      );
    } else { toast(e.message,'err'); }
  }
}

}

async function loadHistory() {
  const el=document.getElementById('history-list'); if(!el) return;
  try {
    const data=await api(`/api/history/${tgUser.id}`);
    let items=(data.history||[]).filter(i=>i.type==='market_buy'||i.type==='market_buy_ton'||i.type==='auction_won');
    // Sort
    if(historySortBy==='price_asc') items.sort((a,b)=>a.stars_amount-b.stars_amount);
    else if(historySortBy==='price_desc') items.sort((a,b)=>b.stars_amount-a.stars_amount);
    else if(historySortBy==='rarity_asc') items.sort((a,b)=>(a.drop_weight||99)-(b.drop_weight||99));
    else if(historySortBy==='rarity_desc') items.sort((a,b)=>(b.drop_weight||99)-(a.drop_weight||99));
    else if(historySortBy==='serial') items.sort((a,b)=>(a.serial_number||0)-(b.serial_number||0));
    // default: date (already sorted by created_at DESC from API)
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'Сделок пока нет':'No trades yet'}</p></div>`;
      return;
    }
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id;
      const isAuction=item.type==='auction_won';
      const label=isAuction?(isIncome?(userLang==='ru'?'🏆 Выиграл аукцион':'🏆 Auction won'):(userLang==='ru'?'🏆 Продано на аукционе':'🏆 Auction sold')):isIncome?(userLang==='ru'?'Продано':'Sold'):(userLang==='ru'?'Куплено':'Bought');
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0">
          <img src="${item.image_url||'/static/ponki/ponki.png'}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.opacity=0">
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">Ponki · ${item.card_name||'?'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${label}</div>
          <div style="font-size:10px;color:var(--text3);font-family:'Inter',sans-serif">${item.created_at?(new Date(item.created_at.replace(' ','T')+'Z')).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',',''):''}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap;display:flex;align-items:center;gap:3px">${item.type==='market_buy_ton'?`<img src="/static/icons/ton.png" style="width:13px;height:13px;object-fit:contain"> ${fmtNano(item.stars_amount)}`:`${item.stars_amount}⭐`}</div>
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}

function renderListings() {
  let list=[...allListings];
  if(selectedModels.size>0) list=list.filter(l=>selectedModels.has(l.name));
  if(tradeSortBy==='price_asc') list.sort((a,b)=>a.price_stars-b.price_stars);
  else if(tradeSortBy==='price_desc') list.sort((a,b)=>b.price_stars-a.price_stars);
  else if(tradeSortBy==='serial_asc') list.sort((a,b)=>a.serial_number-b.serial_number);
  else if(tradeSortBy==='serial_desc') list.sort((a,b)=>b.serial_number-a.serial_number);
  else if(tradeSortBy==='rarity_asc') list.sort((a,b)=>a.drop_weight-b.drop_weight);
  else if(tradeSortBy==='rarity_desc') list.sort((a,b)=>b.drop_weight-a.drop_weight);

  const el=document.getElementById('listings-list'); if(!el) return;
  if(list.length===0){el.innerHTML=`<div class="empty-state"><p>${t.noListings}</p></div>`;return;}
  let html=`<div class="cards-grid">`;
  for(const l of list){
    const isOwn=l.seller_id===userData.id;
    html+=`<div class="card-item" onclick='openMarketModal(${JSON.stringify(l)},${isOwn})' style="${isOwn?'border:2px solid rgba(255,255,255,0.6);box-shadow:0 0 10px rgba(255,255,255,0.15)':''}">

async function buyListing(id,price){
  haptic('medium');
  const tonNano = 1_000_000_000;
  const priceNano = price * 10_000_000; // price stored as cents (0.1 TON = 10), convert to nano
  const bal = userData?.ton_balance || 0;
  if(bal < priceNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${(bal/tonNano).toFixed(2)}`:`Not enough TON. Balance: ${(bal/tonNano).toFixed(2)}`,'err');
    return;
  }
  try{
    await api('/api/market/buy_ton','POST',{telegram_id:tgUser.id,listing_id:id});
    closeModal();
    toast(userLang==='ru'?'Куплено!':'Purchased!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    loadTrade();
  }catch(e){toast(e.message,'err');}
}
function openChangePriceModal(listingId, currentPrice){
  haptic();
  const currentTon = (currentPrice/100).toFixed(2);
  openModal(userLang==='ru'?'Изменить цену':'Change price',`
    <div style="font-size:13px;color:var(--text2);margin-bottom:8px">${userLang==='ru'?'Текущая цена:':'Current price:'} <b style="color:#4ab0ff">${currentTon} TON</b></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:6px">${userLang==='ru'?'Новая цена:':'New price:'}</div>
    <div class="price-input-row"><input type="number" id="new-price-input" placeholder="${currentTon}" min="0.01" step="0.01" value="${currentTon}"><span class="cur" style="color:#4ab0ff">TON</span></div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:12px">${t.commission}</div>
    <button class="btn btn-primary btn-wide" onclick="changeListingPrice(${listingId})">${userLang==='ru'?'Сохранить':'Save'}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.cancel}</button>
  `);
}

async function changeListingPrice(listingId){
  haptic('medium');
  const priceInput = parseFloat(document.getElementById('new-price-input')?.value);
  if(!priceInput||priceInput<0.1){toast(userLang==='ru'?'Минимум 0.10 TON':'Min 0.10 TON','err');return;}
  const price = Math.round(priceInput*100);
  try{
    await api('/api/market/change_price','POST',{telegram_id:tgUser.id,listing_id:listingId,price_dev:price});
    closeModal();
    toast(userLang==='ru'?'Цена обновлена!':'Price updated!','ok');
    loadTrade();
  }catch(e){toast(e.message,'err');}
}

async function unlistCard(id){
  haptic();
  try{await api('/api/market/unlist','POST',{telegram_id:tgUser.id,listing_id:id});closeModal();toast(t.removed,'ok');loadTrade();}catch(e){toast(e.message,'err');}
}

async function loadProfileHistory() {

      return;
    }
    const typeLabel=(type,isIncome)=>{
      if(userLang==='ru'){
        const map={buy:'🃏 Куплено',market_buy:'💰 Продано',market_buy_ton:'💰 Продано за TON',market_buy_offer:'🤝 Офер принят',upgrade:'✨ Улучшено',transfer:isIncome?'📥 Получено':'📤 Передано',sell:'💰 Продано',buy_stars:'⭐ Пополнение',payment:'🃏 Куплено'};
        return map[type]||type;
      } else {
        const map={buy:'🃏 Bought',market_buy:'💰 Sold',market_buy_ton:'💰 Sold for TON',market_buy_offer:'🤝 Offer accepted',upgrade:'✨ Upgraded',transfer:isIncome?'📥 Received':'📤 Transferred',sell:'💰 Sold',buy_stars:'⭐ Stars added',payment:'🃏 Bought'};
        return map[type]||type;
      }
    };
    const typeIcon=(type)=>`<img src="/static/ponki/ponki.png" style="width:100%;height:100%;object-fit:cover">`;
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id&&item.stars_amount>0&&item.type!=='buy';
      const timeStr=item.created_at?((d=>{
        const dt=new Date(d+'Z'); // treat as UTC
        return dt.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',','');
      })(item.created_at.replace(' ','T'))):'';

        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">

        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${item.card_name||'Ponki'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${typeLabel(item.type,isIncome)}</div>
          ${timeStr?`<div style="font-size:10px;color:var(--text3);margin-top:1px;font-family:'Inter',sans-serif">${timeStr}</div>`:''}
        </div>
        ${item.stars_amount>0?`<div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap">${isIncome?'+':'−'}${item.type==='market_buy_ton'?`<span style="display:inline-flex;align-items:center;gap:2px"><img src="/static/icons/ton.png" style="width:12px;height:12px;object-fit:contain"> ${fmtNano(item.stars_amount)}</span>`:`${item.stars_amount}⭐`}</div>`:''}

  openModal(title,`
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="swipeCard(${idx},-1)" style="background:${idx>0?'var(--bg3)':'transparent'};border:1px solid ${idx>0?'var(--border)':'transparent'};color:${idx>0?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">‹</button>

          <div class="flip-back"><img src="${card.image_url}" onerror="this.style.opacity=0"></div>

      </div>
      <button onclick="swipeCard(${idx},1)" style="background:${idx<cards.length-1?'var(--bg3)':'transparent'};border:1px solid ${idx<cards.length-1?'var(--border)':'transparent'};color:${idx<cards.length-1?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">›</button>

function swipeCard(currentIdx, direction) {
  haptic();
  const cards=window._profileCards||[];
  const newIdx=currentIdx+direction;
  if(newIdx<0||newIdx>=cards.length) return;
  openCardModal(cards[newIdx], null, direction);
}

async function upgradeCard(cardId){
  haptic('medium');
  try{
    const res=await api('/api/upgrade_card_internal','POST',{telegram_id:tgUser.id,user_card_id:cardId});
    const fc=document.getElementById('flip-card');
    const fb=fc?.querySelector('.flip-back img');
    if(fc&&fb&&res.card?.image_url){
      fb.src=res.card.image_url;
      setTimeout(()=>{
        fc.classList.add('flipped');
        fc.classList.add('shake');
        // Powerful vibration pattern
        try { navigator.vibrate && navigator.vibrate([50,30,80,30,120,50,200]); } catch(e){}
        tg?.HapticFeedback?.impactOccurred('heavy');
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('medium'); try{navigator.vibrate&&navigator.vibrate(40);}catch(e){} },800);
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('light'); try{navigator.vibrate&&navigator.vibrate(20);}catch(e){} },1400);
        setTimeout(()=>{ tg?.HapticFeedback?.notificationOccurred('success'); try{navigator.vibrate&&navigator.vibrate([30,20,30]);}catch(e){} },2200);
      },100);
    }
    if(selectedCard){ selectedCard.is_upgraded=1; if(res.card?.image_url) selectedCard.image_url=res.card.image_url; if(res.card?.name) selectedCard.name=res.card.name; if(res.card?.drop_weight) selectedCard.drop_weight=res.card.drop_weight; }
    setTimeout(async()=>{
      userData=await api(`/api/user/${tgUser.id}`); updateBalances();
      toast(`${res.card?.name||'Upgraded'}!`,'ok');
      // Update modal title to show real name
      const modalTitle=document.getElementById('modal-title');
      if(modalTitle&&res.card?.name) modalTitle.textContent=res.card.name;
      // Update stat box to show rarity
      const statBoxes=document.querySelectorAll('#modal-body .stat-box');
      if(statBoxes[1]&&res.card?.drop_weight){
        statBoxes[1].innerHTML=`<div class="val" style="font-size:14px;color:var(--star)">${dropPct(res.card.drop_weight)}</div><div class="lbl">${t.drop}</div>`;
      }
      const upgradeBtn=document.querySelector('#modal-body .btn-primary');
      if(upgradeBtn){
        upgradeBtn.outerHTML=`
          <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>`;
      }
      loadProfile();
    },800);
  }catch(e){toast(e.message,'err');}
}

async function doTransfer(cardId){
  haptic('medium');
  const rawInput=(document.getElementById('transfer-to')?.value||'').trim();
  if(!rawInput){toast(t.enterTgId,'err');return;}
  const isUsername=rawInput.startsWith('@')||isNaN(rawInput);
  const toId=isUsername?rawInput.replace('@',''):parseInt(rawInput);
  if(!toId){toast(t.enterTgId,'err');return;}

  // First check if user exists in bot
  try {
    const checkRes = await api('/api/check_user','POST',{query: String(rawInput.replace('@',''))});
    if(!checkRes.found){
      // User not in bot - show invite screen
      openModal(t.transfer,
        '<div style="text-align:center;padding:8px 0">'
        + '<div style="font-size:36px;margin-bottom:12px">🤔</div>'
        + '<div style="font-size:15px;font-weight:700;margin-bottom:8px">'+(userLang==="ru"?"Этот пользователь ещё не в боте":"This user is not in the bot yet")+'</div>'
        + '<div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5">'+(userLang==="ru"?"Сначала пригласите друга в бота, затем передайте карточку":"Invite your friend to the bot first, then transfer the card")+'</div>'
        + '<button class="btn btn-primary btn-wide" style="background:linear-gradient(135deg,#ff2d78,#ff6eb0);border:none" onclick="shareRefLink(tgUser.id)">'
          + (userLang==="ru"?"📤 Пригласить друга":"📤 Invite friend")
        + '</button>'
        + '<button class="btn btn-secondary btn-wide" style="margin-top:8px" onclick="closeModal()">'+(userLang==="ru"?"Отмена":"Cancel")+'</button>'
        + '</div>'
      );
      return;
    }
  } catch(e){ /* if check_user fails, proceed anyway */ }

  // User exists - proceed with transfer invoice
  try {
    const res = await api('/api/create_invoice','POST',{
      telegram_id: tgUser.id, collection_id: 0, qty: 1,
      purpose: 'transfer', card_id: cardId, to_id: String(toId)
    });
    if(res.invoice_link) {
      closeModal();
      tg.openInvoice(res.invoice_link, async (status) => {
        if(status === 'paid') {
          try {
            await api('/api/transfer','POST',{from_telegram_id:tgUser.id,to_telegram_id:toId,user_card_id:cardId});
          } catch(e2){}
          toast(t.cardSent,'ok');
          userData=await api(`/api/user/${tgUser.id}`); updateBalances(); loadProfile();
        } else if(status === 'cancelled' || status === 'failed') {
          toast(userLang==='ru'?'Отменено':'Cancelled','');
        }
      });
    }
  } catch(e){ toast(e.message,'err'); }
}

async function doTonDeposit(botAddr, memo){
  haptic('medium');
  const amountTon = parseFloat(document.getElementById('ton-dep-amount')?.value);
  if(!amountTon || amountTon < 0.1){ toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err'); return; }
  if(!tonUI?.wallet){ toast(userLang==='ru'?'Подключи кошелёк':'Connect wallet first','err'); return; }

  const amountNano = Math.floor(amountTon * 1_000_000_000).toString();

  try {
    await tonUI.sendTransaction({
      validUntil: Math.floor(Date.now() / 1000) + 360,
      messages: [{
        address: botAddr,
        amount: amountNano
      }]
    });
    // Optimistic credit - trust TonConnect confirmation
    const res = await api('/api/ton/deposit_confirm','POST',{
      telegram_id: tgUser.id,
      amount_nano: parseInt(amountNano),
      init_data: tg?.initData || ''
    });
    userData.ton_balance = res.ton_balance;
    updateBalances();
    toast(`+${amountTon} TON ${userLang==='ru'?'зачислено':'credited'}!`,'ok');
    const el = document.getElementById('ton-action-area');
    if(el) el.innerHTML='';
    // Reload and close modal, go back to where user was
    setTimeout(async()=>{
      userData = await api(`/api/user/${tgUser.id}`);
      updateBalances();
      closeModal();
      // Go to trade if on trade tab, else profile
      const activeTab = document.querySelector('.tab-btn.active')?.dataset?.page;
      if(activeTab === 'sell') loadTrade();
      else { profileView='cards'; loadProfile(); switchTab('profile'); }
    }, 800);
  } catch(e){
    const msg = (e?.message||'').toLowerCase();
    if(msg.includes('cancel')||msg.includes('reject')||msg.includes('denied')||msg.includes('user')){
      toast(userLang==='ru'?'Отменено':'Cancelled','');
    } else {
      toast(e?.message||'Error','err');
    }
  }
}

async function doTonWithdraw(){
  haptic('medium');
  const amount = parseFloat(document.getElementById('ton-withdraw-amount')?.value);
  if(!amount||amount<0.1){toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err');return;}
  const addr = tonUI?.wallet?.account?.address || userData?.ton_address || '';
  if(!addr){toast(userLang==='ru'?'Подключи кошелёк сначала':'Connect wallet first','err');return;}
  const bal = userData?.ton_balance||0;
  const amountNano = Math.floor(amount*1_000_000_000);
  if(bal < amountNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${fmtNano(bal)}`:`Not enough TON. Balance: ${fmtNano(bal)}`,'err');
    return;

async function loadAuctions(){
  const el = document.getElementById('auction-list');
  if(!el) return;
  el.innerHTML = '<div class="spinner" style="margin:32px auto"></div>';
  try {
    const auctions = await api('/api/auctions');
    if(auctions.length === 0){
      el.innerHTML = `<div class="empty-state"><p>${userLang==='ru'?'Нет активных аукционов':'No active auctions'}</p></div>`;
      return;
    }
    let html = `<div style="display:flex;flex-direction:column;gap:10px">`;
    for(const a of auctions){
      const isOwn = a.seller_id === userData?.id;
      const isBidder = a.current_bidder_id === userData?.id;
      const price = (a.current_price_nano/1e9).toFixed(2).replace(/\.?0+$/,'');
      const minBid = ((a.current_price_nano + a.min_step_nano)/1e9).toFixed(2).replace(/\.?0+$/,'');
      const endsAt = new Date(a.ends_at.replace(' ','T')+'Z');
      const now = new Date();
      const diff = Math.max(0, endsAt - now);
      const hrs = Math.floor(diff/3600000);
      const mins = Math.floor((diff%3600000)/60000);
      const secs = Math.floor((diff%60000)/1000);
      const timeStr = hrs>0 ? `${hrs}ч ${mins}м` : `${mins}м ${secs}с`;
      html += `<div style="background:var(--bg2);border:1px solid ${isOwn?'rgba(74,176,255,0.4)':isBidder?'rgba(74,255,138,0.3)':'rgba(255,255,255,0.07)'};border-radius:14px;overflow:hidden">
        <div style="display:flex;gap:10px;padding:12px">
          <div style="width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg3)">
            <img src="${a.image_url}" style="width:100%;height:100%;object-fit:cover">
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">Ponki · ${a.card_name} <span style="color:var(--text2);font-weight:400">#${a.serial_number}</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${dropPct(a.drop_weight)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
              <img src="/static/icons/ton.png" style="width:14px;height:14px;object-fit:contain">
              <span style="font-size:16px;font-weight:800;color:#4ab0ff">${price}</span>
              <span style="font-size:11px;color:var(--text3)">${a.current_bidder_id?userLang==='ru'?'тек. ставка':'current bid':userLang==='ru'?'старт':'start'}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:var(--danger);font-weight:700">⏱ ${timeStr}</div>
            ${a.current_bidder_id?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${a.bidder_name||'@'+a.bidder_username||'?'}</div>`:''}
          </div>
        </div>
        ${!isOwn?`<div style="padding:0 12px 12px">
          <button class="btn btn-primary btn-wide" onclick="openBidModal(${a.id},'${a.card_name}',${a.current_price_nano},${a.min_step_nano},'${price}','${minBid}')" style="font-size:13px;padding:10px">
            ${userLang==='ru'?'Сделать ставку':'Place bid'} — от ${minBid} TON
          </button>
        </div>`:`<div style="padding:0 12px 12px;display:flex;align-items:center;justify-content:space-between;gap:8px">
          <div style="font-size:12px;color:var(--text2)">${userLang==='ru'?'Ваш аукцион':'Your auction'}</div>
          ${!a.current_bidder_id?`<button class="btn btn-danger" style="padding:8px 14px;font-size:12px" onclick="cancelAuction(${a.id})">${userLang==='ru'?'Отменить':'Cancel'}</button>`:''}
        </div>`}
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`; }
}

function setRBBet(val, el){
  haptic();
  document.querySelectorAll('[data-bet]').forEach(b=>{b.style.background='var(--bg3)';b.style.borderColor='var(--border)';b.style.color='var(--text)';});
  el.style.background='rgba(167,139,250,0.2)'; el.style.borderColor='#a78bfa'; el.style.color='#a78bfa';
  const inp = document.getElementById('rb-bet');
  if(inp) inp.value = val;
}

function selectRBColor(color, el){
  haptic();
  window._rbChoice = color;
  const red = document.getElementById('rb-red');
  const black = document.getElementById('rb-black');
  if(color==='red'){
    if(red){red.style.background='rgba(255,74,74,0.35)';red.style.borderColor='#ff4a4a';}
    if(black){black.style.background='rgba(255,255,255,0.05)';black.style.borderColor='rgba(255,255,255,0.15)';}
  } else {
    if(black){black.style.background='rgba(255,255,255,0.15)';black.style.borderColor='rgba(255,255,255,0.6)';}
    if(red){red.style.background='rgba(255,74,74,0.15)';red.style.borderColor='rgba(255,74,74,0.5)';}
  }
  const btn = document.getElementById('rb-play-btn');
  if(btn){btn.disabled=false;btn.textContent=userLang==='ru'?'🎲 Играть!':'🎲 Play!';}
}

async function playRedBlack(){
  haptic('heavy');
  const bet = parseInt(document.getElementById('rb-bet')?.value||'1');
  const choice = window._rbChoice;
  if(!choice){toast(userLang==='ru'?'Выберите цвет':'Choose a color','err');return;}
  if(!bet||bet<1||bet>100){toast(userLang==='ru'?'Ставка 1–100':'Bet 1–100','err');return;}
  const btn = document.getElementById('rb-play-btn');
  if(btn) btn.disabled=true;
  const resultEl = document.getElementById('rb-result');

  // Card flip animation
  if(resultEl) resultEl.innerHTML=`
    <div id="rb-card" style="width:70px;height:100px;margin:0 auto;perspective:600px;cursor:default">
      <div id="rb-card-inner" style="width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.7s cubic-bezier(0.4,0.2,0.2,1)">
        <div style="position:absolute;inset:0;backface-visibility:hidden;background:linear-gradient(135deg,#1a1a2e,#16213e);border:2px solid #333;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:28px">🂠</div>
        <div id="rb-card-front" style="position:absolute;inset:0;backface-visibility:hidden;transform:rotateY(180deg);border-radius:10px;border:2px solid #555;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:900"></div>
      </div>
    </div>`;

  try{
    await new Promise(r=>setTimeout(r,400));
    const res = await api('/api/games/redblack','POST',{telegram_id:tgUser.id,bet,choice});

    // Flip card
    const inner = document.getElementById('rb-card-inner');
    const front = document.getElementById('rb-card-front');
    if(inner && front){
      const isRed = res.result==='red';
      const isZero = res.result==='zero';
      front.style.background = isZero?'linear-gradient(135deg,#1a3a1a,#0d1f0d)':isRed?'linear-gradient(135deg,#4a0000,#800000)':'linear-gradient(135deg,#0a0a0a,#1a1a1a)';
      front.style.borderColor = isZero?'#4aff8a':isRed?'#ff4a4a':'#666';
      front.textContent = isZero?'0':isRed?'♥':'♠';
      inner.style.transform='rotateY(180deg)';
    }

    await new Promise(r=>setTimeout(r,800));

    const won = res.won;
    if(resultEl){
      const existing = resultEl.querySelector('#rb-card');
      const cardHtml = existing ? existing.outerHTML : '';
      resultEl.innerHTML=`${cardHtml}
        <div style="margin-top:10px;font-size:20px;font-weight:900;color:${won?'var(--success)':'var(--danger)'}">${won?'+'+res.delta:''+res.delta} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:middle"><path d="M6 3L3 9L12 21L21 9L18 3Z" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.2"/><path d="M3 9L12 12L21 9" stroke="#c4b5fd" stroke-width="1"/><path d="M12 3L9 9L12 12L15 9Z" fill="#c4b5fd" opacity="0.5"/></svg></div>

    if(resultEl) resultEl.innerHTML='';
  }
}

async function doSpin(){
  haptic('medium');
  const btn = document.getElementById('spin-btn');
  if(btn) btn.disabled = true;
  const spinSymbols = ['⭐','🍒','7️⃣','💎','🔮','🌟','🃏','💫'];
  const reels = [0,1,2].map(i=>document.getElementById(`slot-reel-${i}`));

  // Animate reels
  let ticks = 0;
  const interval = setInterval(()=>{
    reels.forEach(r=>{ if(r) r.textContent = spinSymbols[Math.floor(Math.random()*spinSymbols.length)]; });
    ticks++;
    if(ticks > 20) clearInterval(interval);
  }, 80);

  try{
    await new Promise(r=>setTimeout(r,300));
    const res = await api('/api/tasks/spin','POST',{telegram_id:tgUser.id});
    await new Promise(r=>setTimeout(r,1400));
    clearInterval(interval);

    const comboMap = {
      '777':   { syms:['7️⃣','7️⃣','7️⃣'], color:'rgba(240,192,64,0.6)',  label:'7 7 7' },
      'cherry':{ syms:['🍒','🍒','🍒'], color:'rgba(74,255,138,0.6)',  label:'🍒🍒🍒' },
      'star':  { syms:['⭐','⭐','⭐'], color:'rgba(167,139,250,0.4)', label:'⭐⭐⭐' },
    };
    const combo = comboMap[res.combo] || comboMap['star'];
    reels.forEach((r,i)=>{ if(r){ r.textContent=combo.syms[i]; r.style.borderColor=combo.color; }});

    const resultEl = document.getElementById('slot-result');
    if(resultEl){
      const prize = res.prize;
      resultEl.innerHTML = `<div style="font-size:18px;margin-bottom:2px">${combo.label}</div>
        <div style="font-size:20px;font-weight:900;color:${prize>=100?'#f0c040':prize>=10?'var(--success)':'#a78bfa'}">+${prize} <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="vertical-align:middle"><path d="M6 3L3 9L12 21L21 9L18 3Z" fill="#a78bfa" stroke="#7c3aed" stroke-width="1.2"/><path d="M3 9L12 12L21 9" stroke="#c4b5fd" stroke-width="1"/><path d="M12 3L9 9L12 12L15 9Z" fill="#c4b5fd" opacity="0.5"/></svg></div>`;
    }
    if(btn){ btn.textContent='✓'; btn.style.background='var(--bg3)'; }
    haptic('heavy');
    userData = await api(`/api/user/${tgUser.id}`);
    updateBalances();
    setTimeout(()=>{ closeModal(); loadProfile(); }, 1800);
  }catch(e){
    clearInterval(interval);
    toast(e.message,'err');
    if(btn){ btn.disabled=false; }
  }
}

let _pvpInterval = null;

      const sel = selectedPvp.has(card.id);
      return '<div onclick="togglePvpCard('+card.id+',this)" style="background:'+(sel?'rgba(255,45,120,0.2)':'var(--bg3)')+';border:2px solid '+(sel?'#ff2d78':'var(--border)')+';border-radius:10px;overflow:hidden;cursor:pointer" data-pvp-card="'+card.id+'">'
        + '<div style="aspect-ratio:1/1;background:var(--bg3)"><img src="'+(card.is_upgraded?card.image_url:'/static/ponki/ponki.png')+'" style="width:100%;height:100%;object-fit:cover"></div>'

    + '<div style="display:flex;gap:6px;margin-bottom:10px">'
      + '<button onclick="selectAllPvp()" class="btn btn-secondary" style="flex:1;font-size:12px;padding:8px">'+(userLang==='ru'?'Все':'All')+'</button>'
      + '<button onclick="clearPvp()" class="btn btn-secondary" style="flex:1;font-size:12px;padding:8px">'+(userLang==='ru'?'Сбросить':'Clear')+'</button>'
    + '</div>'
    + '<div id="pvp-cards-grid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-height:200px;overflow-y:auto;margin-bottom:12px">'

    + '<div id="pvp-selected-count" style="font-size:13px;color:var(--text2);text-align:center;margin-bottom:10px">'+(userLang==='ru'?'Выбрано: 0':'Selected: 0')+'</div>'
    + '<button id="pvp-join-btn" class="btn btn-primary btn-wide" onclick="joinPvp()" disabled>'+(userLang==='ru'?'Войти в лобби':'Join lobby')+'</button>'
    + '<button class="btn btn-secondary btn-wide" onclick="closeModal()" style="margin-top:6px">'+(userLang==='ru'?'Отмена':'Cancel')+'</button>'
  );

function togglePvpCard(cardId, el){
  haptic();
  const sel = window._pvpSelected;
  if(sel.has(cardId)){sel.delete(cardId);el.style.background='var(--bg3)';el.style.borderColor='var(--border)';}
  else{sel.add(cardId);el.style.background='rgba(255,45,120,0.2)';el.style.borderColor='#ff2d78';}
  const cnt = document.getElementById('pvp-selected-count');
  if(cnt) cnt.textContent=(userLang==='ru'?'Выбрано: ':'Selected: ')+sel.size;
  const btn = document.getElementById('pvp-join-btn');
  if(btn) btn.disabled = sel.size===0;
}

function selectAllPvp(){
  haptic();
  const cards = window._pvpCards||[];
  const sel = window._pvpSelected;
  cards.forEach(c=>{sel.add(c.id);});
  document.querySelectorAll('[data-pvp-card]').forEach(el=>{el.style.background='rgba(255,45,120,0.2)';el.style.borderColor='#ff2d78';});
  const cnt = document.getElementById('pvp-selected-count');
  if(cnt) cnt.textContent=(userLang==='ru'?'Выбрано: ':'Selected: ')+sel.size;
  const btn = document.getElementById('pvp-join-btn');
  if(btn) btn.disabled = false;
}

function clearPvp(){
  haptic();
  window._pvpSelected.clear();
  document.querySelectorAll('[data-pvp-card]').forEach(el=>{el.style.background='var(--bg3)';el.style.borderColor='var(--border)';});
  const cnt = document.getElementById('pvp-selected-count');
  if(cnt) cnt.textContent=(userLang==='ru'?'Выбрано: 0':'Selected: 0');

  if(!cardIds.length){toast(userLang==='ru'?'Выбери карточки':'Select cards','err');return;}
  try{
    const res = await api('/api/pvp/join','POST',{telegram_id:tgUser.id,card_ids:cardIds});
    closeModal();
    userData = await api(`/api/user/${tgUser.id}`);
    // Always open wait modal - battle_id may be null until 2nd player joins
    openPvpWaitModal(res.battle_id);
  }catch(e){
    // If already in lobby - just open the wait modal
    if(e.message && e.message.includes('уже в лобби')){
      closeModal();
      openPvpWaitModal(null);
    } else {
      toast(e.message,'err');
    }
  }
}

const _pvpColors = ['#ff2d78','#4ab0ff','#f0c040','#4aff8a','#a78bfa','#ff6b35','#00d2ff','#ff9f1c'];

function openPvpWaitModal(battleId){
  const myCards = window._pvpSelected ? Array.from(window._pvpSelected).length : 1;
  openModal('⚔️ PvP '+(userLang==='ru'?'Битва':'Battle'),
    '<div style="padding:4px 0 8px">'

    + '<div style="position:relative;width:240px;height:240px;margin:0 auto 12px">'
      + '<canvas id="pvp-wheel" width="240" height="240" style="border-radius:50%"></canvas>'

        + '<div id="pvp-countdown" style="font-size:26px;font-weight:900;color:#fff">⏳</div>'
        + '<div id="pvp-timer-label" style="font-size:9px;color:var(--text2)">ожидание</div>'
      + '</div>'
      // Arrow pointer
      + '<div style="position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-top:20px solid #fff"></div>'
    + '</div>'
    // Stats row
    + '<div style="display:flex;justify-content:center;gap:20px;margin-bottom:12px">'
      + '<div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#ff2d78" id="pvp-my-chance">100%</div><div style="font-size:10px;color:var(--text2)">'+(userLang==='ru'?'Твой шанс':'Your chance')+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#fff" id="pvp-players-count">1</div><div style="font-size:10px;color:var(--text2)">'+(userLang==='ru'?'Игроков':'Players')+'</div></div>'
      + '<div style="text-align:center"><div style="font-size:18px;font-weight:900;color:#f0c040" id="pvp-cards-count">'+myCards+'</div><div style="font-size:10px;color:var(--text2)">'+(userLang==='ru'?'Карт на кону':'Cards at stake')+'</div></div>'
    + '</div>'
    + '<div id="pvp-status-text" style="text-align:center;font-size:13px;color:var(--text2);margin-bottom:12px">'+(userLang==='ru'?'Ждём соперника...':'Waiting for opponent...')+'</div>'
    + '</div>'
    + '<button id="pvp-leave-btn" class="btn btn-secondary btn-wide" onclick="leavePvp()">'+(userLang==='ru'?'Покинуть лобби':'Leave lobby')+'</button>'
  );
  // Draw initial wheel (just me)
  setTimeout(()=>drawPvpWheel([{cards: myCards, color:'#ff2d78', name:'Ты'}]), 100);
  if(_pvpInterval) clearInterval(_pvpInterval);
  _pvpInterval = setInterval(()=>pollPvpStatus(battleId), 1500);

function drawPvpWheel(players){
  const canvas = document.getElementById('pvp-wheel');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx=120, cy=120, r=115, ir=50;
  ctx.clearRect(0,0,240,240);
  const total = players.reduce((s,p)=>s+p.cards,0)||1;
  let startAngle = -Math.PI/2;
  players.forEach((p,i)=>{
    const slice = (p.cards/total)*Math.PI*2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,startAngle,startAngle+slice);
    ctx.closePath();
    ctx.fillStyle = p.color||_pvpColors[i%_pvpColors.length];
    ctx.fill();
    // Label in sector
    const midAngle = startAngle + slice/2;
    const lx = cx + (r*0.65)*Math.cos(midAngle);
    const ly = cy + (r*0.65)*Math.sin(midAngle);
    ctx.fillStyle='rgba(0,0,0,0.5)';
    ctx.beginPath(); ctx.arc(lx,ly,18,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fff';
    ctx.font='bold 10px Inter,sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(Math.round(p.cards/total*100)+'%', lx, ly);
    startAngle += slice;
  });
  // Inner circle
  ctx.beginPath(); ctx.arc(cx,cy,ir,0,Math.PI*2);
  ctx.fillStyle='#0a0a0a'; ctx.fill();
}

async function pollPvpStatus(battleId){
  try{
    const s = await api(`/api/pvp/status/${tgUser.id}`);
    if(s.status==='idle'){
      clearInterval(_pvpInterval); _pvpInterval=null;
      return;
    }
    const waitContent = document.getElementById('pvp-wait-content');
    const cdEl = document.getElementById('pvp-countdown');
    const partEl = document.getElementById('pvp-participants');
    const leaveBtn = document.getElementById('pvp-leave-btn');
    if(s.status==='countdown'||s.status==='in_battle'){
      if(cdEl){cdEl.textContent=s.countdown;}
      const timerLabel = document.getElementById('pvp-timer-label');
      if(timerLabel) timerLabel.textContent=s.countdown>0?'сек':'старт!';
      const myChance = document.getElementById('pvp-my-chance');
      const playersCount = document.getElementById('pvp-players-count');
      const cardsCount = document.getElementById('pvp-cards-count');
      const statusText = document.getElementById('pvp-status-text');
      if(myChance) myChance.textContent=Math.round(s.my_cards/s.total_cards*100)+'%';
      if(playersCount) playersCount.textContent=s.participants;
      if(cardsCount) cardsCount.textContent=s.total_cards;
      if(statusText) statusText.textContent=(userLang==='ru'?'Игра началась! Осталось: ':'Game started! Time left: ')+s.countdown+'s';
      // Update wheel with participants data
      if(s.players) drawPvpWheel(s.players);
      if(leaveBtn) leaveBtn.style.display='none';
      // Finish when countdown reaches 0
      if(s.countdown<=0){
        clearInterval(_pvpInterval); _pvpInterval=null;
        await api('/api/pvp/finish','POST',{battle_id:s.battle_id});
        const finalStatus = await api(`/api/pvp/status/${tgUser.id}`);
        closeModal();
        const won = finalStatus.winner_user_id === userData?.id;
        userData = await api(`/api/user/${tgUser.id}`);
        updateBalances();
        loadProfile();
        openModal('⚔️ PvP',
          '<div style="text-align:center;padding:16px 0">'
          + '<div style="font-size:52px;margin-bottom:12px">'+(won?'🏆':'😔')+'</div>'
          + '<div style="font-size:18px;font-weight:900;color:'+(won?'var(--success)':'var(--danger)')+'">'
          + (won?(userLang==='ru'?'Ты победил!':'You won!'):(userLang==='ru'?'Ты проиграл':'You lost'))
          + '</div>'
          + (won?'<div style="font-size:13px;color:var(--text2);margin-top:8px">+'+(finalStatus.total_cards||'?')+' '+(userLang==='ru'?'карточек':'cards')+'</div>':'')
          + '</div>'
          + '<button class="btn btn-primary btn-wide" onclick="closeModal()">'+(userLang==='ru'?'OK':'OK')+'</button>'
        );
      }
    }
    if(s.status==='waiting'){
      if(leaveBtn) leaveBtn.style.display='block';
    }
  }catch(e){ clearInterval(_pvpInterval); _pvpInterval=null; }
}
