<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Memstroy</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦄</text></svg>">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
:root{--bg:#0a0a0a;--bg2:#111;--bg3:#1a1a1a;--border:#222;--text:#fff;--text2:#888;--text3:#444;--star:#f0c040;--dev:#4aff8a;--success:#4aff8a;--danger:#ff4a4a;--tab-h:64px;--safe-b:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;height:100vh;overflow:hidden;position:fixed;width:100%}
.page{position:absolute;inset:0;bottom:calc(var(--tab-h) + var(--safe-b));overflow-y:auto;overflow-x:hidden;display:none;-webkit-overflow-scrolling:touch}
.page.active{display:block}
.page::-webkit-scrollbar{display:none}
.page-header{padding:20px 20px 0;display:flex;align-items:center;justify-content:space-between}
.page-title{font-size:22px;font-weight:800;letter-spacing:-0.5px}
.badge{display:flex;align-items:center;gap:5px;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer;transition:transform 0.12s,opacity 0.15s}
.badge:active{transform:scale(0.93);opacity:0.8}
.badge-star{background:#1a1500;border:1px solid #332800;color:var(--star)}
.badge-dev{background:#0d1a0d;border:1px solid #1a3a1a;color:var(--dev)}
.tabs{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:var(--bg2);border-top:1px solid var(--border);display:flex;align-items:center;z-index:100}
.tab-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;height:100%;background:none;border:none;cursor:pointer;color:var(--text3);font-family:'Inter',sans-serif;font-size:10px;font-weight:600;letter-spacing:0.5px;transition:color 0.2s}
.tab-btn.active{color:#ff2d78}
.tab-btn svg{width:24px;height:24px;transition:transform 0.2s,opacity 0.2s;opacity:0.4}
.tab-btn.active svg{opacity:1;transform:scale(1.1)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:12px;font-family:'Inter',sans-serif;font-weight:700;cursor:pointer;letter-spacing:0.3px;position:relative;overflow:hidden;transition:transform 0.12s,box-shadow 0.12s}
.btn:active{transform:scale(0.95)}
.btn-primary{background:var(--text);color:var(--bg);padding:14px 20px;font-size:15px;width:100%}
.btn-primary:active{box-shadow:0 0 20px rgba(255,255,255,0.3)}
.btn-secondary{background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:12px 18px;font-size:14px}
.btn-secondary:active{border-color:var(--text3);box-shadow:0 0 12px rgba(255,255,255,0.08)}
.btn-danger{background:rgba(255,74,74,0.1);color:var(--danger);border:1px solid rgba(255,74,74,0.2);padding:10px 16px;font-size:13px}
.btn-wide{width:100%}
@keyframes ponkiPulse{0%,100%{box-shadow:0 0 20px rgba(255,45,120,0.3),0 0 40px rgba(255,45,120,0.1)}50%{box-shadow:0 0 35px rgba(255,45,120,0.6),0 0 70px rgba(255,45,120,0.25)}}
@keyframes ponkiFloat{0%,100%{transform:translateY(0px)}50%{transform:translateY(-6px)}}
.ponki-hero{animation:ponkiFloat 3s ease-in-out infinite}
.ponki-hero-wrap{animation:ponkiPulse 2.5s ease-in-out infinite;border-radius:16px}
/* Card flip */
.flip-container{perspective:600px;width:100%;max-width:200px;margin:0 auto;aspect-ratio:1/1}
.flip-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 4.0s cubic-bezier(0.4,0.2,0.2,1)}
.flip-card.flipped{transform:rotateY(180deg)}
.flip-front,.flip-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:14px;overflow:hidden;background:var(--bg3)}
.flip-back{transform:rotateY(180deg)}
.flip-front img,.flip-back img{width:100%;height:100%;object-fit:cover}
@keyframes shakeReveal{0%{transform:rotateY(180deg) scale(1)}15%{transform:rotateY(180deg) scale(1.08) rotate(-2deg)}30%{transform:rotateY(180deg) scale(1.05) rotate(2deg)}45%{transform:rotateY(180deg) scale(1.07) rotate(-1.5deg)}60%{transform:rotateY(180deg) scale(1.03) rotate(1deg)}75%{transform:rotateY(180deg) scale(1.02) rotate(-0.5deg)}100%{transform:rotateY(180deg) scale(1) rotate(0)}}
.flip-card.shake .flip-back{animation:shakeReveal 0.6s ease-out 3.8s both}
@keyframes slideInRight{from{transform:translateX(60px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideInLeft{from{transform:translateX(-60px);opacity:0}to{transform:translateX(0);opacity:1}}
.slide-in-right{animation:slideInRight 0.25s cubic-bezier(0.32,0.72,0,1)}
.slide-in-left{animation:slideInLeft 0.25s cubic-bezier(0.32,0.72,0,1)}
.cards-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
@keyframes cardTap{0%{transform:scale(1) rotate(0)}25%{transform:scale(0.92) rotate(-2deg)}65%{transform:scale(0.96) rotate(1.5deg)}100%{transform:scale(1) rotate(0)}}
.card-item{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.12s,box-shadow 0.12s;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.card-item:active{border-color:#ff2d78;box-shadow:0 0 14px rgba(255,45,120,0.2);animation:cardTap 0.4s ease-out forwards}
.card-img{aspect-ratio:1/1;background:var(--bg3);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.card-img img{width:100%;height:100%;object-fit:cover;display:block}
.card-info{padding:6px 8px}
.card-name{font-size:11px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{font-size:10px;color:var(--text2);font-family:'Inter',sans-serif;margin-top:1px}
.pct-badge{position:absolute;top:5px;right:5px;background:rgba(0,0,0,0.75);border:1px solid rgba(255,255,255,0.1);border-radius:5px;padding:2px 6px;font-size:9px;font-weight:700;font-family:'Inter',sans-serif;color:var(--star)}
.price-badge{position:absolute;bottom:4px;right:4px;background:rgba(0,0,0,0.7);border:1px solid rgba(74,255,138,0.25);border-radius:5px;padding:2px 5px;font-size:10px;font-weight:700;font-family:'Inter',sans-serif;color:var(--dev);opacity:0.85}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.8);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:24px 24px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding-bottom:calc(20px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(0.32,0.72,0,1)}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 16px}
.modal-title{font-size:18px;font-weight:800;padding:0 20px 14px;border-bottom:1px solid var(--border)}
.modal-body{padding:16px;display:flex;flex-direction:column;gap:12px}
.modal-card-preview{aspect-ratio:1/1;max-width:200px;margin:0 auto;width:100%;border-radius:14px;overflow:hidden;background:var(--bg3)}
.modal-card-preview img{width:100%;height:100%;object-fit:cover}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.stat-box{background:var(--bg2);border:1px solid rgba(255,255,255,0.07);border-radius:12px;padding:10px 6px;text-align:center;box-shadow:inset 0 1px 0 rgba(255,255,255,0.04)}
.stat-box .val{font-size:18px;font-weight:800;font-family:'Inter',sans-serif}
.stat-box .lbl{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px;min-height:14px;display:flex;align-items:center;justify-content:center}
.section-label{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.empty-state{text-align:center;padding:48px 20px;color:var(--text3)}
.empty-state p{font-size:14px}
.menu-item{background:var(--bg2);border:1px solid transparent;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background 0.15s,border-color 0.15s}
.menu-item:active{background:var(--bg3);border-color:var(--border)}
.menu-icon{font-size:18px;width:26px;text-align:center;display:flex;align-items:center;justify-content:center}
.menu-text{flex:1}
.menu-label{font-size:14px;font-weight:600}
.price-input-row{display:flex;align-items:center;gap:8px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:4px 4px 4px 14px}
.price-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-family:'Inter',sans-serif;font-size:16px;font-weight:700}
.price-input-row .cur{color:var(--star);font-size:13px;font-weight:700;padding:8px 12px;background:rgba(240,192,64,0.1);border-radius:7px}
.transfer-input{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;width:100%;outline:none}
.transfer-input::placeholder{color:var(--text3)}
.friend-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
.friend-av{width:38px;height:38px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;font-weight:700}
.friend-name{font-size:13px;font-weight:700}
.friend-meta{font-size:11px;color:var(--text2);margin-top:1px}
.friend-cards{margin-left:auto;font-size:12px;color:var(--text2);font-family:'Inter',sans-serif}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:600;z-index:999;transition:transform 0.25s cubic-bezier(0.32,0.72,0,1);white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--success);color:var(--success)}
.toast.err{border-color:var(--danger);color:var(--danger)}
.spinner{width:28px;height:28px;border:2px solid var(--border);border-top-color:var(--text);border-radius:50%;animation:spin 0.6s linear infinite;margin:48px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-page{display:flex;align-items:center;justify-content:center;height:100%}
.content{padding:16px;display:flex;flex-direction:column;gap:14px}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:11px;font-weight:700;color:var(--text2);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;white-space:nowrap}
.filter-btn:active{transform:scale(0.94)}
.filter-btn.active{background:#ff2d78;border-color:#ff2d78;color:#fff}
.trade-filter-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:10px 8px;font-size:13px;font-weight:700;color:var(--text);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.15s;display:flex;align-items:center;justify-content:center;gap:6px}
.trade-filter-btn:active{transform:scale(0.95)}
.trade-filter-btn.has-filter{border-color:#ff2d78;color:#ff2d78}
.trade-filter-count{background:#fff;color:#000;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:800;display:inline-flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<div id="page-buy" class="page active">
  <div class="page-header">
    <span class="page-title" id="t-shop">Shop</span>
    <div class="badge badge-star" onclick="openSplitLink()" style="cursor:pointer"><span>⭐</span><span id="buy-stars-btn">Купить звёзды</span></div>
  </div>
  <div class="content" id="buy-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-sell" class="page">
  <div class="page-header">
    <span class="page-title" id="t-trade">Trade</span>
    <div class="badge" style="background:#0a1a2a;border:1px solid rgba(74,176,255,0.3);color:#4ab0ff;gap:5px;display:flex;align-items:center;border-radius:20px;padding:6px 12px;font-size:13px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer" onclick="openTonModal()"><img src="/static/icons/ton.png" style="width:16px;height:16px;object-fit:contain" onerror="this.outerHTML='💎'"><span id="ton-val-trade">0</span></div>
  </div>
  <div class="content" id="trade-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div id="page-profile" class="page">
  <div class="content" id="profile-content"><div class="loading-page"><div class="spinner"></div></div></div>
</div>

<div class="tabs">
  <button class="tab-btn active" data-page="buy" onclick="switchTab('buy')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
    <span id="tab-shop">Shop</span>
  </button>
  <button class="tab-btn" data-page="sell" onclick="switchTab('sell')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
    <span id="tab-trade">Trade</span>
  </button>
  <button class="tab-btn" data-page="profile" onclick="switchTab('profile')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span id="tab-profile">Profile</span>
  </button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.setHeaderColor('#0a0a0a'); tg.setBackgroundColor('#0a0a0a'); }
const tgUser = tg?.initDataUnsafe?.user || {id:12345678,username:'dev',first_name:'Dev'};
let userData = null, selectedCard = null;

const userLang = ((tg?.initDataUnsafe?.user?.language_code || navigator.language || 'en')+'').toLowerCase().startsWith('ru') ? 'ru' : 'en';
const T = {
  en:{shop:'Shop',trade:'Market',profile:'Profile',whales:'Whales',left:'LEFT',price:'PRICE',supply:'SUPPLY',buy:'Buy',cardCount:(n)=>n===1?'card':`cards`,upgrade:'UPGRADE',sell:'Sell',transfer:'Transfer',serial:'Serial',drop:'Drop %',status:'Status',supplyLbl:'Supply',listSale:'List for Sale',cancel:'Cancel',close:'Close',send:'Send',remove:'Remove listing',noListings:'No listings yet',collection:'Collection',model:'Model',refEarn:'Refer & Earn',refText:'Invite friends — you earn',refOf:'of all their spending!',buyCheapStars:'Buy Stars',connectTon:'Connect TON Wallet',myCards:'My Cards',friends:'Friends',noCards:'No cards yet',noFriends:'No friends yet',showAll:'Show all',showLess:'Show less',clear:'Clear',apply:'Apply',notInPonki:'User not in Ponki',notJoined:"This person hasn't joined yet.",invite:'Invite',purchased:'Purchased!',listed:'Listed!',removed:'Removed',cardSent:'Card sent!',linkCopied:'Link copied!',notEnoughDev:'Not enough DEV',notEnoughStars:'Not enough stars',enterPrice:'Enter price',enterTgId:'Enter Telegram ID',commission:'Commission: 5%',rarity:'Rarity',descShop:'50 unique models · upgrade free',historyTitle:'History'},
  ru:{shop:'Магазин',trade:'Рынок',profile:'Профиль',whales:'Киты',left:'ОСТАЛОСЬ',price:'ЦЕНА',supply:'ТИРАЖ',buy:'Купить',cardCount:(n)=>{if(n%10===1&&n%100!==11)return'карта';if([2,3,4].includes(n%10)&&![12,13,14].includes(n%100))return'карты';return'карт';},upgrade:'УЛУЧШИТЬ',sell:'Продать',transfer:'Передать',serial:'Номер',drop:'Редкость',status:'Статус',supplyLbl:'Тираж',listSale:'Выставить',cancel:'Отмена',close:'Закрыть',send:'Отправить',remove:'Снять',noListings:'Нет объявлений',collection:'Коллекция',model:'Модель',refEarn:'Приглашай и зарабатывай',refText:'Приглашай друзей — получай',refOf:'от их трат автоматически!',buyCheapStars:'Купить звёзды',connectTon:'Подключить TON кошелёк',myCards:'Мои карточки',friends:'Друзья',noCards:'Карточек пока нет',noFriends:'Нет друзей — поделись ссылкой!',showAll:'Показать все',showLess:'Скрыть',clear:'Сбросить',apply:'Применить',notInPonki:'Пользователь не в Ponki',notJoined:'Этот человек ещё не вступил.',invite:'Пригласить',purchased:'Куплено!',listed:'Выставлено!',removed:'Снято',cardSent:'Карточка отправлена!',linkCopied:'Ссылка скопирована!',notEnoughDev:'Недостаточно DEV',notEnoughStars:'Недостаточно звёзд',enterPrice:'Введите цену',enterTgId:'Введите Telegram ID',commission:'Комиссия: 5%',rarity:'Редкость',descShop:'50 уникальных моделей · улучшение бесплатно',historyTitle:'История'}
};
const t = T[userLang];

function fmtNum(n) {
  if (n >= 10000) return '10K';
  if (n >= 1000) {
    const val = Math.floor(n / 100) / 10;
    return val.toFixed(1).replace(/\.0$/,'') + 'K';
  }
  return n.toString();
}

function applyLang() {
  document.getElementById('t-shop').textContent = t.shop;
  document.getElementById('t-trade').textContent = t.trade;
  document.getElementById('tab-shop').textContent = t.shop;
  document.getElementById('tab-trade').textContent = t.trade;
  document.getElementById('tab-whales') && (document.getElementById('tab-whales').textContent = t.whales);
  document.getElementById('tab-profile').textContent = t.profile;
  const bsb = document.getElementById('buy-stars-btn');
  if(bsb) bsb.textContent = t.buyCheapStars;
}

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(path, opts);
  if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.detail||'Error'); }
  return res.json();
}

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast show '+type;
  setTimeout(()=>el.className='toast', 2500);
}

function haptic(type='light') {
  tg?.HapticFeedback?.impactOccurred(type);
  try { navigator.vibrate && navigator.vibrate(type==='heavy'?[30,20,30]:type==='medium'?20:10); } catch(e){}
}

function dropPct(w) {
  return {5:'0.5%',10:'1%',15:'1.5%',20:'2%',25:'2.5%',30:'3%'}[w]||w+'w';
}

function fmtTon(val) {
  // val stored as integer cents (0.1 TON = 10, 1 TON = 100)
  const n = val / 100;
  if (Number.isInteger(n)) return n.toString();
  // Show full precision, no trailing zeros
  return parseFloat(n.toPrecision(10)).toString();
}

function fmtNano(nano) {
  // nano = nanotons, show full precision no trailing zeros
  const n = nano / 1_000_000_000;
  if (n === 0) return '0';
  return parseFloat(n.toPrecision(10)).toString();
}

function updateBalances() {
  if (!userData) return;
  const tonNano = 1_000_000_000;
  const tonBal = userData.ton_balance || 0;
  const tonFmt = tonBal > 0 ? (tonBal / tonNano).toFixed(2) : '0';
  const tv = document.getElementById('ton-val-trade');
  if (tv) tv.textContent = tonFmt;
  // Cashback
  const cb = userData.cashback_balance || 0;
  const cbEl = document.getElementById('cashback-val');
  if (cbEl) cbEl.textContent = (cb/1e9).toFixed(2);
  const earnEl = document.getElementById('earned-val');
  if (earnEl) earnEl.textContent = userData.referral_earnings || 0;
}

function switchTab(tab) {
  haptic();
  sessionStorage.setItem('activeTab', tab);
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('page-'+(tab==='sell'?'sell':tab)).classList.add('active');
  document.querySelector(`[data-page="${tab}"]`).classList.add('active');
  if (tab==='buy') loadBuy();
  if (tab==='sell') loadTrade();
  if (tab==='profile') { profileView='cards'; loadProfile(); }
}

function openModal(title, html) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = html;
  document.getElementById('modal').classList.add('open');
}
function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e=>{
  if (e.target===document.getElementById('modal')) closeModal();
});

// Swipe cards in modal
let _swipeStartX=0;
document.getElementById('modal').addEventListener('touchstart', e=>{
  _swipeStartX = e.touches[0].clientX;
}, {passive:true});
document.getElementById('modal').addEventListener('touchend', e=>{
  const dx = e.changedTouches[0].clientX - _swipeStartX;
  if(Math.abs(dx) < 50) return;
  const cards = window._profileCards||[];
  const cur = selectedCard;
  if(!cur||!cards.length) return;
  const idx = cards.findIndex(c=>c.id===cur.id);
  if(dx < 0 && idx < cards.length-1) swipeCard(idx, 1);
  else if(dx > 0 && idx > 0) swipeCard(idx, -1);
}, {passive:true});

let _buyQty=1,_buyColId=null,_buyPrice=1;
function changeQty(d) {
  haptic(); _buyQty=Math.max(1,Math.min(500,_buyQty+d));
  const qv=document.getElementById('qty-val'), qw=document.getElementById('qty-word'), bb=document.getElementById('buy-btn');
  if(qv) qv.textContent=_buyQty;
  if(qw) qw.textContent=t.cardCount(_buyQty);
  if(bb) bb.textContent=_buyQty===1?`${t.buy} — 1 ⭐`:`${t.buy} ${_buyQty} ⭐`;
}

async function buyCard(colId) {
  haptic('medium');
  const qty=_buyQty||1;
  if(!tg){toast('Open in Telegram','err');return;}
  try {
    const res = await api('/api/create_invoice','POST',{
      telegram_id: tgUser.id,
      collection_id: colId,
      qty: qty
    });
    if(res.invoice_link) {
      tg.openInvoice(res.invoice_link, async (status) => {
        if(status === 'paid') {
          toast(userLang==='ru'?'Оплачено!':'Paid!','ok');
          setTimeout(async()=>{
            userData = await api(`/api/user/${tgUser.id}`);
            updateBalances();
            loadBuy();
          }, 1500);
        }
      });
    }
  } catch(e){toast(e.message,'err');}
}

let allListings=[],tradeSortBy='serial_asc',selectedModels=new Set(),allModelDefs=[];

async function loadTrade() {
  if (!userData) return;
  const el=document.getElementById('trade-content');
  try {
    userData=await api(`/api/user/${tgUser.id}`); updateBalances();
    allListings=await api('/api/market');
    const cols=await api('/api/collections');

    renderTradeUI();
  } catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

          ${userLang==='ru'?'Рынок':'Market'}

          ${userLang==='ru'?'Аукцион':'Auction'}
        </div>

  haptic();
  tradeView=view;
  renderTradeUI();
}

function setHistorySort(sort) {
  haptic();
  historySortBy = sort;
  renderTradeUI();
  loadHistory();
}

function openModelFilter() {
  haptic();
  let html=`<div style="display:flex;flex-direction:column;gap:6px;max-height:52vh;overflow-y:auto;padding-bottom:4px">`;
  for(const m of allModelDefs){
    const sel=selectedModels.has(m.name);
    html+=`<div onclick="toggleModelSelect('${m.name}',this)" style="background:${sel?'#ff2d78':'var(--bg3)'};border:1px solid ${sel?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
      <img src="${m.image_url}" style="width:34px;height:34px;border-radius:6px;object-fit:cover" onerror="this.style.background='var(--bg3)'">
      <div style="flex:1"><div style="font-size:13px;font-weight:700">${m.name}</div><div style="font-size:11px;color:${sel?'rgba(255,255,255,0.7)':'var(--text2)'}">${dropPct(m.drop_weight)}</div></div>
      <span style="font-size:16px;min-width:16px;text-align:right">${sel?'✓':''}</span>
    </div>`;
  }
  const bs=selectedModels.has('Base');
  html+=`<div onclick="toggleModelSelect('Base',this)" style="background:${bs?'#ff2d78':'var(--bg3)'};border:1px solid ${bs?'#ff2d78':'var(--border)'};border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer">
    <img src="/static/ponki/ponki.png" style="width:34px;height:34px;border-radius:6px;object-fit:cover">
    <div style="flex:1"><div style="font-size:13px;font-weight:700">Base</div><div style="font-size:11px;color:var(--text2)">Unupgraded</div></div>
    <span style="font-size:16px;min-width:16px;text-align:right">${bs?'✓':''}</span>
  </div></div>
  <div style="position:sticky;bottom:0;background:var(--bg2);padding:12px 0 0;margin-top:8px;display:flex;gap:8px;border-top:1px solid var(--border)">
    <button class="btn btn-secondary" style="flex:1" onclick="selectedModels.clear();closeModal();renderTradeUI()">${t.clear}</button>
    <button class="btn btn-primary" style="flex:1" onclick="closeModal();renderTradeUI()">${t.apply}</button>
  </div>`;
  openModal(t.model,html);
}

function toggleModelSelect(name,el) {
  haptic();
  if(selectedModels.has(name)){selectedModels.delete(name);el.style.background='var(--bg3)';el.style.borderColor='var(--border)';el.querySelector('span:last-child').textContent='';}
  else{selectedModels.add(name);el.style.background='#ff2d78';el.style.borderColor='#ff2d78';el.querySelector('span:last-child').textContent='✓';}
}

function toggleSerialSort(){tradeSortBy=tradeSortBy==='serial_asc'?'serial_desc':'serial_asc';renderTradeUI();}
function togglePriceSort(){tradeSortBy=tradeSortBy==='price_asc'?'price_desc':'price_asc';renderTradeUI();}
function toggleTradeRarity(){tradeSortBy=tradeSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';renderTradeUI();}

function openSortFilter(){
  haptic();
  const sorts=[
    {key:'price_asc',label:'<img src="/static/icons/ton.png" style="width:12px;height:12px;vertical-align:middle"> ↑'},
    {key:'price_desc',label:'<img src="/static/icons/ton.png" style="width:12px;height:12px;vertical-align:middle"> ↓'},
    {key:'rarity_asc',label:'% ↑'},
    {key:'rarity_desc',label:'% ↓'},
    {key:'serial_asc',label:'# ↑'},
    {key:'serial_desc',label:'# ↓'},
  ];
  let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
  for(const s of sorts){
    const active = tradeSortBy===s.key;
    html+=`<div onclick="tradeSortBy='${s.key}';renderTradeUI();closeModal();" style="background:${active?'#ff2d78':'var(--bg3)'};color:${active?'#fff':'var(--text)'};border-radius:10px;padding:12px 16px;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:space-between">${s.label}${active?'<span>✓</span>':''}</div>`;
  }
  html+=`</div>`;
  openModal(userLang==='ru'?'Сортировка':'Sort', html);
}

async function loadHistory() {
  const el=document.getElementById('history-list'); if(!el) return;
  try {
    const data=await api(`/api/history/${tgUser.id}`);
    let items=(data.history||[]).filter(i=>i.type==='market_buy'||i.type==='market_buy_ton');
    // Sort
    if(historySortBy==='price_asc') items.sort((a,b)=>a.stars_amount-b.stars_amount);
    else if(historySortBy==='price_desc') items.sort((a,b)=>b.stars_amount-a.stars_amount);
    else if(historySortBy==='rarity_asc') items.sort((a,b)=>(a.drop_weight||99)-(b.drop_weight||99));
    else if(historySortBy==='rarity_desc') items.sort((a,b)=>(b.drop_weight||99)-(a.drop_weight||99));
    else if(historySortBy==='serial') items.sort((a,b)=>(a.serial_number||0)-(b.serial_number||0));
    // default: date (already sorted by created_at DESC from API)
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'Сделок пока нет':'No trades yet'}</p></div>`;
      return;
    }
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id;
      const label=isIncome?(userLang==='ru'?'Продано':'Sold'):(userLang==='ru'?'Куплено':'Bought');
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0">
          <img src="${item.image_url||'/static/ponki/ponki.png'}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.background='var(--bg3)'">
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">Ponki · ${item.card_name||'?'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${label}</div>
          <div style="font-size:10px;color:var(--text3);font-family:'Inter',sans-serif">${item.created_at?(new Date(item.created_at.replace(' ','T')+'Z')).toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',',''):''}</div>
        </div>
        <div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap;display:flex;align-items:center;gap:3px">${item.type==='market_buy_ton'?`<img src="/static/icons/ton.png" style="width:13px;height:13px;object-fit:contain"> ${fmtNano(item.stars_amount)}`:`${item.stars_amount}⭐`}</div>
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

function renderListings() {
  let list=[...allListings];
  if(selectedModels.size>0) list=list.filter(l=>selectedModels.has(l.name));
  if(tradeSortBy==='price_asc') list.sort((a,b)=>a.price_stars-b.price_stars);
  else if(tradeSortBy==='price_desc') list.sort((a,b)=>b.price_stars-a.price_stars);
  else if(tradeSortBy==='serial_asc') list.sort((a,b)=>a.serial_number-b.serial_number);
  else if(tradeSortBy==='serial_desc') list.sort((a,b)=>b.serial_number-a.serial_number);
  else if(tradeSortBy==='rarity_asc') list.sort((a,b)=>a.drop_weight-b.drop_weight);
  else if(tradeSortBy==='rarity_desc') list.sort((a,b)=>b.drop_weight-a.drop_weight);

  const el=document.getElementById('listings-list'); if(!el) return;
  if(list.length===0){el.innerHTML=`<div class="empty-state"><p>${t.noListings}</p></div>`;return;}
  let html=`<div class="cards-grid">`;
  for(const l of list){
    const isOwn=l.seller_id===userData.id;
    html+=`<div class="card-item" onclick='openMarketModal(${JSON.stringify(l)},${isOwn})' style="${isOwn?'border:2px solid #4ab0ff;box-shadow:0 0 10px rgba(74,176,255,0.3)':''}">
      <div class="card-img">
        <img src="${l.image_url}" onerror="this.style.background='var(--bg3)'">
        <span class="pct-badge">${dropPct(l.drop_weight)}</span>
        <span class="price-badge" style="color:#4ab0ff">${fmtTon(l.price_stars)} TON</span>
      </div>
      <div class="card-info"><div class="card-name">${l.name}</div><div class="card-meta">#${l.serial_number}</div></div>
    </div>`;
  }
  html+=`</div>`; el.innerHTML=html;
}

function openMarketModal(listing,isOwn) {
  openModal(listing.name,`
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div class="modal-card-preview"><img src="${listing.image_url}" onerror="this.style.background='var(--bg3)'"></div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px">
      <div class="stat-box"><div class="val" style="font-size:14px">#${listing.serial_number}</div><div class="lbl">${t.serial}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:#4ab0ff">${fmtTon(listing.price_stars)} TON</div><div class="lbl">${t.price}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${dropPct(listing.drop_weight)}</div><div class="lbl">${t.drop}</div></div>
    </div>
    ${isOwn
      ?`<button class="btn btn-danger btn-wide" onclick="unlistCard(${listing.id})">${t.remove}</button>`
      :`<div style="display:flex;flex-direction:column;gap:8px">
        <button class="btn btn-primary" onclick="buyListing(${listing.id},${listing.price_stars})">${t.buy} ${fmtTon(listing.price_stars)} TON</button>
        <button class="btn btn-secondary btn-wide" onclick="openOfferModal(${listing.user_card_id},'${listing.name}','${listing.image_url}')">${userLang==='ru'?'Предложить цену':'Make offer'}</button>
       </div>`
    }
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.close}</button>
  `);
}

async function buyListing(id,price){
  haptic('medium');
  const tonNano = 1_000_000_000;
  const priceNano = price * 10_000_000; // price stored as cents (0.1 TON = 10), convert to nano
  const bal = userData?.ton_balance || 0;
  if(bal < priceNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${(bal/tonNano).toFixed(2)}`:`Not enough TON. Balance: ${(bal/tonNano).toFixed(2)}`,'err');
    return;
  }
  try{
    await api('/api/market/buy_ton','POST',{telegram_id:tgUser.id,listing_id:id});
    closeModal();
    toast(userLang==='ru'?'Куплено!':'Purchased!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    loadTrade();
  }catch(e){toast(e.message,'err');}
}
async function unlistCard(id){
  haptic();
  try{await api('/api/market/unlist','POST',{telegram_id:tgUser.id,listing_id:id});closeModal();toast(t.removed,'ok');loadTrade();}catch(e){toast(e.message,'err');}
}

let profileSortBy='serial_asc';
let profileView='cards'; // 'cards' or 'history'

async function loadProfile() {
  const el=document.getElementById('profile-content');

function toggleProfileSerial(){haptic();profileSortBy=profileSortBy==='serial_asc'?'serial_desc':'serial_asc';loadProfile();}
function toggleProfileRarity(){haptic();profileSortBy=profileSortBy==='rarity_asc'?'rarity_desc':'rarity_asc';loadProfile();}

function setProfileView(view) {
  haptic();
  profileView=view;
  loadProfile().then(()=>{
    if(view==='selling') loadProfileSelling();

    if(view==='history') loadProfileHistory();

}

async function loadProfileHistory() {
  const el=document.getElementById('profile-history-list'); if(!el) return;
  try {
    const data=await api(`/api/history/${tgUser.id}`);
    const items=data.history||[];
    if(items.length===0){
      el.innerHTML=`<div class="empty-state"><p>${userLang==='ru'?'История пуста':'No history yet'}</p></div>`;
      return;
    }
    const typeLabel=(type,isIncome)=>{
      if(userLang==='ru'){
        const map={buy:'Куплено',market_buy:'Продано',market_buy_ton:'Продано',market_buy_offer:'Офер принят',upgrade:'Улучшено',transfer:isIncome?'Получено':'Передано',sell:'Продано',buy_stars:'Пополнение ⭐'};
        return map[type]||type;
      } else {
        const map={buy:'Bought',market_buy:'Sold',market_buy_ton:'Sold',market_buy_offer:'Offer accepted',upgrade:'Upgraded',transfer:isIncome?'Received':'Transferred',sell:'Sold',buy_stars:'Stars added'};
        return map[type]||type;
      }
    };
    const typeIcon=(type)=>({buy:'🛒',market_buy:'🏪',market_buy_ton:'🏪',upgrade:'✨',transfer:'✈️',sell:'💰',buy_stars:'⭐'}[type]||'📋');
    let html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const item of items){
      const isIncome=item.to_user_id===userData.id&&item.stars_amount>0&&item.type!=='buy';
      const timeStr=item.created_at?((d=>{
        const dt=new Date(d+'Z'); // treat as UTC
        return dt.toLocaleString('ru-RU',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit',timeZone:'Europe/Tallinn'}).replace(',','');
      })(item.created_at.replace(' ','T'))):'';
      html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:8px;background:var(--bg3);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px">
          ${item.image_url?`<img src="${item.image_url}" style="width:100%;height:100%;object-fit:cover" onerror="this.outerHTML='${typeIcon(item.type)}'">`:typeIcon(item.type)}
        </div>
        <div style="flex:1;min-width:0">
          <div style="font-size:13px;font-weight:700">${item.card_name||'Ponki'}${item.serial_number?` <span style="color:var(--text2);font-weight:400">#${item.serial_number}</span>`:''}</div>
          <div style="font-size:11px;color:var(--text2);margin-top:1px">${typeLabel(item.type,isIncome)}</div>
          ${timeStr?`<div style="font-size:10px;color:var(--text3);margin-top:1px;font-family:'Inter',sans-serif">${timeStr}</div>`:''}
        </div>
        ${item.stars_amount>0?`<div style="font-size:14px;font-weight:800;color:${isIncome?'var(--success)':'var(--text2)'};white-space:nowrap">${isIncome?'+':'−'}${item.type==='market_buy_ton'?`<span style="display:inline-flex;align-items:center;gap:2px"><img src="/static/icons/ton.png" style="width:12px;height:12px;object-fit:contain"> ${fmtNano(item.stars_amount)}</span>`:`${item.stars_amount}⭐`}</div>`:''}
      </div>`;
    }
    html+=`</div>`; el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

let _friendsCache = null;

  try{

    const fc=document.getElementById('friends-count'); if(fc) fc.textContent=cnt;
    const fm=document.getElementById('friends-menu-count'); if(fm) fm.textContent=cnt;
  }catch(e){}
}

function openFriendsModal(){
  haptic();
  const friends=_friendsCache||[];
  let html='';
  if(friends.length===0){
    html=`<div class="empty-state"><p>${t.noFriends}</p></div>`;
  } else {
    html=`<div style="display:flex;flex-direction:column;gap:8px">`;
    for(const f of friends){
      const name=f.first_name||f.username||'User';
      const colors=['#ff2d78','#4ab0ff','#4aff8a','#f0c040','#ff8c00'];
      const color=colors[(name.charCodeAt(0)||0)%colors.length];
      html+=`<div class="friend-item">
        <div class="friend-av" style="background:${color}22;border-color:${color}44;color:${color};font-size:17px">${name[0].toUpperCase()}</div>
        <div style="flex:1">
          <div class="friend-name">${name}</div>
          <div class="friend-meta">${f.username?'@'+f.username:'ID '+f.telegram_id}</div>
        </div>

function openCardModal(card, allCards, direction){
  selectedCard=card;
  if(allCards) window._profileCards=allCards;
  const cards=window._profileCards||[];
  const idx=cards.findIndex(c=>c.id===card.id);
  const upgraded=card.is_upgraded===1;
  const title=upgraded?card.name:'Ponki #'+card.serial_number;
  const slideClass=direction===1?'slide-in-right':direction===-1?'slide-in-left':'';
  openModal(title,`
    <div style="font-size:12px;font-weight:800;color:#fff;text-align:center;margin-bottom:4px;letter-spacing:2px">PONKI</div>
    <div style="display:flex;align-items:center;gap:8px">
      <button onclick="swipeCard(${idx},-1)" style="background:${idx>0?'var(--bg3)':'transparent'};border:1px solid ${idx>0?'var(--border)':'transparent'};color:${idx>0?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">‹</button>
      <div class="flip-container ${slideClass}" id="flip-wrap" style="flex:1">
        <div class="flip-card ${upgraded?'flipped':''}" id="flip-card">
          <div class="flip-front"><img src="/static/ponki/ponki.png" onerror="this.style.background='var(--bg3)'"></div>
          <div class="flip-back"><img src="${card.image_url}" onerror="this.style.background='var(--bg3)'"></div>
        </div>
      </div>
      <button onclick="swipeCard(${idx},1)" style="background:${idx<cards.length-1?'var(--bg3)':'transparent'};border:1px solid ${idx<cards.length-1?'var(--border)':'transparent'};color:${idx<cards.length-1?'var(--text)':'var(--text3)'};font-size:22px;cursor:pointer;padding:0;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s">›</button>
    </div>
    <div style="text-align:center;font-size:11px;color:var(--text3);font-family:'Inter',sans-serif">${idx+1} / ${cards.length}</div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div class="stat-box"><div class="val" style="font-size:14px">#${card.serial_number}</div><div class="lbl">${t.serial}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px;color:var(--star)">${upgraded?dropPct(card.drop_weight):'Base'}</div><div class="lbl">${upgraded?t.drop:t.status}</div></div>
      <div class="stat-box"><div class="val" style="font-size:14px">10K</div><div class="lbl">${t.supplyLbl}</div></div>
    </div>
    ${!upgraded?`
      <button class="btn btn-primary btn-wide" onclick="upgradeCard(${card.id})">${t.upgrade}</button>
      <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>
      <button class="btn btn-secondary btn-wide" onclick="openTransferModal(${card.id})">${t.transfer}</button>
    `:`
      <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>
      <button class="btn btn-secondary btn-wide" onclick="openCreateAuctionModalForCard(${card.id})">${userLang==='ru'?'Аукцион':'Auction'}</button>
      <button class="btn btn-secondary btn-wide" onclick="openTransferModal(${card.id})">${t.transfer}</button>
    `}
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${t.close}</button>
  `);
}

function swipeCard(currentIdx, direction) {
  haptic();
  const cards=window._profileCards||[];
  const newIdx=currentIdx+direction;
  if(newIdx<0||newIdx>=cards.length) return;
  openCardModal(cards[newIdx], null, direction);
}

async function upgradeCard(cardId){
  haptic('medium');
  try{
    const res=await api('/api/upgrade_card_internal','POST',{telegram_id:tgUser.id,user_card_id:cardId});
    const fc=document.getElementById('flip-card');
    const fb=fc?.querySelector('.flip-back img');
    if(fc&&fb&&res.card?.image_url){
      fb.src=res.card.image_url;
      setTimeout(()=>{
        fc.classList.add('flipped');
        fc.classList.add('shake');
        // Powerful vibration pattern
        try { navigator.vibrate && navigator.vibrate([50,30,80,30,120,50,200]); } catch(e){}
        tg?.HapticFeedback?.impactOccurred('heavy');
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('medium'); try{navigator.vibrate&&navigator.vibrate(40);}catch(e){} },800);
        setTimeout(()=>{ tg?.HapticFeedback?.impactOccurred('light'); try{navigator.vibrate&&navigator.vibrate(20);}catch(e){} },1400);
        setTimeout(()=>{ tg?.HapticFeedback?.notificationOccurred('success'); try{navigator.vibrate&&navigator.vibrate([30,20,30]);}catch(e){} },2200);
      },100);
    }
    if(selectedCard){ selectedCard.is_upgraded=1; if(res.card?.image_url) selectedCard.image_url=res.card.image_url; if(res.card?.name) selectedCard.name=res.card.name; if(res.card?.drop_weight) selectedCard.drop_weight=res.card.drop_weight; }
    setTimeout(async()=>{
      userData=await api(`/api/user/${tgUser.id}`); updateBalances();
      toast(`${res.card?.name||'Upgraded'}!`,'ok');
      // Update modal title to show real name
      const modalTitle=document.getElementById('modal-title');
      if(modalTitle&&res.card?.name) modalTitle.textContent=res.card.name;
      // Update stat box to show rarity
      const statBoxes=document.querySelectorAll('#modal-body .stat-box');
      if(statBoxes[1]&&res.card?.drop_weight){
        statBoxes[1].innerHTML=`<div class="val" style="font-size:14px;color:var(--star)">${dropPct(res.card.drop_weight)}</div><div class="lbl">${t.drop}</div>`;
      }
      const upgradeBtn=document.querySelector('#modal-body .btn-primary');
      if(upgradeBtn){
        upgradeBtn.outerHTML=`
          <button class="btn btn-secondary btn-wide" onclick="openListModal()">${t.sell}</button>`;
      }
      loadProfile();
    },800);
  }catch(e){toast(e.message,'err');}
}

  const card=selectedCard;
  openModal(t.listSale,`

async function doTransfer(cardId){

  const isUsername=rawInput.startsWith('@')||isNaN(rawInput);

  if(!toId){toast(t.enterTgId,'err');return;}

  // 1 Star transfer fee via invoice
  try {
    const res = await api('/api/create_invoice','POST',{
      telegram_id: tgUser.id, collection_id: 0, qty: 1,
      purpose: 'transfer', card_id: cardId, to_id: String(toId)

      closeModal();

async function doTonDeposit(botAddr, memo){
  haptic('medium');
  const amountTon = parseFloat(document.getElementById('ton-dep-amount')?.value);
  if(!amountTon || amountTon < 0.1){ toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err'); return; }
  if(!tonUI?.wallet){ toast(userLang==='ru'?'Подключи кошелёк':'Connect wallet first','err'); return; }

  const amountNano = Math.floor(amountTon * 1_000_000_000).toString();

  try {
    await tonUI.sendTransaction({
      validUntil: Math.floor(Date.now() / 1000) + 360,
      messages: [{
        address: botAddr,
        amount: amountNano
      }]
    });
    // Optimistic credit - trust TonConnect confirmation
    const res = await api('/api/ton/deposit_confirm','POST',{
      telegram_id: tgUser.id,
      amount_nano: parseInt(amountNano),
      init_data: tg?.initData || ''
    });
    userData.ton_balance = res.ton_balance;
    updateBalances();
    toast(`+${amountTon} TON ${userLang==='ru'?'зачислено':'credited'}!`,'ok');
    const el = document.getElementById('ton-action-area');
    if(el) el.innerHTML='';
    // Reload and close modal, go back to where user was
    setTimeout(async()=>{
      userData = await api(`/api/user/${tgUser.id}`);
      updateBalances();
      closeModal();
      // Go to trade if on trade tab, else profile
      const activeTab = document.querySelector('.tab-btn.active')?.dataset?.page;
      if(activeTab === 'sell') loadTrade();
      else { profileView='cards'; loadProfile(); switchTab('profile'); }
    }, 800);
  } catch(e){
    const msg = (e?.message||'').toLowerCase();
    if(msg.includes('cancel')||msg.includes('reject')||msg.includes('denied')||msg.includes('user')){
      toast(userLang==='ru'?'Отменено':'Cancelled','');
    } else {
      toast(e?.message||'Error','err');
    }
  }
}

async function checkTonDeposit(){
  haptic();
  try {
    const res = await api('/api/ton/check_deposits','POST',{telegram_id:tgUser.id});
    userData.ton_balance = res.ton_balance;
    updateBalances();
    if(res.new_deposits > 0) {
      toast(`+${res.new_deposits} TON ${userLang==='ru'?'зачислено':'credited'}!`,'ok');
      setTimeout(()=>{ openTonModal(); }, 500);
    } else {
      toast(userLang==='ru'?'Новых поступлений нет':'No new deposits','');
    }
  } catch(e){ toast(e.message,'err'); }
}

async function doTonWithdraw(){
  haptic('medium');
  const amount = parseFloat(document.getElementById('ton-withdraw-amount')?.value);
  if(!amount||amount<0.1){toast(userLang==='ru'?'Минимум 0.1 TON':'Min 0.1 TON','err');return;}
  const addr = tonUI?.wallet?.account?.address || userData?.ton_address || '';
  if(!addr){toast(userLang==='ru'?'Подключи кошелёк сначала':'Connect wallet first','err');return;}
  const bal = userData?.ton_balance||0;
  const amountNano = Math.floor(amount*1_000_000_000);
  if(bal < amountNano){
    toast(userLang==='ru'?`Недостаточно TON. Баланс: ${fmtNano(bal)}`:`Not enough TON. Balance: ${fmtNano(bal)}`,'err');
    return;
  }
  try {
    const res = await api('/api/ton/withdraw','POST',{telegram_id:tgUser.id,amount,to_address:addr});
    // Deduct from local balance immediately
    userData.ton_balance = (userData.ton_balance||0) - amountNano;
    updateBalances();
    const el = document.getElementById('ton-action-area');
    if(el) el.innerHTML=`
      <div style="background:var(--bg3);border:1px solid rgba(74,255,138,0.2);border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:14px;font-weight:700;color:var(--success);margin-bottom:4px">✅ ${userLang==='ru'?'Вывод обрабатывается':'Withdrawal processing'}</div>
        <div style="font-size:12px;color:var(--text2)">${amount} TON → ${addr.slice(0,6)}...${addr.slice(-4)}</div>
      </div>`;
  } catch(e){ toast(e.message,'err'); }
}

function openOfferModal(cardId, cardName, imageUrl){
  haptic();
  openModal(userLang==='ru'?'Предложить цену':'Make Offer', `
    <div class="modal-card-preview" style="max-height:140px"><img src="${imageUrl}" onerror="this.style.background='var(--bg3)'"></div>
    <div style="font-size:14px;font-weight:700;text-align:center;margin-bottom:4px">${cardName}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px;text-align:center">${userLang==='ru'?'Ваш баланс':'Your balance'}: <span style="color:#4ab0ff">${fmtNano(userData?.ton_balance||0)} TON</span></div>
    <div class="price-input-row"><input type="number" id="offer-amount" placeholder="0.1" min="0.01" step="0.01"><span class="cur" style="color:#4ab0ff">TON</span></div>
    <button class="btn btn-primary" onclick="submitOffer(${cardId})">${userLang==='ru'?'Отправить оффер':'Send offer'}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${userLang==='ru'?'Отмена':'Cancel'}</button>
  `);
}

async function submitOffer(cardId){
  haptic('medium');
  const amount = parseFloat(document.getElementById('offer-amount')?.value);
  if(!amount||amount<0.01){toast(userLang==='ru'?'Минимум 0.01 TON':'Min 0.01 TON','err');return;}
  try{
    await api('/api/offer/make','POST',{telegram_id:tgUser.id,user_card_id:cardId,amount_ton:amount});
    closeModal();
    toast(userLang==='ru'?'Оффер отправлен!':'Offer sent!','ok');
  }catch(e){toast(e.message,'err');}
}

async function loadOffersBadge(){
  try{
    const data = await api(`/api/offers/${tgUser.id}`);
    const count = (data.received||[]).length;
    const badge = document.getElementById('offers-count-badge');
    if(badge){
      if(count>0){badge.textContent=count;badge.style.display='flex';}
      else badge.style.display='none';
    }
  }catch(e){}
}

async function loadProfileOffers(){
  const el = document.getElementById('profile-offers-list');
  if(!el) return;
  el.innerHTML='<div class="spinner" style="margin:32px auto"></div>';
  try{
    const data = await api(`/api/offers/${tgUser.id}`);
    const received = data.received||[];
    const sent = data.sent||[];
    let html='';

    if(received.length>0){
      html+=`<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:6px">${userLang==='ru'?'Входящие':'Incoming'}</div>`;
      for(const o of received){
        const ton = fmtNano(o.amount_nano);
        html+=`<div style="background:var(--bg2);border:1px solid rgba(74,255,138,0.2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3)"><img src="${o.image_url}" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${o.card_name} <span style="color:var(--text2);font-weight:400">#${o.serial_number}</span></div>
            <div style="font-size:11px;color:var(--text2)">${o.from_name||'@'+o.from_username||'User'}</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:14px;font-weight:800;color:#4ab0ff;margin-bottom:6px">${ton} TON</div>
            <div style="display:flex;gap:6px">
              <button onclick="acceptOffer(${o.id})" style="background:rgba(74,255,138,0.15);border:1px solid rgba(74,255,138,0.3);color:var(--success);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">✓</button>
              <button onclick="declineOffer(${o.id})" style="background:rgba(255,74,74,0.1);border:1px solid rgba(255,74,74,0.2);color:var(--danger);border-radius:8px;padding:4px 10px;font-size:12px;font-weight:700;cursor:pointer">✕</button>
            </div>
          </div>
        </div>`;
      }
    }

    if(sent.length>0){
      html+=`<div style="font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin:${received.length>0?'12':'0'}px 0 6px">${userLang==='ru'?'Отправленные':'Sent'}</div>`;
      for(const o of sent){
        const ton = fmtNano(o.amount_nano);
        html+=`<div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px">
          <div style="width:40px;height:40px;border-radius:8px;overflow:hidden;flex-shrink:0;background:var(--bg3)"><img src="${o.image_url}" style="width:100%;height:100%;object-fit:cover"></div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:700">${o.card_name} <span style="color:var(--text2);font-weight:400">#${o.serial_number}</span></div>
            <div style="font-size:11px;color:var(--text2)">${o.to_name||'@'+o.to_username||'User'}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <div style="font-size:14px;font-weight:800;color:#4ab0ff">${ton} TON</div>
            <button onclick="declineOffer(${o.id})" style="background:rgba(255,74,74,0.1);border:1px solid rgba(255,74,74,0.2);color:var(--danger);border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;cursor:pointer">${userLang==='ru'?'Отменить':'Cancel'}</button>
          </div>
        </div>`;
      }
    }

    if(!html) html=`<div class="empty-state"><p>${userLang==='ru'?'Офферов пока нет':'No offers yet'}</p></div>`;
    el.innerHTML=html;
  }catch(e){el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`;}
}

async function acceptOffer(offerId){
  haptic('medium');
  try{
    await api('/api/offer/accept','POST',{telegram_id:tgUser.id,offer_id:offerId});
    toast(userLang==='ru'?'Оффер принят!':'Offer accepted!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    loadProfileOffers();
    loadProfile();
  }catch(e){toast(e.message,'err');}
}

async function declineOffer(offerId){
  haptic();
  try{
    await api('/api/offer/decline','POST',{telegram_id:tgUser.id,offer_id:offerId});
    toast(userLang==='ru'?'Отклонено':'Declined','');
    loadProfileOffers();
    loadOffersBadge();
  }catch(e){toast(e.message,'err');}
}

async function loadAuctions(){
  const el = document.getElementById('auction-list');
  if(!el) return;
  el.innerHTML = '<div class="spinner" style="margin:32px auto"></div>';
  try {
    const auctions = await api('/api/auctions');
    if(auctions.length === 0){
      el.innerHTML = `<div class="empty-state"><p>${userLang==='ru'?'Нет активных аукционов':'No active auctions'}</p></div>`;
      return;
    }
    let html = `<div style="display:flex;flex-direction:column;gap:10px">`;
    for(const a of auctions){
      const isOwn = a.seller_id === userData?.id;
      const isBidder = a.current_bidder_id === userData?.id;
      const price = (a.current_price_nano/1e9).toFixed(2).replace(/\.?0+$/,'');
      const minBid = ((a.current_price_nano + a.min_step_nano)/1e9).toFixed(2).replace(/\.?0+$/,'');
      const endsAt = new Date(a.ends_at+'Z');
      const now = new Date();
      const diff = Math.max(0, endsAt - now);
      const hrs = Math.floor(diff/3600000);
      const mins = Math.floor((diff%3600000)/60000);
      const secs = Math.floor((diff%60000)/1000);
      const timeStr = hrs>0 ? `${hrs}ч ${mins}м` : `${mins}м ${secs}с`;
      html += `<div style="background:var(--bg2);border:1px solid ${isOwn?'rgba(74,176,255,0.4)':isBidder?'rgba(74,255,138,0.3)':'rgba(255,255,255,0.07)'};border-radius:14px;overflow:hidden">
        <div style="display:flex;gap:10px;padding:12px">
          <div style="width:60px;height:60px;border-radius:10px;overflow:hidden;flex-shrink:0;background:var(--bg3)">
            <img src="${a.image_url}" style="width:100%;height:100%;object-fit:cover">
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:14px;font-weight:700">Ponki · ${a.card_name} <span style="color:var(--text2);font-weight:400">#${a.serial_number}</span></div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${dropPct(a.drop_weight)}</div>
            <div style="display:flex;align-items:center;gap:6px;margin-top:6px">
              <img src="/static/icons/ton.png" style="width:14px;height:14px;object-fit:contain">
              <span style="font-size:16px;font-weight:800;color:#4ab0ff">${price}</span>
              <span style="font-size:11px;color:var(--text3)">${a.current_bidder_id?userLang==='ru'?'тек. ставка':'current bid':userLang==='ru'?'старт':'start'}</span>
            </div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:11px;color:var(--danger);font-weight:700">⏱ ${timeStr}</div>
            ${a.current_bidder_id?`<div style="font-size:10px;color:var(--text2);margin-top:2px">${a.bidder_name||'@'+a.bidder_username||'?'}</div>`:''}
          </div>
        </div>
        ${!isOwn?`<div style="padding:0 12px 12px">
          <button class="btn btn-primary btn-wide" onclick="openBidModal(${a.id},'${a.card_name}',${a.current_price_nano},${a.min_step_nano},'${price}','${minBid}')" style="font-size:13px;padding:10px">
            ${userLang==='ru'?'Сделать ставку':'Place bid'} — от ${minBid} TON
          </button>
        </div>`:`<div style="padding:0 12px 12px;font-size:12px;color:var(--text2);text-align:center">${userLang==='ru'?'Ваш аукцион':'Your auction'}</div>`}
      </div>`;
    }
    html += '</div>';
    el.innerHTML = html;
  } catch(e){ el.innerHTML=`<div class="empty-state"><p>${e.message}</p></div>`; }
}

function openBidModal(auctionId, cardName, currentNano, stepNano, currentTon, minBid){
  haptic();
  openModal(userLang==='ru'?'Сделать ставку':'Place bid', `
    <div style="font-size:14px;font-weight:700;text-align:center;margin-bottom:4px">Ponki · ${cardName}</div>
    <div style="font-size:12px;color:var(--text2);text-align:center;margin-bottom:12px">${userLang==='ru'?'Текущая ставка':'Current bid'}: <span style="color:#4ab0ff">${currentTon} TON</span></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:8px">${userLang==='ru'?'Ваш баланс':'Balance'}: <span style="color:#4ab0ff">${fmtNano(userData?.ton_balance||0)} TON</span></div>
    <div class="price-input-row">
      <input type="number" id="bid-amount" placeholder="${minBid}" value="${minBid}" min="${minBid}" step="0.1">
      <span class="cur" style="color:#4ab0ff">TON</span>
    </div>
    <button class="btn btn-primary btn-wide" onclick="submitBid(${auctionId})">${userLang==='ru'?'Поставить':'Bid'}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${userLang==='ru'?'Отмена':'Cancel'}</button>
  `);
  setTimeout(()=>{ const i=document.getElementById('bid-amount'); if(i){i.focus();i.select();} }, 200);
}

async function submitBid(auctionId){
  haptic('medium');
  const amount = parseFloat(document.getElementById('bid-amount')?.value);
  if(!amount||amount<=0){toast(userLang==='ru'?'Введите сумму':'Enter amount','err');return;}
  try{
    await api('/api/auction/bid','POST',{telegram_id:tgUser.id,auction_id:auctionId,amount_ton:amount});
    closeModal();
    toast(userLang==='ru'?'Ставка принята!':'Bid placed!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    updateBalances();
    loadAuctions();
  }catch(e){toast(e.message,'err');}
}

function openCreateAuctionModalForCard(cardId){
  closeModal();
  setTimeout(()=>{
    openCreateAuctionModal();
    setTimeout(()=>{
      const el = document.querySelector(`[data-card-id="${cardId}"]`);
      if(el){
        const card = (userData?.cards||[]).find(c=>c.id===cardId);
        if(card) selectAuctionCard(cardId, card.name, el);
      }
    }, 200);
  }, 100);
}

function openCreateAuctionModal(){
  haptic();
  const myCards = (userData?.cards||[]).filter(c=>c.is_upgraded);
  if(myCards.length===0){
    toast(userLang==='ru'?'Нет улучшенных карточек для аукциона':'No upgraded cards for auction','err');
    return;
  }
  let cardsHtml = `<div class="cards-grid">` + myCards.map(c=>`
    <div onclick="selectAuctionCard(${c.id},'${c.name}',this)" class="card-item" style="border:2px solid var(--border)" data-card-id="${c.id}">
      <div class="card-img"><img src="${c.image_url}" onerror="this.style.background='var(--bg3)'"><span class="pct-badge">${dropPct(c.drop_weight)}</span></div>
      <div class="card-info"><div class="card-name">${c.name}</div><div class="card-meta">#${c.serial_number}</div></div>
    </div>`).join('') + `</div>`;

  openModal(userLang==='ru'?'Создать аукцион':'Create auction', `
    <div style="max-height:200px;overflow-y:auto;margin-bottom:8px">${cardsHtml}</div>
    <div id="auction-card-selected" style="font-size:12px;color:var(--text2);margin-bottom:8px"></div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${userLang==='ru'?'Стартовая цена (TON):':'Start price (TON):'}</div>
    <div class="price-input-row" style="margin-bottom:8px">
      <input type="number" id="auction-start-price" placeholder="0.1" min="0.01" step="0.1" value="0.1">
      <span class="cur" style="color:#4ab0ff">TON</span>
    </div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:4px">${userLang==='ru'?'Длительность:':'Duration:'}</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      ${[0.016,1,12,24].map(h=>`<button onclick="selectAuctionDuration(${h},this)" style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:12px;font-weight:700;cursor:pointer" data-hours="${h}">${h===0.016?'1м':h+'ч'}</button>`).join('')}
    </div>
    <input type="hidden" id="auction-card-id" value="">
    <input type="hidden" id="auction-duration" value="24">
    <button class="btn btn-primary btn-wide" onclick="createAuction()">${userLang==='ru'?'Запустить аукцион':'Start auction'}</button>
    <button class="btn btn-secondary btn-wide" onclick="closeModal()">${userLang==='ru'?'Отмена':'Cancel'}</button>
  `);
  // Select first duration
  setTimeout(()=>{
    const btns = document.querySelectorAll('[data-hours]');
    if(btns[3]) { btns[3].style.background='#ff2d78'; btns[3].style.color='#fff'; }
  }, 100);
}

function selectAuctionCard(cardId, cardName, el){
  haptic();
  document.querySelectorAll('[data-card-id]').forEach(e=>{ e.style.border='2px solid var(--border)'; });
  el.style.border='2px solid #ff2d78';
  document.getElementById('auction-card-id').value = cardId;
  document.getElementById('auction-card-selected').textContent = '✓ ' + cardName;
}

function selectAuctionDuration(hours, el){
  haptic();
  document.querySelectorAll('[data-hours]').forEach(e=>{ e.style.background='var(--bg3)'; e.style.color='var(--text)'; e.style.borderColor='var(--border)'; });
  el.style.background='#ff2d78'; el.style.color='#fff';
  document.getElementById('auction-duration').value = hours;
}

async function createAuction(){
  haptic('medium');
  const cardId = document.getElementById('auction-card-id')?.value;
  const startPrice = parseFloat(document.getElementById('auction-start-price')?.value);
  const duration = parseInt(document.getElementById('auction-duration')?.value||'24');
  if(!cardId){toast(userLang==='ru'?'Выберите карточку':'Select a card','err');return;}
  if(!startPrice||startPrice<0.01){toast(userLang==='ru'?'Минимум 0.01 TON':'Min 0.01 TON','err');return;}
  try{
    await api('/api/auction/create','POST',{telegram_id:tgUser.id,user_card_id:parseInt(cardId),start_price_ton:startPrice,duration_hours:duration});
    closeModal();
    toast(userLang==='ru'?'Аукцион создан!':'Auction created!','ok');
    userData=await api(`/api/user/${tgUser.id}`);
    loadAuctions();
    loadProfile();
  }catch(e){toast(e.message,'err');}
}

initTon();
init();
</script>
</body>
</html>
